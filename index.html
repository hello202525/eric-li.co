<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />


<!--
  eric-li.co

  the surface is quiet. that is by design.

  try typing.
-->

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* selection: keep bio text selectable, in a tasteful warm grey — never browser-blue */
  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  /* images / canvases / the floating nav: never selectable, never draggable.
     this kills the blue highlight that appears when you double-click an image. */
  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  /* ============================================================
     /  — the bio. each sentence is its own paragraph, its own line.
     ============================================================ */
  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p {
    margin: 0 0 0.25em 0;
  }
  .bio p:last-child { margin-bottom: 0; }
  .bio .nb { white-space: nowrap; }


  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  /* enchanted state — hovering "beautiful things" */
  body.enchanted { background: #f0e6c8; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  /* ============================================================
     subpages — fullscreen artworks
     ============================================================ */
  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show {
    opacity: 1;
    pointer-events: auto;
  }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  /* ============================================================
     /gallery — dark room, viewport-filling grid, no scroll
     ============================================================ */
  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after {
    opacity: 1;
  }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  /* ============================================================
     /studio — paint your own
     ============================================================ */
  .studio {
    position: fixed; inset: 0;
    background: var(--paper);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 11;
  }
  .studio.show { opacity: 1; pointer-events: auto; }
  .studio canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }
  .studio .studio-hint { display: none; }

  /* ============================================================
     ambience — the cursor leaves a faint mark, only once you've
     unlocked something. silent on the bare home.
     ============================================================ */
  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  /* ============================================================
     a transient "type a name" whisper that fades in once a key
     is pressed, then fades when you've typed enough to be
     navigating to something.
     ============================================================ */
  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  /* ============================================================
     widgets — surprises that aren't tied to art
     ============================================================ */
  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }
  /* stars mode: temporarily paint the world black */
  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  /* void mode: total blackout */
  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  /* supernova mode */
  body.supernova-mode { background: #020108; transition: background 600ms ease; }
  body.supernova-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.supernova-mode #trail { opacity: 0; }

  /* mirror mode */
  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }


  /* ============================================================
     misc
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>


<!-- /  — the bare bio -->
<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<!-- /[work] subpages — one .work container that swaps content -->
<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<!-- /gallery — contact sheet -->
<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- /studio — painting -->
<section class="studio" id="studio" aria-hidden="true">
  <canvas id="studio-canvas"></canvas>
  <div class="studio-hint">paint. esc returns.</div>
</section>

<!-- the typing whisper -->
<div class="typer" id="typer" aria-hidden="true"></div>

<!-- widget overlays — moon / time / rain / stars -->
<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  // ============================================================
  //   works — every entry below gets its own URL and shows up in the gallery
  // ============================================================
  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung",
    sugimoto: "sugimoto",
    tapies: "tapies",
    stieglitz: "stieglitz",
    atget: "atget",
    whistler: "whistler",
    brancusi: "brancusi",
    spilliaert: "spilliaert",
    goya: "goya",
    hugo: "hugo",
    schikaneder: "schikaneder",
    degouve: "degouve",
    khnopff: "khnopff",
    carriere: "carriere",
    ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  // preload every image so transitions feel instant
  for (const w of WORKS) {
    const img = new Image();
    img.src = w.src;
  }

  // ============================================================
  //   element references
  // ============================================================
  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $studio  = document.getElementById("studio");
  const $studioCanvas = document.getElementById("studio-canvas");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // ============================================================
  //   routing
  // ============================================================
  const ROUTES = new Set(["", "/", "gallery", "studio", ...SLUGS]);

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      // fade out whichever panel is visible, then reveal home underneath
      $home.hidden = false;
      [$work, $gallery, $studio].forEach(el => {
        el.style.transition = "";
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
      });
      return;
    }

    // panel-to-panel: fade out others, fade in target
    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : target === "studio" ? $studio : null;
    if (!el) return;
    [$work, $gallery, $studio].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
      if (target === "studio") enableStudio();
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked"); // any non-home page enables ambience too

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }
    if (path === "studio") {
      document.title = "Studio  ·  Eric Li";
      showOnly("studio");
      return;
    }
    // home — wipe the unlocked flag so the bare bio loads clean
    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // ============================================================
  //   dark room gallery — spotlight follows cursor
  // ============================================================
  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) {
      go("/" + cell.dataset.slug);
    } else {
      go("/");
    }
  });

  // back/forward
  window.addEventListener("popstate", () => render(currentPath()));

  // a click on the artwork itself advances to the next random work;
  // a click on the surrounding paper takes you to the gallery.
  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {

      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // ============================================================
  //   cursor parallax — artworks come alive
  // ============================================================
  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  function startParallax() {
    if (!parallaxRAF) parallaxRAF = requestAnimationFrame(applyParallax);
  }
  function stopParallax() {
    cancelAnimationFrame(parallaxRAF);
    parallaxRAF = 0;
    parallaxX = parallaxY = targetX = targetY = 0;
    if ($workImg) $workImg.style.transform = "";
  }
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const nx = (e.clientX - cx) / r.width;   // -0.5 .. 0.5
    const ny = (e.clientY - cy) / r.height;
    const maxShift = 18;
    targetX = -nx * maxShift;
    targetY = -ny * maxShift;
  });
  $work.addEventListener("pointerleave", () => {
    targetX = targetY = 0;
  });

  // ============================================================
  //   long-press on home — hold the cursor down (700ms) and a
  //   random work blooms in
  // ============================================================
  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    // ignore presses on the clickable period (different easter egg)
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      const next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
      go("/" + next);
    }, 700);
  });
  function cancelPress() {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; }
  }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // ============================================================
  //   easter egg 1 — type any artist's surname to navigate
  //   show the buffer mid-screen as it grows
  // ============================================================
  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    // let the fade-out finish before wiping the text, so the
    // word visibly fades instead of just disappearing.
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery", "studio"])];

  // widgets — words that fire surprises that aren't tied to art
  const WIDGETS = ["stars", "void", "supernova", "mirror"];

  // year codes — each work's creation year sends you to that work
  const YEARS = {
    "1820": "goya",
    "1867": "hugo",
    "1875": "whistler",
    "1891": "khnopff",
    "1892": "degouve",
    "1898": "atget-3",
    "1906": "schikaneder",

  function loop() {

  // --- stars ---
  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: Math.cos(angle) * drift,
        vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w;
        sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10;
        sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        life: 1.0,
        len: 60 + Math.random() * 80,
        size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;
    const DUR = 7000;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      if (starsPersist || now - start < DUR) {
        widgetRAF = requestAnimationFrame(step);
      } else {
        clearWidget();
      }
    }
    widgetRAF = requestAnimationFrame(step);
  }

  // --- supernova (WebGL GPU plasma simulation) ---
  function runSupernova() {
    document.body.classList.add("supernova-mode");

    const canvas = document.createElement("canvas");
    canvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;z-index:7;cursor:crosshair;";
    document.body.appendChild(canvas);
    const gl = canvas.getContext("webgl2", { alpha: false, antialias: false, preserveDrawingBuffer: false });
    if (!gl) { clearWidget(); return; }
    gl.getExtension("EXT_color_buffer_float");
    supernovaGL = gl;

    const W = Math.round(innerWidth * 0.5);
    const H = Math.round(innerHeight * 0.5);
    canvas.width = W;
    canvas.height = H;
    gl.viewport(0, 0, W, H);

    let mx = 0.5, my = 0.5, prevMx = 0.5, prevMy = 0.5;
    let mouseDown = false;
    let impulseFrames = 0;
    let mouseSpeed = 0;
    const onMM = (e) => {
      prevMx = mx; prevMy = my;
      mx = e.clientX / innerWidth; my = 1 - e.clientY / innerHeight;
      mouseSpeed = Math.sqrt((mx-prevMx)**2 + (my-prevMy)**2);
    };
    const onMD = () => { mouseDown = true; impulseFrames = 15; };
    const onMU = () => { mouseDown = false; };
    window.addEventListener("pointermove", onMM);
    window.addEventListener("pointerdown", onMD);
    window.addEventListener("pointerup", onMU);
    supernovaCleanup = () => {
      window.removeEventListener("pointermove", onMM);
      window.removeEventListener("pointerdown", onMD);
      window.removeEventListener("pointerup", onMU);
    };

    // --- Shader sources ---
    const VERT = `#version 300 es
    in vec2 a_pos;
    out vec2 v_uv;
    void main(){ v_uv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0, 1); }`;

    const SIM_FRAG = `#version 300 es
    precision highp float;
    uniform sampler2D u_state;
    uniform vec2 u_res;
    uniform vec2 u_mouse;
    uniform vec2 u_mousePrev;
    uniform float u_gravity;
    uniform float u_impulse;
    uniform float u_dt;
    uniform float u_time;
    in vec2 v_uv;
    out vec4 fragColor;

    // Simplex-style noise
    vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 perm(vec4 x){return mod289(((x*34.)+1.)*x);}
    float noise3(vec3 p){
      vec3 a=floor(p),d=p-a;
      d=d*d*(3.-2.*d);
      vec4 b=a.xxyy+vec4(0,1,0,1);
      vec4 k1=perm(b.xyxy);
      vec4 k2=perm(k1.xyxy+b.zzww);
      vec4 c=k2+a.zzzz;
      vec4 k3=perm(c);
      vec4 k4=perm(c+1.);
      vec4 o1=fract(k3*(1./41.));
      vec4 o2=fract(k4*(1./41.));
      vec4 o3=o2*d.z+o1*(1.-d.z);
      vec2 o4=o3.yw*d.x+o3.xz*(1.-d.x);
      return o4.y*d.y+o4.x*(1.-d.y);
    }
    float fbm(vec3 p){
      float v=0.,a=0.5;
      for(int i=0;i<5;i++){v+=a*noise3(p);p*=2.1;a*=0.5;}
      return v;
    }

    void main(){
      vec2 px = 1.0 / u_res;
      vec4 state = texture(u_state, v_uv);
      vec2 vel = state.xy;
      float density = state.z;
      float temp = state.w;

      // Gravity toward mouse — strong pull when holding
      vec2 delta = u_mouse - v_uv;
      float aspect = u_res.x / u_res.y;
      delta.x *= aspect;
      float r = length(delta);
      float gForce = u_gravity / (r * r + 0.003);
      gForce = min(gForce, 25.0);
      vel += normalize(delta + 0.0001) * gForce * u_dt;

      // Mouse movement injects energy — painting plasma along trail
      float mouseDist = length(v_uv - u_mouse);
      float mouseInject = exp(-mouseDist * mouseDist * 80.0) * u_gravity * 0.15;
      vec2 mouseVel = u_mouse - u_mousePrev;
      float mSpeed = length(mouseVel);
      density += mouseInject * (0.1 + mSpeed * 2.0);
      temp += mouseInject * (0.2 + mSpeed * 3.0);
      if(mSpeed > 0.001) vel += normalize(mouseVel) * mouseInject * 2.0;

      // Click impulse — shockwave (injects velocity more than temperature)
      if(u_impulse > 0.05){
        float impR = length(v_uv - u_mouse);
        float impStr = u_impulse * exp(-impR * impR * 8.0) * 6.0;
        vec2 impDir = normalize(v_uv - u_mouse + 0.0001);
        vel += impDir * impStr;
        temp += impStr * 0.6;
        density += impStr * 0.3;
      }

      // Advection
      vec2 prevUV = v_uv - vel * u_dt * 0.5;
      vec4 advected = texture(u_state, prevUV);

      // Heavy diffusion to eliminate hard edges
      vec4 L = texture(u_state, v_uv + vec2(-px.x, 0));
      vec4 R = texture(u_state, v_uv + vec2( px.x, 0));
      vec4 U = texture(u_state, v_uv + vec2(0,  px.y));
      vec4 D = texture(u_state, v_uv + vec2(0, -px.y));
      vec4 TL = texture(u_state, v_uv + vec2(-px.x, px.y));
      vec4 TR = texture(u_state, v_uv + vec2( px.x, px.y));
      vec4 BL = texture(u_state, v_uv + vec2(-px.x, -px.y));
      vec4 BR = texture(u_state, v_uv + vec2( px.x, -px.y));
      vec4 neighbors = (L + R + U + D) * 0.125 + (TL + TR + BL + BR) * 0.0625;
      vec4 diffused = mix(advected, neighbors * (1.0/0.75), 0.35);

      vel = diffused.xy;
      density = diffused.z;
      temp = diffused.w;

      // Pressure correction
      float divR2 = R.x - L.x;
      float divU2 = U.y - D.y;
      vel -= vec2(divR2, divU2) * 0.15;

      // Smooth curl noise — gentle swirling, no hard shear
      float nR = fbm(vec3((v_uv + vec2(px.x*2.0,0)) * 3.0, u_time * 0.15));
      float nL = fbm(vec3((v_uv - vec2(px.x*2.0,0)) * 3.0, u_time * 0.15));
      float nU = fbm(vec3((v_uv + vec2(0,px.y*2.0)) * 3.0, u_time * 0.15));
      float nD2 = fbm(vec3((v_uv - vec2(0,px.y*2.0)) * 3.0, u_time * 0.15));
      vec2 curl = vec2(nU - nD2, -(nR - nL)) * 0.04;
      vel += curl;

      // Large-scale slow drift
      float s1 = fbm(vec3(v_uv * 1.5, u_time * 0.06)) - 0.5;
      float s2 = fbm(vec3(v_uv.yx * 1.5, u_time * 0.06 + 10.0)) - 0.5;
      vel += vec2(s1, s2) * 0.015;

      // Central energy source — just enough to keep it alive, not blinding
      float cDist = length(v_uv - vec2(0.5));
      float feed = exp(-cDist * cDist * 18.0) * 0.002;
      density += feed;
      temp += feed * 0.3;

      // Drifting secondary sources — small hot points for color variety
      vec2 src2 = vec2(0.5 + sin(u_time*0.13)*0.2, 0.5 + cos(u_time*0.17)*0.15);
      float d2 = length(v_uv - src2);
      density += exp(-d2*d2 * 50.0) * 0.002;
      temp += exp(-d2*d2 * 50.0) * 0.004;

      vec2 src3 = vec2(0.5 + cos(u_time*0.11)*0.25, 0.5 + sin(u_time*0.19)*0.2);
      float d3 = length(v_uv - src3);
      density += exp(-d3*d3 * 50.0) * 0.0015;

      // Buoyancy + lateral wind
      vel.y += temp * 0.025;
      vel.x += sin(v_uv.y * 6.28 + u_time * 0.3) * temp * 0.005;

      // Differential decay: temp fades fast (color cools), density persists (structure stays)
      vel *= 0.992;
      density *= 0.996;
      temp *= 0.97;

      // No hard boundary — just gentle radial fade from center
      float fromCenter = length(v_uv - vec2(0.5));
      float fade = smoothstep(0.7, 0.3, fromCenter);
      density *= mix(0.99, 1.0, fade);
      temp *= mix(0.98, 1.0, fade);

      fragColor = vec4(vel, max(density,0.0), max(temp,0.0));
    }`;

    const DISP_FRAG = `#version 300 es
    precision highp float;
    uniform sampler2D u_state;
    uniform vec2 u_res;
    uniform vec2 u_mouse;
    uniform float u_gravity;
    uniform float u_time;
    in vec2 v_uv;
    out vec4 fragColor;

    vec3 blackbody(float t){
      // Attempt approximate Planck locus: t is 0..1 mapping to 1000K..50000K
      float T = 1000.0 + t * 49000.0;
      float x = T / 100.0;
      vec3 c;
      if(x <= 66.0){
        c.r = 1.0;
        c.g = clamp((99.47*log(x)-161.12)/255.0, 0.0, 1.0);
        c.b = x <= 19.0 ? 0.0 : clamp((138.52*log(x-10.0)-305.04)/255.0, 0.0, 1.0);
      } else {
        c.r = clamp(329.7*pow(x-60.0,-0.133)/255.0, 0.0, 1.0);
        c.g = clamp(288.12*pow(x-60.0,-0.0755)/255.0, 0.0, 1.0);
        c.b = 1.0;
      }
      return c;
    }

    // Noise for filament overlay
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
    float vnoise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      f=f*f*(3.0-2.0*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x), mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);
    }
    float filament(vec2 p, float t){
      float v=0.0, a=0.6;
      mat2 m = mat2(1.6,1.2,-1.2,1.6);
      for(int i=0;i<6;i++){ v+=a*abs(vnoise(p)-0.5)*2.0; p=m*p; a*=0.5; }
      return v;
    }

    void main(){
      vec2 uv = v_uv;

      // Gravitational lensing
      vec2 delta = u_mouse - uv;
      float aspect = u_res.x / u_res.y;
      delta.x *= aspect;
      float r = length(delta);
      float lensStr = u_gravity * 0.005 / (r * r + 0.003);
      lensStr = min(lensStr, 0.25);
      vec2 lensDir = normalize(delta + 0.0001) * lensStr * vec2(1.0/aspect, 1.0);
      uv += lensDir;

      // Chromatic aberration — splits channels near gravity well
      float chromStr = lensStr * 0.4;
      vec2 chromOff = lensDir * chromStr;
      vec4 stateR = texture(u_state, uv + chromOff * 0.5);
      vec4 stateG = texture(u_state, uv);
      vec4 stateB = texture(u_state, uv - chromOff * 0.5);

      float densityR = stateR.z, tempR = stateR.w, speedR = length(stateR.xy);
      float densityG = stateG.z, tempG = stateG.w, speedG = length(stateG.xy);
      float densityB = stateB.z, tempB = stateB.w, speedB = length(stateB.xy);

      // Emission: density provides structure, temp provides brightness
      float emR = densityR * 0.8 + tempR * 1.2 + speedR * 0.5;
      float emG = densityG * 0.8 + tempG * 1.2 + speedG * 0.5;
      float emB = densityB * 0.8 + tempB * 1.2 + speedB * 0.5;

      // Temperature to color: low range = deep reds, mid = orange, high = white
      // Using a wider mapping so most of the plasma sits in the red-orange range
      float tR = clamp(tempR * 1.5 + speedR * 0.3, 0.0, 1.0);
      float tG = clamp(tempG * 1.5 + speedG * 0.3, 0.0, 1.0);
      float tB = clamp(tempB * 1.5 + speedB * 0.3, 0.0, 1.0);

      vec3 col;
      col.r = blackbody(tR).r * emR;
      col.g = blackbody(tG).g * emG;
      col.b = blackbody(tB).b * emB;

      // Blue-violet tint in fast regions
      col += vec3(0.05, 0.02, 0.15) * speedG * 1.5;

      // Deep red/amber in dense cool regions (most of the nebula)
      float coolDense = densityG * (1.0 - clamp(tempG * 2.0, 0.0, 1.0));
      col += vec3(0.2, 0.04, 0.01) * coolDense;

      // Bloom
      vec2 px = 1.0 / u_res;
      vec3 bloom = vec3(0.0);
      for(int i = 1; i <= 8; i++){
        float fi = float(i);
        float w = 1.0 / (fi * 1.2 + 1.0);
        float off = fi * 2.5;
        vec4 sR = texture(u_state, uv + vec2(off*px.x, 0));
        vec4 sL = texture(u_state, uv - vec2(off*px.x, 0));
        vec4 sU = texture(u_state, uv + vec2(0, off*px.y));
        vec4 sD = texture(u_state, uv - vec2(0, off*px.y));
        // Diagonal taps for richer bloom
        vec4 sDR = texture(u_state, uv + vec2(off*px.x, off*px.y)*0.7);
        vec4 sDL = texture(u_state, uv + vec2(-off*px.x, off*px.y)*0.7);
        bloom += blackbody(clamp(sR.w*3.5,0.0,1.0)) * (sR.z+sR.w) * w;
        bloom += blackbody(clamp(sL.w*3.5,0.0,1.0)) * (sL.z+sL.w) * w;
        bloom += blackbody(clamp(sU.w*3.5,0.0,1.0)) * (sU.z+sU.w) * w;
        bloom += blackbody(clamp(sD.w*3.5,0.0,1.0)) * (sD.z+sD.w) * w;
        bloom += blackbody(clamp(sDR.w*3.5,0.0,1.0)) * (sDR.z+sDR.w) * w * 0.5;
        bloom += blackbody(clamp(sDL.w*3.5,0.0,1.0)) * (sDL.z+sDL.w) * w * 0.5;
      }
      col += bloom * 0.1;

      // Wispy filament overlay — ghostly tendrils
      float fil = filament(v_uv * 4.0 + u_time * 0.05, u_time);
      float filMask = densityG * 0.5 + tempG * 0.3;
      col += vec3(0.4, 0.15, 0.05) * fil * filMask * 0.3;

      // Tone mapping — ACES-inspired
      col = (col * (2.51 * col + 0.03)) / (col * (2.43 * col + 0.59) + 0.14);
      col = clamp(col, 0.0, 1.0);

      // Color grading — subtle teal in shadows, warmth in highlights
      vec3 shadows = vec3(0.02, 0.04, 0.06);
      vec3 highlights = vec3(1.02, 0.98, 0.95);
      float lum = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = mix(col + shadows * (1.0 - lum), col * highlights, lum);

      fragColor = vec4(col, 1.0);
    }`;

    // --- WebGL setup ---
    function compileShader(src, type) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    function createProgram(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
      gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
      gl.linkProgram(p);
      return p;
    }

    const simProg = createProgram(VERT, SIM_FRAG);
    const dispProg = createProgram(VERT, DISP_FRAG);

    // Fullscreen quad
    const quadBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    function setupAttrib(prog) {
      const loc = gl.getAttribLocation(prog, "a_pos");
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }

    // Ping-pong framebuffers
    function createFBO() {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, W, H, 0, gl.RGBA, gl.HALF_FLOAT, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      const fbo = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
      return { tex, fbo };
    }
    let fboA = createFBO();
    let fboB = createFBO();

    // Seed initial state with fBM noise via a one-time JS fill
    const initData = new Float32Array(W * H * 4);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = (y * W + x) * 4;
        const u = x / W, v = y / H;
        const cx2 = u - 0.5, cy2 = v - 0.5;
        const dist = Math.sqrt(cx2*cx2 + cy2*cy2);
        const falloff = Math.exp(-dist * dist * 8);
        const n1 = Math.sin(u*17.3 + v*13.7) * Math.cos(u*23.1 - v*7.3);
        const n2 = Math.sin(u*31.1 + v*29.3 + 1.7) * Math.cos(u*11.3 + v*19.1);
        const n3 = Math.sin(u*43.7 - v*37.3 + 3.1) * Math.cos(u*53.1 + v*41.7);
        const density = (0.2 + 0.5 * Math.abs(n1 + n2 * 0.5 + n3 * 0.25)) * falloff;
        const temperature = density * 0.15 * falloff;
        initData[idx] = (n2 * 0.1) * falloff;     // vel.x
        initData[idx+1] = (n3 * 0.1) * falloff;   // vel.y
        initData[idx+2] = density;                  // density
        initData[idx+3] = temperature;              // temperature
      }
    }
    gl.bindTexture(gl.TEXTURE_2D, fboA.tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, W, H, 0, gl.RGBA, gl.HALF_FLOAT, initData);

    // Uniform locations
    const simLocs = {
      state: gl.getUniformLocation(simProg, "u_state"),
      res: gl.getUniformLocation(simProg, "u_res"),
      mouse: gl.getUniformLocation(simProg, "u_mouse"),
      mousePrev: gl.getUniformLocation(simProg, "u_mousePrev"),
      gravity: gl.getUniformLocation(simProg, "u_gravity"),
      impulse: gl.getUniformLocation(simProg, "u_impulse"),
      dt: gl.getUniformLocation(simProg, "u_dt"),
      time: gl.getUniformLocation(simProg, "u_time"),
    };
    const dispLocs = {
      state: gl.getUniformLocation(dispProg, "u_state"),
      res: gl.getUniformLocation(dispProg, "u_res"),
      mouse: gl.getUniformLocation(dispProg, "u_mouse"),
      gravity: gl.getUniformLocation(dispProg, "u_gravity"),
      time: gl.getUniformLocation(dispProg, "u_time"),
    };

    let lastT = performance.now();
    let time = 0;

    function step(now) {
      if (activeWidget !== "supernova") return;
      const dt = Math.min(0.033, (now - lastT) / 1000);
      lastT = now;
      time += dt;

      const grav = mouseDown ? 8.0 : (0.5 + mouseSpeed * 40.0);
      const imp = impulseFrames > 0 ? (impulseFrames / 15.0) : 0.0;
      if (impulseFrames > 0) impulseFrames--;

      // Simulation pass
      gl.bindFramebuffer(gl.FRAMEBUFFER, fboB.fbo);
      gl.useProgram(simProg);
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
      setupAttrib(simProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, fboA.tex);
      gl.uniform1i(simLocs.state, 0);
      gl.uniform2f(simLocs.res, W, H);
      gl.uniform2f(simLocs.mouse, mx, my);
      gl.uniform2f(simLocs.mousePrev, prevMx, prevMy);
      gl.uniform1f(simLocs.gravity, grav);
      gl.uniform1f(simLocs.impulse, imp);
      gl.uniform1f(simLocs.dt, dt);
      gl.uniform1f(simLocs.time, time);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      // Display pass
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.useProgram(dispProg);
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
      setupAttrib(dispProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, fboB.tex);
      gl.uniform1i(dispLocs.state, 0);
      gl.uniform2f(dispLocs.res, W, H);
      gl.uniform2f(dispLocs.mouse, mx, my);
      gl.uniform1f(dispLocs.gravity, grav);
      gl.uniform1f(dispLocs.time, time);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      const tmp = fboA; fboA = fboB; fboB = tmp;
      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  // --- mirror ---
  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          // vignette
          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  // ============================================================
  //   /studio — paint with a brush of light or ink
  // ============================================================
  let studioCtx, sW, sH, studioReady = false;
  function sizeStudio() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    sW = innerWidth; sH = innerHeight;
    $studioCanvas.width = Math.round(sW * dpr);
    $studioCanvas.height = Math.round(sH * dpr);
    $studioCanvas.style.width = sW + "px";
    $studioCanvas.style.height = sH + "px";
    studioCtx = $studioCanvas.getContext("2d");
    studioCtx.setTransform(1, 0, 0, 1, 0, 0);
    studioCtx.scale(dpr, dpr);
    // start with paper
    studioCtx.fillStyle = "#f7f4ec";
    studioCtx.fillRect(0, 0, sW, sH);
  }
  function enableStudio() {
    if (!studioReady) {
      sizeStudio();
      studioReady = true;
      addEventListener("resize", () => {
        if (!$studio.classList.contains("show")) return;
        sizeStudio();
      });
      let drawing = false, last = null, lastT = 0;
      $studioCanvas.addEventListener("pointerdown", (e) => {
        drawing = true;
        last = { x: e.clientX, y: e.clientY };
        lastT = performance.now();
        $studioCanvas.setPointerCapture(e.pointerId);
      });
      $studioCanvas.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const p = { x: e.clientX, y: e.clientY };
        const now = performance.now();
        const dt = Math.max(1, now - lastT);
        const dx = p.x - last.x, dy = p.y - last.y;
        const speed = Math.hypot(dx, dy) / dt;
        const w = Math.max(2, 28 - speed * 32);
        studioCtx.lineCap = "round";
        studioCtx.lineJoin = "round";
        studioCtx.strokeStyle = "rgba(17,17,17,0.62)";
        studioCtx.lineWidth = w;
        studioCtx.beginPath();
        studioCtx.moveTo(last.x, last.y);
        studioCtx.lineTo(p.x, p.y);
        studioCtx.stroke();
        // halo
        studioCtx.strokeStyle = "rgba(17,17,17,0.12)";
        studioCtx.lineWidth = w * 1.6;
        studioCtx.beginPath();
        studioCtx.moveTo(last.x, last.y);
        studioCtx.lineTo(p.x, p.y);
        studioCtx.stroke();
        last = p; lastT = now;
      });
      $studioCanvas.addEventListener("pointerup", () => { drawing = false; last = null; });
      $studioCanvas.addEventListener("pointerleave", () => { drawing = false; last = null; });
    }
  }

  // ============================================================
  //   global: block image dragging / drag-select rectangles
  // ============================================================
  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // ============================================================
  //   idle stillness — 60s of no interaction on home, the bio
  //   slowly fades to nothing. move and it returns.
  // ============================================================
  let idleTimer = 0;
  let idleActive = false;
  const $bio = document.querySelector(".bio");

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) {
      idleActive = false;
      clearWidget();
    }
    if (!$home.hidden) {
      idleTimer = setTimeout(startIdle, 15000);
    }
  }
  function startIdle() {
    if ($home.hidden) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // ============================================================
  //   mobile shake — shake your phone for a random surprise
  // ============================================================
  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  // ============================================================
  //   initial render
  // ============================================================
  console.log("%c" + "\n  eric-li.co\n", "font-family:Georgia,serif;font-size:14px;color:#111;letter-spacing:0.08em");
  console.log("%c  the surface is quiet. that is by design.\n", "font-family:Georgia,serif;font-size:11px;color:#999;letter-spacing:0.04em");

  render(currentPath());
  resetIdle();
})();
</script>
