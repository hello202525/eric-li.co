<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p { margin: 0 0 0.25em 0; }
  .bio p:last-child { margin-bottom: 0; }

  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  body.enchanted { transition: background 600ms ease; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show { opacity: 1; pointer-events: auto; }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after { opacity: 1; }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }

  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }

  body.play-mode { background: #050508; transition: background 400ms ease; }
  body.play-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.play-mode #trail { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>

<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<div class="typer" id="typer" aria-hidden="true"></div>

<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung", sugimoto: "sugimoto", tapies: "tapies",
    stieglitz: "stieglitz", atget: "atget", whistler: "whistler",
    brancusi: "brancusi", spilliaert: "spilliaert", goya: "goya",
    hugo: "hugo", schikaneder: "schikaneder", degouve: "degouve",
    khnopff: "khnopff", carriere: "carriere", ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  for (const w of WORKS) { const img = new Image(); img.src = w.src; }

  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // routing

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      $home.hidden = false;
      [$work, $gallery].forEach(el => {
        el.style.transition = "";
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
      });
      return;
    }

    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : null;
    if (!el) return;
    [$work, $gallery].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked");

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }

    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // gallery

  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) { go("/" + cell.dataset.slug); } else { go("/"); }
  });

  window.addEventListener("popstate", () => render(currentPath()));

  // work viewer: click artwork to advance, click background to gallery

  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {
      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // parallax on work viewer

  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  parallaxRAF = requestAnimationFrame(applyParallax);
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    targetX = -((e.clientX - r.left - r.width / 2) / r.width) * 18;
    targetY = -((e.clientY - r.top - r.height / 2) / r.height) * 18;
  });
  $work.addEventListener("pointerleave", () => { targetX = targetY = 0; });

  // long-press on home opens random work

  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      go("/" + SLUGS[Math.floor(Math.random() * SLUGS.length)]);
    }, 700);
  });
  function cancelPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; } }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // typed commands

  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery"])];
  const WIDGETS = ["stars", "void", "mirror", "play"];
  const YEARS = {
    "1820": "goya", "1867": "hugo", "1875": "whistler", "1891": "khnopff",
    "1892": "degouve", "1898": "atget-3", "1906": "schikaneder",
    "1908": "spilliaert", "1920": "brancusi", "1927": "atget",
    "1980": "sugimoto", "1983": "tapies", "1989": "hartung",
  };

  function matchSlug() {
    if (!buf) return null;
    if (YEARS[buf]) return YEARS[buf];
    if (ARTIST_PRIMARY[buf]) return ARTIST_PRIMARY[buf];
    if (TYPEABLE.includes(buf)) return buf;
    return null;
  }

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;

    if (k === "Escape") {
      clearBuf();
      clearWidget();
      if (currentPath() !== "") go("/");
      return;
    }
    if (activeWidget === "stars" || activeWidget === "mirror" || activeWidget === "play") return;
    if (k === "Backspace") {
      if (buf.length) {
        buf = buf.slice(0, -1);
        if (!buf) { clearBuf(); return; }
        $typer.textContent = buf;
      }
      return;
    }
    if (k.length === 1 && /^[a-zA-Z0-9]$/.test(k)) {
      buf = (buf + k.toLowerCase()).slice(0, 18);
      $typer.textContent = buf;
      $typer.classList.add("show");
      clearTimeout(bufTimer);
      bufTimer = setTimeout(clearBuf, 1600);

      const m = matchSlug();
      if (m) { clearBuf(); go("/" + m); return; }
      if (WIDGETS.includes(buf)) { const w = buf; clearBuf(); fireWidget(w); return; }
      if (buf === "eric") {
        clearBuf();
        window.open("https://www.linkedin.com/in/eric-li-226850249/", "_blank");
        return;
      }
    }
  });

  // "beautiful things" hover

  if ($end) {
    $end.addEventListener("click", (e) => { e.preventDefault(); go("/gallery"); });

    const text = $end.textContent;
    const bioEl = $end.closest(".bio");
    $end.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
      const s = document.createElement("span");
      s.textContent = text[i] === " " ? "\u00A0" : text[i];
      $end.appendChild(s);
    }
    const letters = $end.querySelectorAll("span");

    const enchantedTones = [
      "#f0e6c8", "#e8e0d0", "#dce4e0", "#e0d8e8", "#d8e0e8",
      "#e8dcd0", "#d0dce0", "#e4ddd0", "#d8d8e0", "#e0e4d8",
    ];
    let lastTone = -1;
    $end.addEventListener("mouseenter", () => {
      if (activeWidget) return;
      let pick = lastTone;
      while (pick === lastTone) pick = Math.floor(Math.random() * enchantedTones.length);
      lastTone = pick;
      document.body.style.background = enchantedTones[pick];
      document.body.classList.add("enchanted");
      if (bioEl) bioEl.classList.add("enchanted");
      letters.forEach(s => {
        const tx = (Math.random() - 0.5) * 24;
        const ty = (Math.random() - 0.5) * 18;
        const r = (Math.random() - 0.5) * 16;
        s.style.transform = "translate(" + tx + "px," + ty + "px) rotate(" + r + "deg)";
      });
    });
    $end.addEventListener("mouseleave", () => {
      if (activeWidget) return;
      document.body.style.background = "";
      document.body.classList.remove("enchanted");
      if (bioEl) bioEl.classList.remove("enchanted");
      letters.forEach(s => { s.style.transform = ""; });
    });
  }

  // konami code opens gallery

  const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
  let kIdx = 0;
  window.addEventListener("keydown", (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (k === KONAMI[kIdx]) {
      kIdx++;
      if (kIdx === KONAMI.length) { kIdx = 0; go("/gallery"); }
    } else {
      kIdx = (k === KONAMI[0]) ? 1 : 0;
    }
  });

  // cursor ink trail (visible after navigating away from home)

  const trail = document.getElementById("trail");
  let tctx, tw = 0, th = 0;
  function sizeTrail() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    tw = innerWidth; th = innerHeight;
    trail.width = Math.round(tw * dpr);
    trail.height = Math.round(th * dpr);
    trail.style.width = tw + "px";
    trail.style.height = th + "px";
    tctx = trail.getContext("2d");
    tctx.setTransform(1, 0, 0, 1, 0, 0);
    tctx.scale(dpr, dpr);
  }
  sizeTrail();
  addEventListener("resize", sizeTrail);

  const pts = [];
  const LIFE = 900;
  addEventListener("pointermove", (e) => {
    if (!document.body.classList.contains("unlocked")) return;
    const last = pts[pts.length - 1];
    if (last) {
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      if (dx*dx + dy*dy < 9) return;
    }
    pts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  }, { passive: true });

  function trailLoop() {
    const now = performance.now();
    while (pts.length && now - pts[0].t > LIFE) pts.shift();
    if (tctx) {
      tctx.clearRect(0, 0, tw, th);
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const age = (now - p.t) / LIFE;
        const a = (1 - age) * 0.16;
        const r = 0.8 + (1 - age) * 3.2;
        tctx.fillStyle = "rgba(17, 17, 17, " + a + ")";
        tctx.beginPath();
        tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        tctx.fill();
      }
    }
    requestAnimationFrame(trailLoop);
  }
  requestAnimationFrame(trailLoop);

  // widgets

  const $widget = document.getElementById("widget");
  const $widgetCanvas = document.getElementById("widget-canvas");
  let widgetTimer = 0;
  let widgetRAF = 0;
  let activeWidget = "";
  let voidRevealTimer = 0;
  let mirrorStream = null;
  let playCleanup = null;

  function clearWidget() {
    clearTimeout(widgetTimer);
    clearTimeout(voidRevealTimer);
    cancelAnimationFrame(widgetRAF);
    activeWidget = "";
    $widget.classList.remove("show");
    $widgetCanvas.classList.remove("show");
    document.body.classList.remove("stars-mode", "void-mode", "mirror-mode", "play-mode");
    if (playCleanup) { playCleanup(); playCleanup = null; }
    $widget.innerHTML = "";
    if (mirrorStream) {
      mirrorStream.getTracks().forEach(t => t.stop());
      mirrorStream = null;
    }
    try {
      const ctx = $widgetCanvas.getContext("2d");
      ctx.globalCompositeOperation = "source-over";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, $widgetCanvas.width, $widgetCanvas.height);
    } catch (e) {}
  }

  function sizeWidgetCanvas() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    $widgetCanvas.width = Math.round(innerWidth * dpr);
    $widgetCanvas.height = Math.round(innerHeight * dpr);
    $widgetCanvas.style.width = innerWidth + "px";
    $widgetCanvas.style.height = innerHeight + "px";
    const ctx = $widgetCanvas.getContext("2d");
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return ctx;
  }

  function fireWidget(kind) {
    if (kind === activeWidget) return;
    clearWidget();
    document.body.style.background = "";
    document.body.classList.remove("enchanted");
    const bioEl = document.querySelector(".bio");
    if (bioEl) bioEl.classList.remove("enchanted");
    activeWidget = kind;
    if (kind === "stars") { runStars(); return; }
    if (kind === "void") { runVoid(); return; }
    if (kind === "mirror") { runMirror(); return; }
    if (kind === "play") { runPlay(); return; }
  }

  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: Math.cos(angle) * drift, vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w; sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10; sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 1.0, len: 60 + Math.random() * 80, size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  function runVoid() {
    document.body.classList.add("void-mode");
    voidRevealTimer = setTimeout(() => {
      if (activeWidget !== "void") return;
      $widget.innerHTML = '<div style="color:rgba(232,230,223,0.7);font-family:\'Iowan Old Style\',Georgia,serif;font-size:clamp(28px,2.8vw,36px);letter-spacing:0.08em;font-style:italic;opacity:0;transition:opacity 2s ease">In the void is virtue, and no evil</div>';
      $widget.classList.add("show");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const d = $widget.querySelector("div");
          if (d) d.style.opacity = "1";
        });
      });
    }, 1500);
    widgetTimer = setTimeout(clearWidget, 8000);
  }

  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  function runPlay() {
    const ctx = sizeWidgetCanvas();
    const W = innerWidth, H = innerHeight;
    document.body.classList.add("play-mode");
    $widgetCanvas.classList.add("show");

    let phase = "launch";
    let phaseT = 0;
    let lastT = performance.now();

    const keys = {};
    function kd(e) {
      keys[e.code] = true;
      if (phase === "game" && /^(Arrow|Space)/.test(e.code)) e.preventDefault();
    }
    function ku(e) { keys[e.code] = false; }
    addEventListener("keydown", kd, { capture: true });
    addEventListener("keyup", ku);
    playCleanup = () => {
      removeEventListener("keydown", kd, { capture: true });
      removeEventListener("keyup", ku);
    };

    let fadeAlpha = 0;
    let fadeTarget = 0;
    let fadeCallback = null;

    function fadeTo(p) {
      fadeTarget = 1;
      fadeCallback = () => { phase = p; phaseT = 0; fadeTarget = 0; };
    }
    function setPhase(p) { phase = p; phaseT = 0; }

    function hash(n) { return ((n * 2654435761) >>> 0) / 4294967296; }

    const FONT = "'Iowan Old Style', 'Palatino Linotype', Georgia, serif";

    // ===== 3D ROCKET =====
    const rEdges = [];
    const SI = 10, BR = 0.25, NT = -2.0, BT = -0.8, BB = 0.9, NZR = 0.32;
    for (let i = 0; i < SI; i++) {
      const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
      const c1 = Math.cos(a1), s1 = Math.sin(a1), c2 = Math.cos(a2), s2 = Math.sin(a2);
      rEdges.push([c1*BR, BT, s1*BR, c2*BR, BT, s2*BR]);
      rEdges.push([c1*BR, BB, s1*BR, c2*BR, BB, s2*BR]);
      rEdges.push([c1*NZR, BB+0.12, s1*NZR, c2*NZR, BB+0.12, s2*NZR]);
      rEdges.push([c1*BR, BT, s1*BR, c1*BR, BB, s1*BR]);
      rEdges.push([c1*BR, BT, s1*BR, 0, NT, 0]);
      rEdges.push([c1*BR, BB, s1*BR, c1*NZR, BB+0.12, s1*NZR]);
    }
    for (let b = 1; b <= 3; b++) {
      const by = BT + (BB - BT) * (b / 4);
      for (let i = 0; i < SI; i++) {
        const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
        rEdges.push([Math.cos(a1)*BR, by, Math.sin(a1)*BR, Math.cos(a2)*BR, by, Math.sin(a2)*BR]);
      }
    }
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 8;
      const fc = Math.cos(a), fs = Math.sin(a), tip = BR + 0.5;
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*tip, BB+0.4, fs*tip]);
      rEdges.push([fc*tip, BB+0.4, fs*tip, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
    }

    function drawRocket(cx, cy, rotY, sc, alpha) {
      const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
      ctx.lineCap = "round";
      for (let pass = 0; pass < 2; pass++) {
        ctx.lineWidth = pass === 0 ? 3.2 : 1.0;
        for (const e of rEdges) {
          const rx1 = e[0]*cosR - e[2]*sinR, rz1 = e[0]*sinR + e[2]*cosR;
          const rx2 = e[3]*cosR - e[5]*sinR, rz2 = e[3]*sinR + e[5]*cosR;
          const f = 450;
          const p1 = f / (f + rz1*sc), p2 = f / (f + rz2*sc);
          const depth = (rz1 + rz2) * 0.5;
          const da = pass === 0 ? alpha * 0.08 : alpha * Math.max(0.2, 1 - depth * 0.4) * 0.8;
          const col = pass === 0 ? "140,190,255" : "220,235,255";
          ctx.strokeStyle = "rgba(" + col + "," + da + ")";
          ctx.beginPath();
          ctx.moveTo(cx + rx1*sc*p1, cy + e[1]*sc*p1);
          ctx.lineTo(cx + rx2*sc*p2, cy + e[4]*sc*p2);
          ctx.stroke();
        }
      }
    }

    // ===== LAUNCH STATE =====
    let rY = H * 0.65, rVel = 0, rRot = 0;
    const exhaust = [];
    const bgStars = [];
    for (let i = 0; i < 180; i++) bgStars.push({ x: hash(i)*W, y: hash(i+999)*H, r: 0.15+hash(i+500)*0.9, b: 0.15+hash(i+250)*0.5 });

    // ===== WARP STATE =====
    const wStars = [];
    for (let i = 0; i < 500; i++) wStars.push({ x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4, z: 0.2+Math.random()*6 });
    const rings = [];
    for (let i = 0; i < 12; i++) rings.push({ z: i * 4.2, rot: hash(i+77) * Math.PI });

    // ===== CRASH STATE =====
    const cDust = [];
    let cFlash = 0;

    // ===== GAME WORLD =====
    const WL = 8000, GND = H * 0.72, TR = 3;
    const tLen = Math.ceil(WL / TR);
    const terr = new Float32Array(tLen);

    // midpoint displacement for natural terrain
    terr[0] = GND; terr[tLen - 1] = GND + 15;
    function subdivide(l, r, rough) {
      if (r - l < 2) return;
      const m = (l + r) >> 1;
      terr[m] = (terr[l] + terr[r]) * 0.5 + (Math.random() - 0.5) * rough;
      subdivide(l, m, rough * 0.62);
      subdivide(m, r, rough * 0.62);
    }
    subdivide(0, tLen - 1, 90);
    // gentle rolling hills layered on
    for (let i = 0; i < tLen; i++) {
      const x = i / tLen;
      terr[i] += Math.sin(x * 3.1 * Math.PI) * 25 + Math.sin(x * 7.3 * Math.PI + 1) * 12;
    }
    // craters
    const craters = [];
    for (let g = 0; g < 5; g++) {
      const gx = 800 + g * 1400 + hash(g+33) * 400;
      const gw = 40 + hash(g+44) * 60;
      const gd = 80 + hash(g+55) * 80;
      craters.push({ x: gx, w: gw, d: gd });
      const si = Math.max(0, Math.floor((gx - gw * 1.2) / TR));
      const ei = Math.min(tLen, Math.ceil((gx + gw * 1.2) / TR));
      for (let i = si; i < ei; i++) {
        const d = Math.abs(i * TR - gx) / gw;
        if (d < 1) terr[i] += gd * (1 - d * d);
        else if (d < 1.2) terr[i] -= gd * 0.15 * (1 - (d - 1) / 0.2);
      }
    }
    function terrY(wx) {
      const fi = wx / TR;
      const i0 = Math.max(0, Math.min(tLen - 1, Math.floor(fi)));
      const i1 = Math.min(tLen - 1, i0 + 1);
      return terr[i0] * (1 - (fi - i0)) + terr[i1] * (fi - i0);
    }

    // natural mountain silhouettes with many points
    const mtnLayers = [];
    for (let L = 0; L < 3; L++) {
      const pts = [];
      const step = 20 + L * 12;
      const amp = 40 + (2 - L) * 30;
      for (let x = -200; x < WL + 400; x += step) {
        const h = amp * (0.3 + 0.7 * hash(x * 31 + L * 7919));
        pts.push({ x: x, y: GND - h });
      }
      mtnLayers.push(pts);
    }

    // scattered rocks as irregular polygons
    const rocks = [];
    for (let i = 0; i < 45; i++) {
      const rx = 200 + hash(i * 97) * (WL - 600);
      const rh = 4 + hash(i * 53) * 14;
      const rw = rh * (0.6 + hash(i * 71) * 0.8);
      const verts = [];
      const nv = 5 + Math.floor(hash(i * 37) * 4);
      for (let v = 0; v < nv; v++) {
        const a = (v / nv) * Math.PI * 2;
        const rad = (0.7 + hash(i * 13 + v * 41) * 0.3);
        verts.push({ x: Math.cos(a) * rw * rad, y: -Math.abs(Math.sin(a)) * rh * rad });
      }
      rocks.push({ x: rx, verts: verts });
    }

    const gameDust = [];
    for (let i = 0; i < 80; i++) {
      gameDust.push({
        x: Math.random() * WL, y: GND - 250 + Math.random() * 350,
        vx: 4 + Math.random() * 14, s: 0.3 + Math.random() * 1.5,
        a: 0.02 + Math.random() * 0.06,
      });
    }

    const skyStars = [];
    for (let i = 0; i < 200; i++) {
      skyStars.push({ x: hash(i+200) * WL * 1.5, y: hash(i+400) * GND * 0.6, r: 0.15 + hash(i+600) * 1.0, tw: hash(i+800) * Math.PI * 2 });
    }

    // shooting stars (periodic)
    const shooters = [];
    let shootTimer = 4 + Math.random() * 6;

    const MON_X = WL - 400, MON_W = 24, MON_H = 80;
    let monHit = false, monT = 0;

    const P = { x: 80, y: 0, vx: 0, vy: 0, w: 10, h: 22, g: false, face: 1, wt: 0 };
    P.y = terrY(P.x) - P.h;
    let cam = 0;
    const pTrail = [];

    // ======== LAUNCH ========
    function drawLaunch(dt) {
      ctx.fillStyle = "#020204";
      ctx.fillRect(0, 0, W, H);

      for (const s of bgStars) {
        ctx.fillStyle = "rgba(232,230,223," + s.b + ")";
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }

      // phase 0-2s: dark stillness, rocket visible, subtle rumble building
      // phase 2-2.4s: ignition — bright glow blooms
      // phase 2.4s+: lift, accelerating

      const ignitionT = 2.0;
      const liftT = 2.4;

      // pre-ignition rumble
      let shX = 0, shY = 0;
      if (phaseT > 1.0 && phaseT < ignitionT) {
        const ri = (phaseT - 1.0) / (ignitionT - 1.0);
        shX = (Math.random() - 0.5) * ri * 2;
        shY = (Math.random() - 0.5) * ri * 2;
      }
      // post-ignition shake intensifies
      if (phaseT >= ignitionT) {
        const pi = Math.min(1, (phaseT - ignitionT) / 2);
        const mag = 2 + pi * 8;
        shX = (Math.random() - 0.5) * mag;
        shY = (Math.random() - 0.5) * mag;
      }

      ctx.save();
      ctx.translate(shX, shY);

      rRot += dt * 0.4;
      if (phaseT > liftT) {
        const accelT = phaseT - liftT;
        rVel += (200 + accelT * 350) * dt;
        rY -= rVel * dt;
      }

      const rsx = W / 2, rsy = rY;

      // exhaust (only after ignition)
      if (phaseT >= ignitionT && rsy > -150) {
        const power = Math.min(1, (phaseT - ignitionT) / 0.5);
        const cnt = Math.floor(3 + power * 8);
        for (let i = 0; i < cnt; i++) {
          const spread = 6 + power * 12;
          exhaust.push({
            x: rsx + (Math.random() - 0.5) * spread,
            y: rsy + 42,
            vx: (Math.random() - 0.5) * 50 * power,
            vy: 40 + Math.random() * 120 * power,
            life: 0.6 + Math.random() * 0.5,
            r: 1 + Math.random() * 3.5,
            hot: Math.random() > 0.3,
          });
        }
      }

      for (let i = exhaust.length - 1; i >= 0; i--) {
        const p = exhaust[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 15 * dt; p.life -= dt * 1.4;
        if (p.life <= 0) { exhaust.splice(i, 1); continue; }
        const la = p.life * (p.hot ? 0.9 : 0.65);
        ctx.fillStyle = p.hot
          ? "rgba(255,250,240," + la + ")"
          : "rgba(255," + Math.floor(130 + p.life * 90) + "," + Math.floor(30 + p.life * 40) + "," + la + ")";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.2 + p.life * 0.8), 0, Math.PI * 2); ctx.fill();
      }

      // engine glow (blooms at ignition)
      if (phaseT >= ignitionT - 0.3 && rsy > -150) {
        const bloom = phaseT < ignitionT
          ? Math.pow((phaseT - (ignitionT - 0.3)) / 0.3, 2) * 0.3
          : Math.min(1, (phaseT - ignitionT) / 0.4);
        const gr = 20 + bloom * 50;
        const glow = ctx.createRadialGradient(rsx, rsy + 42, 0, rsx, rsy + 42, gr);
        glow.addColorStop(0, "rgba(255,200,100," + (bloom * 0.6) + ")");
        glow.addColorStop(0.4, "rgba(255,120,40," + (bloom * 0.25) + ")");
        glow.addColorStop(1, "rgba(255,60,15,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(rsx - gr, rsy + 42 - gr, gr * 2, gr * 2);
      }

      // speed lines (only during fast travel)
      if (phaseT > liftT + 0.8) {
        const si = Math.min(1, (phaseT - liftT - 0.8) / 1.5);
        ctx.globalAlpha = si * 0.12;
        for (let i = 0; i < 25; i++) {
          const ang = hash(i * 137) * Math.PI * 2;
          const d0 = 0.3 + hash(i * 71) * 0.7;
          const ox = Math.cos(ang) * W * 0.6 * d0;
          const oy = Math.sin(ang) * H * 0.6 * d0;
          ctx.strokeStyle = "#b0caff";
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(W/2 + ox, H/2 + oy);
          ctx.lineTo(W/2 + ox * (1 - si * 0.5), H/2 + oy * (1 - si * 0.5));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      if (rsy > -150) drawRocket(rsx, rsy, rRot, 26, 1);
      ctx.restore();

      if (rY < -160 && !fadeCallback) fadeTo("warp");
    }

    // ======== WARP ========
    function drawWarp(dt) {
      const dur = 7;
      const p = Math.min(1, phaseT / dur);
      const cx = W / 2, cy = H / 2;

      // sub-stages: drift (0-0.15), acceleration (0.15-0.4), tunnel (0.4-0.75), mars approach (0.75-1)
      let speed;
      if (p < 0.15) speed = 0.5 + p / 0.15 * 1.5;
      else if (p < 0.4) speed = 2 + ((p - 0.15) / 0.25) * 4;
      else speed = 6 + (p - 0.4) * 5;

      // background darkens
      const bg = Math.floor(3 + p * 15);
      ctx.fillStyle = "rgb(" + bg + "," + Math.floor(bg * 0.7) + "," + Math.floor(bg * 1.2) + ")";
      ctx.fillRect(0, 0, W, H);

      // color journey: cool white → deep blue → violet → warm amber
      let cr, cg, cb;
      if (p < 0.2) {
        cr = 210; cg = 225; cb = 255;
      } else if (p < 0.45) {
        const t = (p - 0.2) / 0.25;
        cr = Math.floor(210 - t * 100); cg = Math.floor(225 - t * 110); cb = Math.floor(255 - t * 30);
      } else if (p < 0.7) {
        const t = (p - 0.45) / 0.25;
        cr = Math.floor(110 + t * 90); cg = Math.floor(115 - t * 70); cb = Math.floor(225 - t * 100);
      } else {
        const t = (p - 0.7) / 0.3;
        cr = Math.floor(200 + t * 30); cg = Math.floor(45 + t * 55); cb = Math.floor(125 - t * 100);
      }

      // tunnel rings only appear in tunnel phase
      if (p > 0.35) {
        const ringAlpha = Math.min(1, (p - 0.35) / 0.1);
        for (const ring of rings) {
          ring.z -= speed * dt;
          ring.rot += dt * 0.12;
          if (ring.z < 0.1) { ring.z += 48; ring.rot = Math.random() * Math.PI; }
          const s = 350 / (350 + ring.z * 55);
          const rr = Math.min(W, H) * 0.9 * s;
          if (rr < 2) continue;
          const ra = Math.min(0.15, s * 0.15) * ringAlpha * (1 - Math.max(0, p - 0.8) * 3);
          ctx.strokeStyle = "rgba(" + cr + "," + cg + "," + cb + "," + ra + ")";
          ctx.lineWidth = Math.max(0.4, s * 2);
          ctx.beginPath();
          for (let j = 0; j <= 6; j++) {
            const a = ring.rot + (j / 6) * Math.PI * 2;
            const px = cx + Math.cos(a) * rr, py = cy + Math.sin(a) * rr;
            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
      }

      // stars
      for (const s of wStars) {
        s.z -= speed * dt;
        if (s.z < 0.05) { s.x = (Math.random()-0.5)*4; s.y = (Math.random()-0.5)*4; s.z = 5 + Math.random()*1.5; }
        const px = cx + (s.x / s.z) * W * 0.5;
        const py = cy + (s.y / s.z) * H * 0.5;
        if (px < -30 || px > W + 30 || py < -30 || py > H + 30) continue;
        const pxP = cx + (s.x / (s.z + speed * dt * 2.5)) * W * 0.5;
        const pyP = cy + (s.y / (s.z + speed * dt * 2.5)) * H * 0.5;
        const bright = Math.min(1, 0.5 / s.z);
        const len = Math.hypot(px - pxP, py - pyP);
        if (len > 1) {
          ctx.strokeStyle = "rgba(" + cr + "," + cg + "," + cb + "," + bright + ")";
          ctx.lineWidth = Math.max(0.4, 2 / s.z);
          ctx.beginPath(); ctx.moveTo(pxP, pyP); ctx.lineTo(px, py); ctx.stroke();
        } else {
          ctx.fillStyle = "rgba(" + cr + "," + cg + "," + cb + "," + (bright * 0.6) + ")";
          ctx.fillRect(px - 0.5, py - 0.5, 1, 1);
        }
      }

      // nebula wisps
      if (p > 0.2) {
        for (let i = 0; i < 3; i++) {
          const nx = cx + Math.sin(phaseT * 0.18 + i * 2.3) * W * 0.35;
          const ny = cy + Math.cos(phaseT * 0.25 + i * 3.5) * H * 0.3;
          const nr = 80 + p * 200;
          const nGrad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
          const na = (p - 0.2) * 0.04;
          nGrad.addColorStop(0, "rgba(" + Math.floor(cr*0.7) + "," + Math.floor(cg*0.5+30) + ",60," + na + ")");
          nGrad.addColorStop(1, "rgba(" + cr + "," + cg + ",50,0)");
          ctx.fillStyle = nGrad;
          ctx.fillRect(0, 0, W, H);
        }
      }

      // vignette
      const vig = ctx.createRadialGradient(cx, cy, W * 0.1, cx, cy, W * 0.7);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0," + (0.35 + p * 0.2) + ")");
      ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

      // mars approach
      if (p > 0.8) {
        const mp = (p - 0.8) / 0.2;
        const mr = mp * Math.min(W, H) * 0.8;
        const mGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(1, mr));
        mGrad.addColorStop(0, "rgba(170,65,30," + (mp * 0.9) + ")");
        mGrad.addColorStop(0.3, "rgba(140,50,25," + (mp * 0.7) + ")");
        mGrad.addColorStop(0.65, "rgba(100,35,18," + (mp * 0.4) + ")");
        mGrad.addColorStop(1, "rgba(50,18,10,0)");
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(cx, cy, mr, 0, Math.PI * 2); ctx.fill();
      }

      if (phaseT >= dur && !fadeCallback) fadeTo("crash");
    }

    // ======== CRASH ========
    function drawCrash(dt) {
      if (phaseT < 0.08) cFlash = 1;
      cFlash *= 0.82;

      const dur = 3.0;
      const pr = Math.min(1, phaseT / dur);

      // sky transitions from dark to mars sky
      const skyR = Math.floor(8 + pr * 32), skyG = Math.floor(5 + pr * 15), skyB = Math.floor(4 + pr * 10);
      ctx.fillStyle = "rgb(" + skyR + "," + skyG + "," + skyB + ")";
      ctx.fillRect(0, 0, W, H);

      // stars fade in
      if (phaseT > 0.5) {
        const sa = Math.min(1, (phaseT - 0.5) / 1.5);
        for (let i = 0; i < 50; i++) {
          ctx.fillStyle = "rgba(232,230,223," + (sa * (0.15 + hash(i+700) * 0.3)) + ")";
          ctx.fillRect(hash(i+300)*W, hash(i+400)*H*0.5, 1, 1);
        }
      }

      // terrain rushes up with jagged profile matching game terrain
      const tTop = H + 100 - pr * (H * 0.4 + 100);
      const crashTGrad = ctx.createLinearGradient(0, tTop - 20, 0, H);
      crashTGrad.addColorStop(0, "#7b3525");
      crashTGrad.addColorStop(0.1, "#6b3022");
      crashTGrad.addColorStop(1, "#3a1510");
      ctx.fillStyle = crashTGrad;
      ctx.beginPath();
      ctx.moveTo(0, tTop);
      for (let x = 0; x <= W; x += 8) {
        const jag = Math.sin(x * 0.03) * 12 + Math.sin(x * 0.08 + 2) * 6 + hash(Math.floor(x/8)) * 8;
        ctx.lineTo(x, tTop + jag);
      }
      ctx.lineTo(W, H + 10); ctx.lineTo(0, H + 10); ctx.closePath(); ctx.fill();

      // terrain edge highlight
      ctx.strokeStyle = "rgba(200,100,60,0.3)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, tTop);
      for (let x = 0; x <= W; x += 8) {
        const jag = Math.sin(x * 0.03) * 12 + Math.sin(x * 0.08 + 2) * 6 + hash(Math.floor(x/8)) * 8;
        ctx.lineTo(x, tTop + jag);
      }
      ctx.stroke();

      // camera shake
      if (phaseT < 1.0) {
        const shk = (1 - phaseT / 1.0) * 16;
        ctx.save(); ctx.translate((Math.random()-0.5)*shk, (Math.random()-0.5)*shk);
      }

      // impact dust
      if (phaseT < 0.6 && cDust.length < 200) {
        for (let i = 0; i < 14; i++) {
          const ang = Math.random() * Math.PI * 0.9 + Math.PI * 0.05;
          const spd = 100 + Math.random() * 350;
          cDust.push({
            x: W/2 + (Math.random()-0.5)*60, y: tTop + hash(cDust.length)*15,
            vx: Math.cos(ang) * spd * (Math.random()>0.5?1:-1),
            vy: -Math.sin(ang) * spd,
            life: 0.7 + Math.random()*0.6, r: 1 + Math.random()*5,
          });
        }
      }
      for (let i = cDust.length - 1; i >= 0; i--) {
        const d = cDust[i];
        d.x += d.vx * dt; d.y += d.vy * dt; d.vy += 160 * dt; d.life -= dt * 0.6;
        if (d.life <= 0) { cDust.splice(i, 1); continue; }
        ctx.fillStyle = "rgba(160,95,65," + (d.life * 0.5) + ")";
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r * (0.3 + d.life * 0.7), 0, Math.PI * 2); ctx.fill();
      }

      if (phaseT < 1.0) ctx.restore();

      if (cFlash > 0.01) {
        ctx.fillStyle = "rgba(255,255,255," + cFlash + ")";
        ctx.fillRect(0, 0, W, H);
      }

      if (phaseT >= dur && !fadeCallback) {
        fadeCallback = () => {
          P.x = 80; P.y = terrY(P.x) - P.h; P.vy = 0; P.vx = 0; cam = 0;
          phase = "game"; phaseT = 0; fadeTarget = 0;
        };
        fadeTarget = 1;
      }
    }

    // ======== GAME ========
    function drawGame(dt) {
      if (monHit) {
        monT += dt;
        if (monT > 5.5) { setPhase("ending"); return; }
      }

      if (!monHit) {
        const SPD = 200, JUMP = -300, GRAV = 380, FRIC = 0.87;
        if (keys["ArrowLeft"] || keys["KeyA"]) { P.vx -= SPD * dt * 4; P.face = -1; }
        if (keys["ArrowRight"] || keys["KeyD"]) { P.vx += SPD * dt * 4; P.face = 1; }
        if ((keys["ArrowUp"] || keys["Space"] || keys["KeyW"]) && P.g) { P.vy = JUMP; P.g = false; }
        P.vy += GRAV * dt;
        P.vx *= Math.pow(FRIC, dt * 60);
        P.vx = Math.max(-SPD, Math.min(SPD, P.vx));
        P.x += P.vx * dt; P.y += P.vy * dt;
        const ground = terrY(P.x) - P.h;
        if (P.y >= ground) { P.y = ground; P.vy = 0; P.g = true; } else { P.g = false; }
        if (P.y > H + 100) { P.x = Math.max(80, P.x - 200); P.y = terrY(P.x) - P.h - 50; P.vy = 0; }
        P.x = Math.max(10, Math.min(WL - 10, P.x));

        const monGy = terrY(MON_X);
        if (P.x + P.w/2 > MON_X - MON_W/2 && P.x - P.w/2 < MON_X + MON_W/2
            && P.y + P.h > monGy - MON_H && P.y < monGy) {
          monHit = true; monT = 0;
        }
        if (P.g && Math.abs(P.vx) > 10) P.wt += dt * 8;
        if (P.g && Math.abs(P.vx) > 25 && Math.random() < 0.35) {
          pTrail.push({ x: P.x, y: P.y + P.h, life: 1, s: 1 + Math.random() * 1.5 });
        }
        if (!P.g && Math.random() < 0.12) {
          pTrail.push({ x: P.x + (Math.random()-0.5)*4, y: P.y + P.h*0.5, life: 0.5, s: 0.4+Math.random()*0.8 });
        }
      }

      // camera with look-ahead
      const lookAhead = P.vx * 0.35;
      const targetCam = P.x + lookAhead - W * 0.38;
      cam += (targetCam - cam) * 0.06;
      cam = Math.max(0, Math.min(WL - W, cam));

      // sky gradient shifts as player progresses
      const worldProgress = P.x / WL;
      const skyGrad = ctx.createLinearGradient(0, 0, 0, GND);
      if (worldProgress < 0.5) {
        skyGrad.addColorStop(0, "#080504");
        skyGrad.addColorStop(0.5, "#140c08");
        skyGrad.addColorStop(0.85, "#22130d");
        skyGrad.addColorStop(1, "#2e1812");
      } else {
        const t = (worldProgress - 0.5) * 2;
        const r0 = Math.floor(8 + t * 10), g0 = Math.floor(5 + t * 4), b0 = Math.floor(4 + t * 8);
        skyGrad.addColorStop(0, "rgb(" + r0 + "," + g0 + "," + b0 + ")");
        skyGrad.addColorStop(0.5, "rgb(" + Math.floor(20+t*8) + "," + Math.floor(12+t*3) + "," + Math.floor(8+t*6) + ")");
        skyGrad.addColorStop(1, "#2e1812");
      }
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);

      // distant horizon glow (monolith draws you forward)
      if (worldProgress > 0.3) {
        const glowI = Math.min(0.08, (worldProgress - 0.3) * 0.12);
        const horizGlow = ctx.createRadialGradient(W * 0.85, GND, 0, W * 0.85, GND, H * 0.5);
        horizGlow.addColorStop(0, "rgba(232,230,223," + glowI + ")");
        horizGlow.addColorStop(1, "rgba(232,230,223,0)");
        ctx.fillStyle = horizGlow;
        ctx.fillRect(0, 0, W, H);
      }

      // sky stars
      const sp = cam * 0.06;
      for (const s of skyStars) {
        const sx = s.x - sp;
        if (sx < -5 || sx > W + 5) continue;
        const tw = 0.3 + 0.7 * Math.sin(s.tw + phaseT * 0.35);
        ctx.fillStyle = "rgba(232,230,223," + (tw * 0.4) + ")";
        ctx.beginPath(); ctx.arc(sx, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }

      // shooting stars
      shootTimer -= dt;
      if (shootTimer <= 0 && !monHit) {
        shootTimer = 5 + Math.random() * 10;
        shooters.push({
          x: cam + Math.random() * W, y: Math.random() * GND * 0.3,
          vx: 300 + Math.random() * 200, vy: 60 + Math.random() * 40,
          life: 0.6 + Math.random() * 0.4,
        });
      }
      for (let i = shooters.length - 1; i >= 0; i--) {
        const s = shooters[i];
        s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt * 1.2;
        if (s.life <= 0) { shooters.splice(i, 1); continue; }
        const sx = s.x - cam;
        ctx.strokeStyle = "rgba(232,230,223," + (s.life * 0.5) + ")";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(sx, s.y);
        ctx.lineTo(sx - s.vx * 0.04, s.y - s.vy * 0.04);
        ctx.stroke();
      }

      // mountains with atmospheric perspective
      const mColors = [
        [14, 8, 6, 0.5],
        [20, 12, 8, 0.65],
        [26, 16, 12, 0.8],
      ];
      const mPar = [0.1, 0.2, 0.35];
      for (let L = 0; L < 3; L++) {
        const [mr, mg, mb, ma] = mColors[L];
        const mp = cam * mPar[L];
        ctx.fillStyle = "rgba(" + mr + "," + mg + "," + mb + "," + ma + ")";
        ctx.beginPath();
        ctx.moveTo(-10, GND);
        for (const pt of mtnLayers[L]) {
          const sx = pt.x - mp;
          if (sx > W + 100) break;
          if (sx < -100) continue;
          ctx.lineTo(sx, pt.y);
        }
        ctx.lineTo(W + 10, GND);
        ctx.closePath();
        ctx.fill();
      }

      // haze at horizon
      const hazeGrad = ctx.createLinearGradient(0, GND - 50, 0, GND + 15);
      hazeGrad.addColorStop(0, "rgba(40,20,14,0)");
      hazeGrad.addColorStop(1, "rgba(40,20,14,0.2)");
      ctx.fillStyle = hazeGrad;
      ctx.fillRect(0, GND - 50, W, 65);

      // terrain
      const ti = Math.max(0, Math.floor(cam / TR));
      const te = Math.min(tLen - 1, Math.ceil((cam + W) / TR));
      const tGrad = ctx.createLinearGradient(0, GND - 40, 0, H);
      tGrad.addColorStop(0, "#6b3022");
      tGrad.addColorStop(0.12, "#5c2518");
      tGrad.addColorStop(1, "#3a1510");
      ctx.fillStyle = tGrad;
      ctx.beginPath();
      ctx.moveTo(ti * TR - cam, terr[ti]);
      for (let i = ti; i <= te; i++) ctx.lineTo(i * TR - cam, terr[i]);
      ctx.lineTo(te * TR - cam, H + 10);
      ctx.lineTo(ti * TR - cam, H + 10);
      ctx.closePath();
      ctx.fill();

      // terrain edge
      ctx.strokeStyle = "rgba(200,100,65,0.3)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(ti * TR - cam, terr[ti]);
      for (let i = ti; i <= te; i++) ctx.lineTo(i * TR - cam, terr[i]);
      ctx.stroke();

      // stable surface detail
      ctx.strokeStyle = "rgba(100,48,30,0.12)";
      ctx.lineWidth = 0.6;
      for (let i = ti; i <= te; i += 4) {
        const tx = i * TR - cam, ty = terr[i];
        const s = hash(i) * 2 - 1;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + s * 4, ty + 6 + hash(i + 999) * 10); ctx.stroke();
      }

      // rocks
      ctx.fillStyle = "#2e1510";
      for (const rock of rocks) {
        const rx = rock.x - cam;
        if (rx < -30 || rx > W + 30) continue;
        const ry = terrY(rock.x);
        ctx.beginPath();
        for (let v = 0; v < rock.verts.length; v++) {
          const vx = rx + rock.verts[v].x, vy = ry + rock.verts[v].y;
          v === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
        }
        ctx.closePath();
        ctx.fill();
      }

      // atmospheric dust
      for (const d of gameDust) {
        d.x += d.vx * dt;
        if (d.x > cam + W + 60) d.x = cam - 60;
        if (d.x < cam - 60) d.x = cam + W + 60;
        ctx.fillStyle = "rgba(160,100,70," + d.a + ")";
        ctx.fillRect(d.x - cam, d.y, d.s, d.s);
      }

      // player trail
      for (let i = pTrail.length - 1; i >= 0; i--) {
        const t = pTrail[i];
        t.life -= dt * 2;
        if (t.life <= 0) { pTrail.splice(i, 1); continue; }
        ctx.fillStyle = "rgba(140,85,60," + (t.life * 0.3) + ")";
        ctx.fillRect(t.x - cam - t.s/2, t.y - t.s/2, t.s, t.s);
      }

      // monolith
      const monSx = MON_X - cam;
      const monGy = terrY(MON_X);
      if (monSx > -80 && monSx < W + 80) {
        // monolith subtle pulse even before touch
        const prePulse = Math.sin(phaseT * 0.8) * 0.015 + 0.015;
        const monGrad = ctx.createLinearGradient(monSx - MON_W/2, monGy - MON_H, monSx + MON_W/2, monGy);
        monGrad.addColorStop(0, "#080808");
        monGrad.addColorStop(0.4, "#0e0e0e");
        monGrad.addColorStop(0.6, "#0b0b0b");
        monGrad.addColorStop(1, "#060606");
        ctx.fillStyle = monGrad;
        ctx.fillRect(monSx - MON_W/2, monGy - MON_H, MON_W, MON_H);

        if (!monHit) {
          ctx.strokeStyle = "rgba(232,230,223," + (0.04 + prePulse) + ")";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(monSx - MON_W/2, monGy - MON_H, MON_W, MON_H);
        }

        if (monHit) {
          const ga = Math.min(1, monT * 0.35);
          for (let g = 4; g > 0; g--) {
            ctx.strokeStyle = "rgba(232,230,223," + (ga * 0.12 / g) + ")";
            ctx.lineWidth = g * 5;
            ctx.strokeRect(monSx - MON_W/2, monGy - MON_H, MON_W, MON_H);
          }
          ctx.strokeStyle = "rgba(232,230,223," + (ga * 0.65) + ")";
          ctx.lineWidth = 1;
          ctx.strokeRect(monSx - MON_W/2, monGy - MON_H, MON_W, MON_H);

          // light beam expanding upward
          const beamA = Math.min(0.35, monT * 0.07);
          const beamW = MON_W * (1 + monT * 0.3);
          const beamH = 150 + monT * 60;
          const beam = ctx.createLinearGradient(monSx, monGy - MON_H - beamH, monSx, monGy - MON_H);
          beam.addColorStop(0, "rgba(232,230,223,0)");
          beam.addColorStop(1, "rgba(232,230,223," + beamA + ")");
          ctx.fillStyle = beam;
          ctx.beginPath();
          ctx.moveTo(monSx - beamW, monGy - MON_H - beamH);
          ctx.lineTo(monSx + beamW, monGy - MON_H - beamH);
          ctx.lineTo(monSx + MON_W/2, monGy - MON_H);
          ctx.lineTo(monSx - MON_W/2, monGy - MON_H);
          ctx.closePath();
          ctx.fill();
        }
      }

      // player astronaut
      const px = P.x - cam, py = P.y;
      if (!monHit || monT < 3.5) {
        const playerA = monHit ? Math.max(0, 1 - (monT - 2) / 1.5) : 1;
        ctx.globalAlpha = playerA;

        // helmet glow
        const hg = ctx.createRadialGradient(px, py, 0, px, py, 14);
        hg.addColorStop(0, "rgba(160,210,240,0.05)");
        hg.addColorStop(1, "rgba(160,210,240,0)");
        ctx.fillStyle = hg;
        ctx.fillRect(px - 14, py - 14, 28, 28);

        // helmet
        ctx.fillStyle = "#e8e6df";
        ctx.beginPath(); ctx.arc(px, py - 1, P.w * 0.48, 0, Math.PI * 2); ctx.fill();
        // visor
        ctx.fillStyle = "rgba(80,160,210,0.4)";
        ctx.beginPath(); ctx.arc(px + P.face * 1.8, py - 1.5, P.w * 0.27, 0, Math.PI * 2); ctx.fill();

        // torso
        ctx.fillStyle = "#ddd8d0";
        const bx = px - P.w/2 - 0.5, by = py + 2;
        ctx.fillRect(bx, by, P.w + 1, P.h * 0.5);
        // backpack
        ctx.fillStyle = "#c8c2b8";
        ctx.fillRect(bx + P.w + 1, by + 2, 3.5, P.h * 0.32);

        // arms
        ctx.strokeStyle = "#ddd8d0";
        ctx.lineWidth = 2.2;
        const armY = py + P.h * 0.18;
        const armSwing = P.g ? Math.sin(P.wt * 0.7) * 2.5 : 1;
        ctx.beginPath(); ctx.moveTo(bx, armY); ctx.lineTo(bx - 4 - armSwing, armY + 5.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + P.w + 1, armY); ctx.lineTo(bx + P.w + 5 + armSwing, armY + 5.5); ctx.stroke();

        // legs
        ctx.lineWidth = 2.5;
        const lo = P.g ? Math.sin(P.wt) * 5 : -3.5;
        ctx.beginPath(); ctx.moveTo(px - 2.5, py + P.h * 0.52); ctx.lineTo(px - 3.5 + lo, py + P.h); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px + 2.5, py + P.h * 0.52); ctx.lineTo(px + 3.5 - lo, py + P.h); ctx.stroke();

        // boots
        ctx.fillStyle = "#b0aa9e";
        ctx.fillRect(px - 4.5 + lo, py + P.h - 2.5, 5, 2.5);
        ctx.fillRect(px + 0.5 - lo, py + P.h - 2.5, 5, 2.5);

        ctx.globalAlpha = 1;
      }

      // game fade-in
      if (phaseT < 1.5 && !monHit) {
        const fo = 1 - phaseT / 1.5;
        ctx.fillStyle = "rgba(0,0,0," + fo + ")";
        ctx.fillRect(0, 0, W, H);
      }

      // monolith ending sequence
      if (monHit && monT > 2) {
        const fa = Math.min(1, (monT - 2) / 3);
        ctx.fillStyle = "rgba(255,255,255," + fa + ")";
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ======== ENDING ========
    function drawEnding(dt) {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, H);

      // just white. silence. then gently return home.
      if (phaseT > 3) clearWidget();
    }

    function frame(now) {
      if (activeWidget !== "play") return;
      const rawDt = (now - lastT) / 1000;
      const dt = Math.min(rawDt, 0.05);
      lastT = now;
      phaseT += dt;
      ctx.clearRect(0, 0, W, H);
      if (phase === "launch") drawLaunch(dt);
      else if (phase === "warp") drawWarp(dt);
      else if (phase === "crash") drawCrash(dt);
      else if (phase === "game") drawGame(dt);
      else if (phase === "ending") drawEnding(dt);

      if (fadeTarget > 0) {
        fadeAlpha += dt * 2.5;
        if (fadeAlpha >= 1) { fadeAlpha = 1; if (fadeCallback) { fadeCallback(); fadeCallback = null; } }
      } else if (fadeAlpha > 0) {
        fadeAlpha -= dt * 2.5;
        if (fadeAlpha < 0) fadeAlpha = 0;
      }
      if (fadeAlpha > 0) {
        ctx.fillStyle = "rgba(0,0,0," + fadeAlpha + ")";
        ctx.fillRect(0, 0, W, H);
      }

      widgetRAF = requestAnimationFrame(frame);
    }
    widgetRAF = requestAnimationFrame(frame);
  }

  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // idle: 15s without interaction on home triggers void

  let idleTimer = 0;
  let idleActive = false;

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; clearWidget(); }
    if (!$home.hidden) { idleTimer = setTimeout(startIdle, 15000); }
  }
  function startIdle() {
    if ($home.hidden || activeWidget) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // mobile shake triggers void

  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  render(currentPath());
  resetIdle();
})();
</script>
</body>
</html>
