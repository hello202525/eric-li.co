<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p { margin: 0 0 0.25em 0; }
  .bio p:last-child { margin-bottom: 0; }

  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  body.enchanted { transition: background 600ms ease; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show { opacity: 1; pointer-events: auto; }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after { opacity: 1; }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }

  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }

  body.play-mode { background: #050508; transition: background 400ms ease; }
  body.play-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.play-mode #trail { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>

<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<div class="typer" id="typer" aria-hidden="true"></div>

<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung", sugimoto: "sugimoto", tapies: "tapies",
    stieglitz: "stieglitz", atget: "atget", whistler: "whistler",
    brancusi: "brancusi", spilliaert: "spilliaert", goya: "goya",
    hugo: "hugo", schikaneder: "schikaneder", degouve: "degouve",
    khnopff: "khnopff", carriere: "carriere", ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  for (const w of WORKS) { const img = new Image(); img.src = w.src; }

  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // routing

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      $home.hidden = false;
      [$work, $gallery].forEach(el => {
        el.style.transition = "";
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
      });
      return;
    }

    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : null;
    if (!el) return;
    [$work, $gallery].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked");

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }

    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // gallery

  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) { go("/" + cell.dataset.slug); } else { go("/"); }
  });

  window.addEventListener("popstate", () => render(currentPath()));

  // work viewer: click artwork to advance, click background to gallery

  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {
      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // parallax on work viewer

  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  parallaxRAF = requestAnimationFrame(applyParallax);
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    targetX = -((e.clientX - r.left - r.width / 2) / r.width) * 18;
    targetY = -((e.clientY - r.top - r.height / 2) / r.height) * 18;
  });
  $work.addEventListener("pointerleave", () => { targetX = targetY = 0; });

  // long-press on home opens random work

  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      go("/" + SLUGS[Math.floor(Math.random() * SLUGS.length)]);
    }, 700);
  });
  function cancelPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; } }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // typed commands

  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery"])];
  const WIDGETS = ["stars", "void", "mirror", "play"];
  const YEARS = {
    "1820": "goya", "1867": "hugo", "1875": "whistler", "1891": "khnopff",
    "1892": "degouve", "1898": "atget-3", "1906": "schikaneder",
    "1908": "spilliaert", "1920": "brancusi", "1927": "atget",
    "1980": "sugimoto", "1983": "tapies", "1989": "hartung",
  };

  function matchSlug() {
    if (!buf) return null;
    if (YEARS[buf]) return YEARS[buf];
    if (ARTIST_PRIMARY[buf]) return ARTIST_PRIMARY[buf];
    if (TYPEABLE.includes(buf)) return buf;
    return null;
  }

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;

    if (k === "Escape") {
      clearBuf();
      clearWidget();
      if (currentPath() !== "") go("/");
      return;
    }
    if (activeWidget === "stars" || activeWidget === "mirror" || activeWidget === "play") return;
    if (k === "Backspace") {
      if (buf.length) {
        buf = buf.slice(0, -1);
        if (!buf) { clearBuf(); return; }
        $typer.textContent = buf;
      }
      return;
    }
    if (k.length === 1 && /^[a-zA-Z0-9 .,!?'\-\/]$/.test(k)) {
      buf = (buf + k.toLowerCase()).slice(0, 18);
      $typer.textContent = buf;
      $typer.classList.add("show");
      clearTimeout(bufTimer);
      bufTimer = setTimeout(clearBuf, 1600);

      const m = matchSlug();
      if (m) { clearBuf(); go("/" + m); return; }
      if (WIDGETS.includes(buf)) { const w = buf; clearBuf(); fireWidget(w); return; }
      if (buf === "eric") {
        clearBuf();
        window.open("https://www.linkedin.com/in/eric-li-226850249/", "_blank");
        return;
      }
    }
  });

  // "beautiful things" hover

  if ($end) {
    $end.addEventListener("click", (e) => { e.preventDefault(); go("/gallery"); });

    const text = $end.textContent;
    const bioEl = $end.closest(".bio");
    $end.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
      const s = document.createElement("span");
      s.textContent = text[i] === " " ? "\u00A0" : text[i];
      $end.appendChild(s);
    }
    const letters = $end.querySelectorAll("span");

    const enchantedTones = [
      "#f0e6c8", "#e8e0d0", "#dce4e0", "#e0d8e8", "#d8e0e8",
      "#e8dcd0", "#d0dce0", "#e4ddd0", "#d8d8e0", "#e0e4d8",
    ];
    let lastTone = -1;
    $end.addEventListener("mouseenter", () => {
      if (activeWidget) return;
      let pick = lastTone;
      while (pick === lastTone) pick = Math.floor(Math.random() * enchantedTones.length);
      lastTone = pick;
      document.body.style.background = enchantedTones[pick];
      document.body.classList.add("enchanted");
      if (bioEl) bioEl.classList.add("enchanted");
      letters.forEach(s => {
        const tx = (Math.random() - 0.5) * 24;
        const ty = (Math.random() - 0.5) * 18;
        const r = (Math.random() - 0.5) * 16;
        s.style.transform = "translate(" + tx + "px," + ty + "px) rotate(" + r + "deg)";
      });
    });
    $end.addEventListener("mouseleave", () => {
      if (activeWidget) return;
      document.body.style.background = "";
      document.body.classList.remove("enchanted");
      if (bioEl) bioEl.classList.remove("enchanted");
      letters.forEach(s => { s.style.transform = ""; });
    });
  }

  // konami code opens gallery

  const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
  let kIdx = 0;
  window.addEventListener("keydown", (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (k === KONAMI[kIdx]) {
      kIdx++;
      if (kIdx === KONAMI.length) { kIdx = 0; go("/gallery"); }
    } else {
      kIdx = (k === KONAMI[0]) ? 1 : 0;
    }
  });

  // cursor ink trail (visible after navigating away from home)

  const trail = document.getElementById("trail");
  let tctx, tw = 0, th = 0;
  function sizeTrail() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    tw = innerWidth; th = innerHeight;
    trail.width = Math.round(tw * dpr);
    trail.height = Math.round(th * dpr);
    trail.style.width = tw + "px";
    trail.style.height = th + "px";
    tctx = trail.getContext("2d");
    tctx.setTransform(1, 0, 0, 1, 0, 0);
    tctx.scale(dpr, dpr);
  }
  sizeTrail();
  addEventListener("resize", sizeTrail);

  const pts = [];
  const LIFE = 900;
  addEventListener("pointermove", (e) => {
    if (!document.body.classList.contains("unlocked")) return;
    const last = pts[pts.length - 1];
    if (last) {
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      if (dx*dx + dy*dy < 9) return;
    }
    pts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  }, { passive: true });

  function trailLoop() {
    const now = performance.now();
    while (pts.length && now - pts[0].t > LIFE) pts.shift();
    if (tctx) {
      tctx.clearRect(0, 0, tw, th);
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const age = (now - p.t) / LIFE;
        const a = (1 - age) * 0.16;
        const r = 0.8 + (1 - age) * 3.2;
        tctx.fillStyle = "rgba(17, 17, 17, " + a + ")";
        tctx.beginPath();
        tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        tctx.fill();
      }
    }
    requestAnimationFrame(trailLoop);
  }
  requestAnimationFrame(trailLoop);

  // widgets

  const $widget = document.getElementById("widget");
  const $widgetCanvas = document.getElementById("widget-canvas");
  let widgetTimer = 0;
  let widgetRAF = 0;
  let activeWidget = "";
  let voidRevealTimer = 0;
  let mirrorStream = null;
  let playCleanup = null;

  function clearWidget() {
    clearTimeout(widgetTimer);
    clearTimeout(voidRevealTimer);
    cancelAnimationFrame(widgetRAF);
    activeWidget = "";
    $widget.classList.remove("show");
    $widgetCanvas.classList.remove("show");
    document.body.classList.remove("stars-mode", "void-mode", "mirror-mode", "play-mode");
    if (playCleanup) { playCleanup(); playCleanup = null; }
    $widget.innerHTML = "";
    if (mirrorStream) {
      mirrorStream.getTracks().forEach(t => t.stop());
      mirrorStream = null;
    }
    try {
      const ctx = $widgetCanvas.getContext("2d");
      ctx.globalCompositeOperation = "source-over";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, $widgetCanvas.width, $widgetCanvas.height);
    } catch (e) {}
  }

  function sizeWidgetCanvas() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    $widgetCanvas.width = Math.round(innerWidth * dpr);
    $widgetCanvas.height = Math.round(innerHeight * dpr);
    $widgetCanvas.style.width = innerWidth + "px";
    $widgetCanvas.style.height = innerHeight + "px";
    const ctx = $widgetCanvas.getContext("2d");
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return ctx;
  }

  function fireWidget(kind) {
    if (kind === activeWidget) return;
    clearWidget();
    document.body.style.background = "";
    document.body.classList.remove("enchanted");
    const bioEl = document.querySelector(".bio");
    if (bioEl) bioEl.classList.remove("enchanted");
    activeWidget = kind;
    if (kind === "stars") { runStars(); return; }
    if (kind === "void") { runVoid(); return; }
    if (kind === "mirror") { runMirror(); return; }
    if (kind === "play") { runPlay(); return; }
  }

  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: Math.cos(angle) * drift, vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w; sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10; sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 1.0, len: 60 + Math.random() * 80, size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  function runVoid() {
    document.body.classList.add("void-mode");
    voidRevealTimer = setTimeout(() => {
      if (activeWidget !== "void") return;
      $widget.innerHTML = '<div style="color:rgba(232,230,223,0.7);font-family:\'Iowan Old Style\',Georgia,serif;font-size:clamp(28px,2.8vw,36px);letter-spacing:0.08em;font-style:italic;opacity:0;transition:opacity 2s ease">In the void is virtue, and no evil</div>';
      $widget.classList.add("show");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const d = $widget.querySelector("div");
          if (d) d.style.opacity = "1";
        });
      });
    }, 1500);
    widgetTimer = setTimeout(clearWidget, 8000);
  }

  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  function runPlay() {
    const ctx = sizeWidgetCanvas();
    const W = innerWidth, H = innerHeight;
    document.body.classList.add("play-mode");
    $widgetCanvas.classList.add("show");

    let phase = "launch";
    let phaseT = 0;
    let lastT = performance.now();

    const keys = {};
    function kd(e) {
      keys[e.code] = true;
      if (phase === "game" && /^(Arrow|Space)/.test(e.code)) e.preventDefault();
    }
    function ku(e) { keys[e.code] = false; }
    addEventListener("keydown", kd, { capture: true });
    addEventListener("keyup", ku);
    playCleanup = () => {
      removeEventListener("keydown", kd, { capture: true });
      removeEventListener("keyup", ku);
      if (crashGL) { crashGL.destroy(); crashGL = null; }
    };

    let fadeAlpha = 0;
    let fadeTarget = 0;
    let fadeCallback = null;

    function fadeTo(p) {
      fadeTarget = 1;
      fadeCallback = () => { phase = p; phaseT = 0; fadeTarget = 0; };
    }
    function setPhase(p) { phase = p; phaseT = 0; }

    function hash(n) { return ((n * 2654435761) >>> 0) / 4294967296; }

    const FONT = "'Iowan Old Style', 'Palatino Linotype', Georgia, serif";

    // ===== 3D ROCKET =====
    const rEdges = [];
    const SI = 10, BR = 0.25, NT = -2.0, BT = -0.8, BB = 0.9, NZR = 0.32;
    for (let i = 0; i < SI; i++) {
      const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
      const c1 = Math.cos(a1), s1 = Math.sin(a1), c2 = Math.cos(a2), s2 = Math.sin(a2);
      rEdges.push([c1*BR, BT, s1*BR, c2*BR, BT, s2*BR]);
      rEdges.push([c1*BR, BB, s1*BR, c2*BR, BB, s2*BR]);
      rEdges.push([c1*NZR, BB+0.12, s1*NZR, c2*NZR, BB+0.12, s2*NZR]);
      rEdges.push([c1*BR, BT, s1*BR, c1*BR, BB, s1*BR]);
      rEdges.push([c1*BR, BT, s1*BR, 0, NT, 0]);
      rEdges.push([c1*BR, BB, s1*BR, c1*NZR, BB+0.12, s1*NZR]);
    }
    for (let b = 1; b <= 3; b++) {
      const by = BT + (BB - BT) * (b / 4);
      for (let i = 0; i < SI; i++) {
        const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
        rEdges.push([Math.cos(a1)*BR, by, Math.sin(a1)*BR, Math.cos(a2)*BR, by, Math.sin(a2)*BR]);
      }
    }
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 8;
      const fc = Math.cos(a), fs = Math.sin(a), tip = BR + 0.5;
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*tip, BB+0.4, fs*tip]);
      rEdges.push([fc*tip, BB+0.4, fs*tip, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
    }

    function drawRocket(cx, cy, rotY, sc, alpha) {
      const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
      ctx.lineCap = "round";
      for (let pass = 0; pass < 2; pass++) {
        ctx.lineWidth = pass === 0 ? 3.2 : 1.0;
        for (const e of rEdges) {
          const rx1 = e[0]*cosR - e[2]*sinR, rz1 = e[0]*sinR + e[2]*cosR;
          const rx2 = e[3]*cosR - e[5]*sinR, rz2 = e[3]*sinR + e[5]*cosR;
          const f = 450;
          const p1 = f / (f + rz1*sc), p2 = f / (f + rz2*sc);
          const depth = (rz1 + rz2) * 0.5;
          const da = pass === 0 ? alpha * 0.08 : alpha * Math.max(0.2, 1 - depth * 0.4) * 0.8;
          const col = pass === 0 ? "140,190,255" : "220,235,255";
          ctx.strokeStyle = "rgba(" + col + "," + da + ")";
          ctx.beginPath();
          ctx.moveTo(cx + rx1*sc*p1, cy + e[1]*sc*p1);
          ctx.lineTo(cx + rx2*sc*p2, cy + e[4]*sc*p2);
          ctx.stroke();
        }
      }
    }

    // ===== LAUNCH STATE =====
    let rY = H * 0.65, rVel = 0, rRot = 0;
    const exhaust = [];
    const bgStars = [];
    for (let i = 0; i < 3000; i++) bgStars.push({
      x: hash(i + 17117) * W,
      y: hash(i + 31547) * H,
      r: 0.1 + Math.pow(hash(i + 48973), 3) * 1.3,
      b: 0.08 + hash(i + 62131) * 0.85,
      tw: hash(i + 79393) * 6.28,
      twSpd: 0.1 + hash(i + 91807) * 2.0,
    });

    // ===== WARP STATE =====
    const wStars = [];
    for (let i = 0; i < 1200; i++) wStars.push({
      a: Math.random() * Math.PI * 2,
      d: 0.05 + Math.pow(Math.random(), 0.7) * 1.2,
      z: Math.random(),
      spd: 0.6 + Math.random() * 0.6,
      w: 0.4 + Math.pow(Math.random(), 2) * 3.5,
      hue: Math.random(),
    });

    // ===== CRASH STATE =====

    // ===== DRIFT WORLD (3rd person astronaut) =====
    const DRIFT_DUR = 35;
    const dCx = W / 2, dCy = H / 2;

    const farStars = [];
    for (let i = 0; i < 500; i++) farStars.push({
      x: (hash(i * 31) - 0.5) * 6, y: (hash(i * 59) - 0.5) * 5,
      z: 0.5 + hash(i * 97) * 12,
      r: 0.15 + hash(i * 13) * 0.6,
      tw: hash(i * 41) * 6.28,
      bright: 0.2 + hash(i * 77) * 0.8,
    });

    const spaceDebris = [];
    for (let i = 0; i < 80; i++) {
      spaceDebris.push({
        x: (hash(i * 53) - 0.5) * 8,
        y: (hash(i * 67) - 0.5) * 6,
        z: 2 + hash(i * 83) * 50,
        sz: 0.3 + hash(i * 29) * 2.5,
        warm: hash(i * 41),
        rotSpd: (hash(i * 19) - 0.5) * 2,
      });
    }

    const nebulae = [];
    for (let i = 0; i < 6; i++) nebulae.push({
      x: (hash(i * 137) - 0.5) * 4,
      y: (hash(i * 211) - 0.5) * 3,
      z: 5 + hash(i * 173) * 35,
      r: 150 + hash(i * 97) * 250,
      cr: Math.floor(40 + hash(i * 61) * 100),
      cg: Math.floor(20 + hash(i * 43) * 60),
      cb: Math.floor(80 + hash(i * 89) * 120),
    });

    const P = { x: 0, y: 0, vx: 0, vy: 0, tilt: 0, tumble: 0 };
    let driftZ = 0;
    let ended = false;

    // ======== LAUNCH ========
    function drawLaunch(dt) {
      ctx.fillStyle = "#020204";
      ctx.fillRect(0, 0, W, H);

      // star field: gentle rotation of entire field + twinkle
      const fieldRot = phaseT < 1.5 ? phaseT * 0.002 : 0.003 + (phaseT - 1.5) * 0.008;
      const cosR = Math.cos(phaseT * fieldRot), sinR = Math.sin(phaseT * fieldRot);
      const scx = W / 2, scy = H / 2;
      for (const s of bgStars) {
        const dx = s.x - scx, dy = s.y - scy;
        const sx = scx + dx * cosR - dy * sinR;
        const sy = scy + dx * sinR + dy * cosR;
        const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.tw + phaseT * s.twSpd));
        const bright = s.b * twinkle;
        if (bright < 0.03) continue;
        ctx.fillStyle = "rgba(225,223,218," + bright + ")";
        ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI * 2); ctx.fill();
      }

      const ignitionT = 2.0;
      const liftT = 2.4;

      // pre-ignition rumble
      let shX = 0, shY = 0;
      if (phaseT > 1.0 && phaseT < ignitionT) {
        const ri = (phaseT - 1.0) / (ignitionT - 1.0);
        shX = (Math.random() - 0.5) * ri * 2;
        shY = (Math.random() - 0.5) * ri * 2;
      }
      // post-ignition shake intensifies
      if (phaseT >= ignitionT) {
        const pi = Math.min(1, (phaseT - ignitionT) / 2);
        const mag = 2 + pi * 8;
        shX = (Math.random() - 0.5) * mag;
        shY = (Math.random() - 0.5) * mag;
      }

      ctx.save();
      ctx.translate(shX, shY);

      const spinRate = phaseT < 1 ? 0.1 : phaseT < ignitionT ? 0.1 + (phaseT - 1) * 0.8 : 1.0 + (phaseT - ignitionT) * 2.5;
      rRot += dt * spinRate;
      if (phaseT > liftT) {
        const accelT = phaseT - liftT;
        rVel += (200 + accelT * 350) * dt;
        rY -= rVel * dt;
      }

      const rsx = W / 2, rsy = rY;

      // exhaust (only after ignition)
      if (phaseT >= ignitionT && rsy > -150) {
        const power = Math.min(1, (phaseT - ignitionT) / 0.5);
        const cnt = Math.floor(3 + power * 8);
        for (let i = 0; i < cnt; i++) {
          const spread = 6 + power * 12;
          exhaust.push({
            x: rsx + (Math.random() - 0.5) * spread,
            y: rsy + 42,
            vx: (Math.random() - 0.5) * 50 * power,
            vy: 40 + Math.random() * 120 * power,
            life: 0.6 + Math.random() * 0.5,
            r: 1 + Math.random() * 3.5,
            hot: Math.random() > 0.3,
          });
        }
      }

      for (let i = exhaust.length - 1; i >= 0; i--) {
        const p = exhaust[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 15 * dt; p.life -= dt * 1.4;
        if (p.life <= 0) { exhaust.splice(i, 1); continue; }
        const la = p.life * (p.hot ? 0.9 : 0.65);
        ctx.fillStyle = p.hot
          ? "rgba(255,250,240," + la + ")"
          : "rgba(255," + Math.floor(130 + p.life * 90) + "," + Math.floor(30 + p.life * 40) + "," + la + ")";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.2 + p.life * 0.8), 0, Math.PI * 2); ctx.fill();
      }

      // engine glow (blooms at ignition)
      if (phaseT >= ignitionT - 0.3 && rsy > -150) {
        const bloom = phaseT < ignitionT
          ? Math.pow((phaseT - (ignitionT - 0.3)) / 0.3, 2) * 0.3
          : Math.min(1, (phaseT - ignitionT) / 0.4);
        const gr = 20 + bloom * 50;
        const glow = ctx.createRadialGradient(rsx, rsy + 42, 0, rsx, rsy + 42, gr);
        glow.addColorStop(0, "rgba(255,200,100," + (bloom * 0.6) + ")");
        glow.addColorStop(0.4, "rgba(255,120,40," + (bloom * 0.25) + ")");
        glow.addColorStop(1, "rgba(255,60,15,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(rsx - gr, rsy + 42 - gr, gr * 2, gr * 2);
      }

      // speed lines (only during fast travel)
      if (phaseT > liftT + 0.8) {
        const si = Math.min(1, (phaseT - liftT - 0.8) / 1.5);
        ctx.globalAlpha = si * 0.12;
        for (let i = 0; i < 25; i++) {
          const ang = hash(i * 137) * Math.PI * 2;
          const d0 = 0.3 + hash(i * 71) * 0.7;
          const ox = Math.cos(ang) * W * 0.6 * d0;
          const oy = Math.sin(ang) * H * 0.6 * d0;
          ctx.strokeStyle = "#b0caff";
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(W/2 + ox, H/2 + oy);
          ctx.lineTo(W/2 + ox * (1 - si * 0.5), H/2 + oy * (1 - si * 0.5));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      if (rsy > -150) drawRocket(rsx, rsy, rRot, 26, 1);
      ctx.restore();

      if (rY < -160 && !fadeCallback) fadeTo("warp");
    }

    // ======== WARP ========
    function drawWarp(dt) {
      const dur = 7;
      const p = Math.min(1, phaseT / dur);
      const cx = W / 2, cy = H / 2;
      const diag = Math.hypot(W, H);

      let speed;
      if (p < 0.04) speed = 0;
      else if (p < 0.1) speed = Math.pow((p - 0.04) / 0.06, 3) * 1.0;
      else if (p < 0.75) speed = 1.0 + (p - 0.1) * 0.7;
      else speed = Math.max(0.05, 1.5 - (p - 0.75) * 5.5);

      const rot = phaseT * 0.04;

      // color: white-blue → cyan → violet → deep amber
      let cr, cg, cb;
      if (p < 0.1) { cr = 160; cg = 190; cb = 255; }
      else if (p < 0.3) { const t=(p-0.1)/0.2; cr=160-t*80; cg=190-t*60; cb=255; }
      else if (p < 0.55) { const t=(p-0.3)/0.25; cr=Math.floor(80+t*70); cg=Math.floor(130-t*80); cb=Math.floor(255-t*40); }
      else if (p < 0.75) { const t=(p-0.55)/0.2; cr=Math.floor(150+t*50); cg=Math.floor(50+t*20); cb=Math.floor(215-t*150); }
      else { const t=(p-0.75)/0.25; cr=Math.floor(200+t*30); cg=Math.floor(70+t*60); cb=Math.floor(65-t*40); }

      // === BACKGROUND: gradient that shifts with color journey ===
      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, diag * 0.6);
      bgGrad.addColorStop(0, "rgb(" + Math.floor(cr * 0.03) + "," + Math.floor(cg * 0.02) + "," + Math.floor(cb * 0.05) + ")");
      bgGrad.addColorStop(1, "rgb(1,1,2)");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // === TUNNEL WALLS — colored fog forming cylindrical walls ===
      if (speed > 0.2) {
        const wallI = Math.min(1, (speed - 0.2) / 0.5) * (p < 0.78 ? 1 : Math.max(0, (0.85 - p) / 0.07));
        for (let i = 0; i < 6; i++) {
          const ang = rot * 2 + i * Math.PI / 3 + Math.sin(phaseT * 0.3 + i) * 0.2;
          const dist = diag * (0.28 + Math.sin(phaseT * 0.5 + i * 1.1) * 0.06);
          const wx = cx + Math.cos(ang) * dist;
          const wy = cy + Math.sin(ang) * dist;
          const wr = diag * 0.2;
          const wGrad = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
          const wa = wallI * 0.12;
          wGrad.addColorStop(0, "rgba(" + cr + "," + cg + "," + cb + "," + wa + ")");
          wGrad.addColorStop(0.5, "rgba(" + Math.floor(cr*0.5) + "," + Math.floor(cg*0.4) + "," + Math.floor(cb*0.6) + "," + (wa * 0.4) + ")");
          wGrad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = wGrad;
          ctx.fillRect(wx - wr, wy - wr, wr * 2, wr * 2);
        }
      }

      // === INITIAL FLASH ===
      if (p > 0.03 && p < 0.13) {
        const fp = (p - 0.03) / 0.1;
        const flashA = fp < 0.15 ? fp / 0.15 : Math.max(0, 1 - (fp - 0.15) / 0.85);
        ctx.fillStyle = "rgba(200,220,255," + (flashA * 0.9) + ")";
        ctx.fillRect(0, 0, W, H);
      }

      // === TUNNEL STREAKS ===
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);

      for (const s of wStars) {
        s.z -= speed * dt * s.spd;
        if (s.z <= 0) { s.z = 1; s.a = Math.random() * Math.PI * 2; s.d = 0.03 + Math.pow(Math.random(), 0.5) * 1.4; }
        if (s.z > 1) s.z %= 1;

        const invZ = 1 - s.z;
        const spiral = invZ * invZ * 0.25 * s.spd;
        const angle = s.a + spiral;
        const radius = s.d * diag * 0.6 * invZ;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        if (Math.abs(x) > W * 0.6 || Math.abs(y) > H * 0.6) continue;

        const innerInvZ = Math.max(0, invZ - speed * dt * s.spd * 4);
        const innerR = s.d * diag * 0.6 * innerInvZ;
        const x2 = Math.cos(angle) * innerR;
        const y2 = Math.sin(angle) * innerR;

        const bright = Math.min(1, invZ * invZ * 3.0) * Math.min(1, speed * 1.8);
        if (bright < 0.01) continue;

        const sr = Math.min(255, Math.max(0, cr + (s.hue - 0.5) * 100));
        const sg = Math.min(255, Math.max(0, cg + (s.hue - 0.5) * 70));
        const sb = Math.min(255, Math.max(0, cb + (s.hue - 0.5) * 50));

        const lw = s.w * invZ * 2.5;
        ctx.strokeStyle = "rgba(" + Math.floor(sr) + "," + Math.floor(sg) + "," + Math.floor(sb) + "," + (bright * 0.9) + ")";
        ctx.lineWidth = lw;
        ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x, y); ctx.stroke();

        if (invZ > 0.6 && s.w > 1.2) {
          ctx.strokeStyle = "rgba(255,255,255," + (bright * 0.6) + ")";
          ctx.lineWidth = lw * 0.3;
          ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x, y); ctx.stroke();
        }

        // bloom on very close streaks
        if (invZ > 0.88 && s.w > 2 && s.d > 0.5) {
          const fi = (invZ - 0.88) / 0.12;
          const fr = 30 + fi * 80;
          const fg = ctx.createRadialGradient(x, y, 0, x, y, fr);
          fg.addColorStop(0, "rgba(255,255,255," + (fi * 0.4) + ")");
          fg.addColorStop(0.4, "rgba(" + Math.floor(sr) + "," + Math.floor(sg) + "," + Math.floor(sb) + "," + (fi * 0.2) + ")");
          fg.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = fg;
          ctx.fillRect(x - fr, y - fr, fr * 2, fr * 2);
        }
      }
      ctx.restore();

      // === FOREGROUND DUST — tiny bright specks in front of everything ===
      if (speed > 0.3) {
        const dustI = Math.min(1, (speed - 0.3) / 0.4);
        for (let i = 0; i < 40; i++) {
          const dx = ((hash(i * 137) + phaseT * (0.8 + hash(i * 41) * 0.5)) % 1);
          const dy = hash(i * 211);
          const px = dx * W;
          const py = dy * H;
          const da = dustI * (0.2 + hash(i * 97) * 0.5) * (1 - Math.abs(dx - 0.5) * 2);
          ctx.fillStyle = "rgba(255,255,255," + da + ")";
          ctx.fillRect(px, py, 1, 1);
        }
      }

      // === VIGNETTE (forms the tunnel) ===
      const vigR = diag * (0.42 - speed * 0.08);
      const vig = ctx.createRadialGradient(cx, cy, vigR * 0.3, cx, cy, vigR);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(0.5, "rgba(0,0,0," + (0.1 + speed * 0.15) + ")");
      vig.addColorStop(0.75, "rgba(" + Math.floor(cr*0.1) + "," + Math.floor(cg*0.08) + "," + Math.floor(cb*0.12) + "," + (0.3 + speed * 0.2) + ")");
      vig.addColorStop(1, "rgba(0,0,0," + (0.7 + speed * 0.25) + ")");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // === MARS APPROACH ===
      if (p > 0.8) {
        const mp = (p - 0.8) / 0.2;
        const mr = mp * mp * Math.min(W, H) * 0.9;
        const mGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(1, mr));
        mGrad.addColorStop(0, "rgba(180,70,32," + (mp * 0.95) + ")");
        mGrad.addColorStop(0.3, "rgba(140,50,22," + (mp * 0.7) + ")");
        mGrad.addColorStop(0.6, "rgba(90,35,15," + (mp * 0.4) + ")");
        mGrad.addColorStop(1, "rgba(40,15,8,0)");
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(cx, cy, mr, 0, Math.PI * 2); ctx.fill();
      }

      if (phaseT >= dur && !fadeCallback) fadeTo("crash");
    }

    // ======== CRASH (Gray-Scott reaction-diffusion on Mars impact) ========
    let crashGL = null;
    let crashCanvas = null;

    function initCrashGL() {
      crashCanvas = document.createElement("canvas");
      crashCanvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;z-index:8;";
      document.body.appendChild(crashCanvas);

      const dpr = Math.min(devicePixelRatio || 1, 2);
      const cW = Math.round(innerWidth * dpr);
      const cH = Math.round(innerHeight * dpr);
      crashCanvas.width = cW;
      crashCanvas.height = cH;

      const gl = crashCanvas.getContext("webgl2", { alpha: false, antialias: false, depth: false });
      if (!gl || !gl.getExtension("EXT_color_buffer_float")) return null;

      const SIM_FRAG = `#version 300 es
precision highp float;
uniform sampler2D u_state;
uniform vec2 u_res;
uniform vec2 u_mouse;
uniform float u_mouseDown;
uniform float u_mouseSpeed;
uniform float u_time;
out vec4 fragColor;
void main() {
  vec2 px = 1.0 / u_res;
  vec2 uv = gl_FragCoord.xy / u_res;
  vec2 ctr = texture(u_state, uv).rg;
  vec2 lap = -ctr;
  lap += texture(u_state, uv + vec2( px.x, 0.0)).rg * 0.2;
  lap += texture(u_state, uv + vec2(-px.x, 0.0)).rg * 0.2;
  lap += texture(u_state, uv + vec2(0.0,  px.y)).rg * 0.2;
  lap += texture(u_state, uv + vec2(0.0, -px.y)).rg * 0.2;
  lap += texture(u_state, uv + vec2( px.x,  px.y)).rg * 0.05;
  lap += texture(u_state, uv + vec2(-px.x,  px.y)).rg * 0.05;
  lap += texture(u_state, uv + vec2( px.x, -px.y)).rg * 0.05;
  lap += texture(u_state, uv + vec2(-px.x, -px.y)).rg * 0.05;
  float A = ctr.r, B = ctr.g;
  float phase = u_time * 0.015;
  float f = 0.037 + sin(phase) * 0.006 + sin(phase * 1.7) * 0.003;
  float k = 0.06 + cos(phase * 0.7) * 0.005 + cos(phase * 2.1) * 0.002;
  float Da = 1.0, Db = 0.5, dt = 1.0;
  float abb = A * B * B;
  float newA = A + (Da * lap.r - abb + f * (1.0 - A)) * dt;
  float newB = B + (Db * lap.g + abb - (k + f) * B) * dt;
  vec2 mUV = u_mouse;
  float dist = length(uv - mUV);
  float seedR = mix(0.025, 0.008, clamp(u_mouseSpeed * 3.0, 0.0, 1.0));
  float seed = smoothstep(seedR, seedR * 0.15, dist);
  if (u_mouseDown > 0.5) {
    float cs = smoothstep(0.05, 0.003, dist);
    newB = min(newB + cs * 0.9 + seed * 0.4, 1.0);
  } else if (u_mouseSpeed > 0.001) {
    newB = min(newB + seed * 0.2, 1.0);
  }
  fragColor = vec4(clamp(newA, 0.0, 1.0), clamp(newB, 0.0, 1.0), 0.0, 1.0);
}`;

      const DISP_FRAG = `#version 300 es
precision highp float;
uniform sampler2D u_state;
uniform vec2 u_res;
uniform float u_fade;
out vec4 fragColor;
vec3 palette(float b) {
  vec3 c0 = vec3(0.06, 0.02, 0.01);
  vec3 c1 = vec3(0.25, 0.08, 0.03);
  vec3 c2 = vec3(0.55, 0.22, 0.06);
  vec3 c3 = vec3(0.80, 0.45, 0.12);
  vec3 c4 = vec3(0.95, 0.85, 0.55);
  float t = clamp(b * 2.8, 0.0, 1.0);
  if (t < 0.2) return mix(c0, c1, t / 0.2);
  if (t < 0.45) return mix(c1, c2, (t - 0.2) / 0.25);
  if (t < 0.7) return mix(c2, c3, (t - 0.45) / 0.25);
  return mix(c3, c4, (t - 0.7) / 0.3);
}
void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  float b = texture(u_state, uv).g;
  vec3 col = palette(b);
  vec2 vig = uv * (1.0 - uv);
  float v = clamp(pow(vig.x * vig.y * 18.0, 0.35), 0.0, 1.0);
  col *= mix(0.5, 1.0, v);
  col *= u_fade;
  fragColor = vec4(col, 1.0);
}`;

      const VERT = `#version 300 es
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

      function compile(src, type) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src); gl.compileShader(s); return s;
      }
      function link(vs, fs) {
        const p = gl.createProgram();
        gl.attachShader(p, compile(vs, gl.VERTEX_SHADER));
        gl.attachShader(p, compile(fs, gl.FRAGMENT_SHADER));
        gl.linkProgram(p); return p;
      }

      const simProg = link(VERT, SIM_FRAG);
      const dispProg = link(VERT, DISP_FRAG);

      const vbuf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

      function bindAttrib(prog) {
        const loc = gl.getAttribLocation(prog, "a_pos");
        gl.enableVertexAttribArray(loc);
        gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      }

      function makeFBO(w, h) {
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.FLOAT, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        const fbo = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
        return { tex, fbo };
      }

      const simW = cW, simH = cH;
      let fboA = makeFBO(simW, simH);
      let fboB = makeFBO(simW, simH);

      // seed: A=1 everywhere, B=0, with radial burst of B from center
      const init = new Float32Array(simW * simH * 4);
      for (let i = 0; i < simW * simH; i++) { init[i * 4] = 1.0; init[i * 4 + 3] = 1.0; }
      const cx = simW / 2, cy = simH / 2;
      for (let ring = 0; ring < 20; ring++) {
        const r = 5 + ring * (Math.min(simW, simH) * 0.012);
        const pts = Math.floor(12 + ring * 4);
        for (let p = 0; p < pts; p++) {
          const ang = (p / pts) * Math.PI * 2 + ring * 0.3;
          const bx = cx + Math.cos(ang) * r + (Math.random() - 0.5) * 6;
          const by = cy + Math.sin(ang) * r + (Math.random() - 0.5) * 6;
          const sr = 2 + Math.random() * 4;
          for (let dy = -sr; dy <= sr; dy++) {
            for (let dx = -sr; dx <= sr; dx++) {
              if (dx * dx + dy * dy > sr * sr) continue;
              const ix = Math.round(bx + dx), iy = Math.round(by + dy);
              if (ix < 0 || ix >= simW || iy < 0 || iy >= simH) continue;
              init[(iy * simW + ix) * 4 + 1] = 1.0;
            }
          }
        }
      }
      gl.bindTexture(gl.TEXTURE_2D, fboA.tex);
      gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, simW, simH, gl.RGBA, gl.FLOAT, init);

      const simLocs = {
        state: gl.getUniformLocation(simProg, "u_state"),
        res: gl.getUniformLocation(simProg, "u_res"),
        mouse: gl.getUniformLocation(simProg, "u_mouse"),
        mouseDown: gl.getUniformLocation(simProg, "u_mouseDown"),
        mouseSpeed: gl.getUniformLocation(simProg, "u_mouseSpeed"),
        time: gl.getUniformLocation(simProg, "u_time"),
      };
      const dispLocs = {
        state: gl.getUniformLocation(dispProg, "u_state"),
        res: gl.getUniformLocation(dispProg, "u_res"),
        fade: gl.getUniformLocation(dispProg, "u_fade"),
      };

      let mx = 0.5, my = 0.5, pmx = 0.5, pmy = 0.5, mDown = 0, mSpd = 0, t = 0;

      function onMM(e) { mx = e.clientX / innerWidth; my = 1 - e.clientY / innerHeight; }
      function onMD() { mDown = 1; }
      function onMU() { mDown = 0; }
      addEventListener("pointermove", onMM);
      addEventListener("pointerdown", onMD);
      addEventListener("pointerup", onMU);

      return {
        gl, simProg, dispProg, fboA, fboB, simW, simH, cW: cW, cH: cH,
        simLocs, dispLocs, bindAttrib, vbuf,
        mx: () => mx, my: () => my, mDown: () => mDown,
        mSpd: () => mSpd, t: () => t,
        step() {
          mSpd = Math.hypot(mx - pmx, my - pmy);
          pmx = mx; pmy = my; t += 1;
        },
        destroy() {
          removeEventListener("pointermove", onMM);
          removeEventListener("pointerdown", onMD);
          removeEventListener("pointerup", onMU);
          gl.deleteTexture(fboA.tex); gl.deleteTexture(fboB.tex);
          gl.deleteFramebuffer(fboA.fbo); gl.deleteFramebuffer(fboB.fbo);
          gl.deleteProgram(simProg); gl.deleteProgram(dispProg);
          gl.deleteBuffer(vbuf);
          crashCanvas.remove(); crashCanvas = null;
        }
      };
    }

    function drawCrash(dt) {
      const dur = 7.0;
      const pr = Math.min(1, phaseT / dur);

      // 0-0.3s: white flash on 2D canvas
      if (phaseT < 0.3) {
        const fi = phaseT / 0.3;
        const flashA = fi < 0.2 ? fi / 0.2 : 1 - (fi - 0.2) / 0.8;
        ctx.fillStyle = "rgba(255,240,230," + flashA + ")";
        ctx.fillRect(0, 0, W, H);
        const shk = (1 - fi) * 20;
        ctx.save(); ctx.translate((Math.random()-0.5)*shk, (Math.random()-0.5)*shk); ctx.restore();
        return;
      }

      // init WebGL on first frame after flash
      if (!crashGL) {
        crashGL = initCrashGL();
        if (!crashGL) {
          // fallback: skip to drift
          phase = "game"; phaseT = 0;
          P.x = 0; P.y = 0; P.vx = 0; P.vy = 0; P.tilt = 0; P.tumble = 0;
          driftZ = 0; ended = false;
          return;
        }
      }

      // hide the 2D canvas behind WebGL overlay
      ctx.clearRect(0, 0, W, H);

      const g = crashGL;
      const gl = g.gl;
      g.step();

      // sim passes (10 per frame)
      gl.useProgram(g.simProg);
      g.bindAttrib(g.simProg);
      gl.viewport(0, 0, g.simW, g.simH);

      for (let i = 0; i < 10; i++) {
        gl.bindFramebuffer(gl.FRAMEBUFFER, g.fboB.fbo);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, g.fboA.tex);
        gl.uniform1i(g.simLocs.state, 0);
        gl.uniform2f(g.simLocs.res, g.simW, g.simH);
        gl.uniform2f(g.simLocs.mouse, g.mx(), g.my());
        gl.uniform1f(g.simLocs.mouseDown, g.mDown());
        gl.uniform1f(g.simLocs.mouseSpeed, g.mSpd());
        gl.uniform1f(g.simLocs.time, g.t() + i * 0.1);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        const tmp = g.fboA; g.fboA = g.fboB; g.fboB = tmp;
      }

      // display pass with fade
      let fade = 1;
      if (phaseT < 0.8) fade = (phaseT - 0.3) / 0.5;
      if (phaseT > 6.0) fade = Math.max(0, 1 - (phaseT - 6.0) / 1.0);

      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, g.cW, g.cH);
      gl.useProgram(g.dispProg);
      g.bindAttrib(g.dispProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, g.fboA.tex);
      gl.uniform1i(g.dispLocs.state, 0);
      gl.uniform2f(g.dispLocs.res, g.cW, g.cH);
      gl.uniform1f(g.dispLocs.fade, fade);
      gl.drawArrays(gl.TRIANGLES, 0, 3);

      // transition to drift after 7s
      if (phaseT >= dur) {
        g.destroy(); crashGL = null;
        P.x = 0; P.y = 0; P.vx = 0; P.vy = 0; P.tilt = 0; P.tumble = 0;
        driftZ = 0; ended = false;
        fadeTo("game");
      }
    }

    // ======== DRIFT (3rd person astronaut) ========
    function drawGame(dt) {
      if (ended) return;

      const baseSpd = 1.0;
      driftZ += dt * baseSpd;

      // responsive controls
      const accel = 4.5;
      if (keys["ArrowLeft"] || keys["KeyA"]) P.vx -= accel * dt;
      if (keys["ArrowRight"] || keys["KeyD"]) P.vx += accel * dt;
      if (keys["ArrowUp"] || keys["KeyW"]) P.vy -= accel * dt;
      if (keys["ArrowDown"] || keys["KeyS"]) P.vy += accel * dt;
      P.vx *= Math.pow(0.91, dt * 60);
      P.vy *= Math.pow(0.91, dt * 60);
      P.x += P.vx * dt * 60;
      P.y += P.vy * dt * 60;
      // soft elastic boundary (stronger pull-back the further out)
      const bx = W * 0.35, by = H * 0.3;
      if (Math.abs(P.x) > bx) P.vx -= Math.sign(P.x) * (Math.abs(P.x) - bx) * 0.02 * dt * 60;
      if (Math.abs(P.y) > by) P.vy -= Math.sign(P.y) * (Math.abs(P.y) - by) * 0.02 * dt * 60;
      P.x = Math.max(-bx * 1.3, Math.min(bx * 1.3, P.x));
      P.y = Math.max(-by * 1.3, Math.min(by * 1.3, P.y));

      const targetTilt = P.vx * 15;
      P.tilt += (targetTilt - P.tilt) * dt * 5;
      P.tumble += dt * 0.2;

      const progress = Math.min(1, driftZ / DRIFT_DUR);
      const cx = dCx, cy = dCy;

      // parallax layers from astronaut position
      const parX = -P.x * 0.2;
      const parY = -P.y * 0.2;

      // === BACKGROUND: rich gradient that evolves ===
      let bg1r, bg1g, bg1b, bg2r, bg2g, bg2b;
      if (progress < 0.3) {
        const t = progress / 0.3;
        bg1r=4+t*8; bg1g=2+t*3; bg1b=8+t*12; bg2r=2; bg2g=1; bg2b=4;
      } else if (progress < 0.6) {
        const t = (progress-0.3)/0.3;
        bg1r=12-t*6; bg1g=5+t*8; bg1b=20+t*15; bg2r=2+t*3; bg2g=1+t*4; bg2b=4+t*10;
      } else if (progress < 0.85) {
        const t = (progress-0.6)/0.25;
        bg1r=6+t*5; bg1g=13-t*5; bg1b=35-t*15; bg2r=5; bg2g=5+t*3; bg2b=14+t*5;
      } else {
        const t = (progress-0.85)/0.15;
        bg1r=11+t*12; bg1g=8+t*15; bg1b=20+t*20; bg2r=5+t*5; bg2g=8+t*8; bg2b=19+t*10;
      }
      const bgG = ctx.createRadialGradient(cx + parX * 2, cy + parY * 2, 0, cx, cy, Math.max(W, H) * 0.7);
      bgG.addColorStop(0, "rgb(" + Math.floor(bg1r) + "," + Math.floor(bg1g) + "," + Math.floor(bg1b) + ")");
      bgG.addColorStop(1, "rgb(" + Math.floor(bg2r) + "," + Math.floor(bg2g) + "," + Math.floor(bg2b) + ")");
      ctx.fillStyle = bgG;
      ctx.fillRect(0, 0, W, H);

      // === DEEP NEBULAE (large, painterly, visible) ===
      for (const n of nebulae) {
        const relZ = n.z - driftZ * 0.4;
        const wrap = relZ < -3 ? relZ + 42 : relZ;
        if (wrap > 35 || wrap < -3) continue;
        const sc = 250 / Math.max(0.5, wrap);
        const nx = cx + (n.x + parX * 0.4) * sc;
        const ny = cy + (n.y + parY * 0.4) * sc;
        const nr = n.r * sc * 0.015;
        if (nr < 20) continue;
        if (nx < -nr * 1.5 || nx > W + nr * 1.5 || ny < -nr * 1.5 || ny > H + nr * 1.5) continue;
        const depth = Math.min(1, wrap / 25);
        const nA = (1 - depth) * 0.18;
        if (nA < 0.01) continue;
        const nG = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
        nG.addColorStop(0, "rgba(" + n.cr + "," + n.cg + "," + n.cb + "," + nA + ")");
        nG.addColorStop(0.3, "rgba(" + Math.floor(n.cr*0.7) + "," + Math.floor(n.cg*0.7) + "," + Math.floor(n.cb*0.8) + "," + (nA * 0.6) + ")");
        nG.addColorStop(0.7, "rgba(" + Math.floor(n.cr*0.3) + "," + Math.floor(n.cg*0.3) + "," + Math.floor(n.cb*0.5) + "," + (nA * 0.2) + ")");
        nG.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = nG;
        ctx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
      }

      // === STAR FIELD (500 stars with proper twinkle and varying warmth) ===
      for (const s of farStars) {
        const dz = s.z - (driftZ * 0.25 % 12);
        const wz = dz < 0.15 ? dz + 12 : dz;
        const sc = 100 / wz;
        const sx = cx + (s.x + parX * 0.25) * sc;
        const sy = cy + (s.y + parY * 0.25) * sc;
        if (sx < -3 || sx > W + 3 || sy < -3 || sy > H + 3) continue;
        const tw = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.tw + phaseT * 0.5 + s.z));
        const bright = s.bright * tw * Math.min(1.2, 2.0 / wz);
        if (bright < 0.04) continue;
        const starR = Math.max(0.3, s.r * Math.min(1.5, sc * 0.035));
        // warm/cool star color
        const warm = s.tw > 3.14;
        const col = warm ? "240,220,180" : "200,215,245";
        ctx.fillStyle = "rgba(" + col + "," + Math.min(1, bright) + ")";
        ctx.beginPath(); ctx.arc(sx, sy, starR, 0, 6.28); ctx.fill();
        // glow on bright stars
        if (bright > 0.6 && starR > 0.6) {
          ctx.fillStyle = "rgba(" + col + "," + (bright * 0.15) + ")";
          ctx.beginPath(); ctx.arc(sx, sy, starR * 3, 0, 6.28); ctx.fill();
        }
      }

      // === FLOATING DEBRIS (distinct objects at mid-range) ===
      const FOV = 200;
      for (const d of spaceDebris) {
        const relZ = d.z - (driftZ * 0.7 % 52);
        const wz = relZ < 0.5 ? relZ + 52 : relZ;
        if (wz > 18) continue;
        const sc = FOV / wz;
        const sx = cx + (d.x + parX * 0.7) * sc;
        const sy = cy + (d.y + parY * 0.7) * sc;
        if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;
        const r = d.sz * sc * 0.4;
        const depth = Math.min(1, wz / 16);
        const a = (1 - depth) * 0.7;
        if (a < 0.03 || r < 0.3) continue;
        // lit side (side facing implied light source)
        const litAng = phaseT * d.rotSpd;
        const litX = Math.cos(litAng) * r * 0.3;
        const litY = Math.sin(litAng) * r * 0.3;
        const grd = ctx.createRadialGradient(sx + litX, sy + litY, 0, sx, sy, r);
        const warm = d.warm > 0.5;
        const dcr = warm ? 200 : 140;
        const dcg = warm ? 160 : 150;
        const dcb = warm ? 120 : 180;
        grd.addColorStop(0, "rgba(" + dcr + "," + dcg + "," + dcb + "," + a + ")");
        grd.addColorStop(0.5, "rgba(" + Math.floor(dcr*0.4) + "," + Math.floor(dcg*0.4) + "," + Math.floor(dcb*0.4) + "," + (a * 0.5) + ")");
        grd.addColorStop(1, "rgba(5,5,8,0)");
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, 6.28); ctx.fill();
      }

      // === MARS GLOW (fading below) ===
      if (progress < 0.25) {
        const marsA = (1 - progress / 0.25) * 0.6;
        const marsR = (1 - progress / 0.25) * H * 0.45;
        const mGlow = ctx.createRadialGradient(cx + parX, H + marsR * 0.15, 0, cx + parX, H + marsR * 0.15, marsR);
        mGlow.addColorStop(0, "rgba(160,65,28," + marsA + ")");
        mGlow.addColorStop(0.4, "rgba(100,35,15," + (marsA * 0.6) + ")");
        mGlow.addColorStop(1, "rgba(40,15,8,0)");
        ctx.fillStyle = mGlow;
        ctx.fillRect(0, H - marsR, W, marsR + 10);
      }

      // === EARTH (pale blue dot → growing) ===
      if (progress > 0.65) {
        const earthI = (progress - 0.65) / 0.35;
        const earthR = 1.5 + earthI * 8;
        const earthA = Math.min(1, earthI * 1.3);
        const ex = cx * 0.65 + parX * 0.3, ey = cy * 0.35 + parY * 0.3;
        const eGR = earthR * 18;
        const eG = ctx.createRadialGradient(ex, ey, 0, ex, ey, eGR);
        eG.addColorStop(0, "rgba(70,120,200," + (earthI * 0.12) + ")");
        eG.addColorStop(0.3, "rgba(50,90,160," + (earthI * 0.05) + ")");
        eG.addColorStop(1, "rgba(30,60,120,0)");
        ctx.fillStyle = eG;
        ctx.fillRect(ex - eGR, ey - eGR, eGR * 2, eGR * 2);
        ctx.fillStyle = "rgba(80,140,220," + earthA + ")";
        ctx.beginPath(); ctx.arc(ex, ey, earthR, 0, 6.28); ctx.fill();
        ctx.fillStyle = "rgba(160,200,240," + (earthA * 0.5) + ")";
        ctx.beginPath(); ctx.arc(ex - earthR * 0.2, ey - earthR * 0.2, earthR * 0.5, 0, 6.28); ctx.fill();
      }

      // === ASTRONAUT (small capsule) ===
      const ax = cx + P.x;
      const ay = cy + H * 0.18 + P.y;
      const S = Math.min(W, H) * 0.016;

      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(P.tilt * 0.02 + Math.sin(P.tumble) * 0.03);

      const glow = ctx.createRadialGradient(0, 0, S, 0, 0, S * 6);
      glow.addColorStop(0, "rgba(100,150,210,0.07)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(-S * 6, -S * 6, S * 12, S * 12);

      ctx.beginPath();
      ctx.ellipse(0, 0, S * 0.6, S * 1.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(8,8,12,0.92)";
      ctx.fill();
      ctx.strokeStyle = "rgba(120,155,210,0.3)";
      ctx.lineWidth = S * 0.1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -S * 0.9, S * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(10,10,16,0.95)";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, -S * 0.9, S * 0.35, -0.7, 0.7);
      ctx.strokeStyle = "rgba(80,120,190,0.35)";
      ctx.lineWidth = S * 0.08;
      ctx.stroke();

      ctx.restore();

      // === POST-PROCESSING ===

      // vignette
      const vig = ctx.createRadialGradient(cx, cy, W * 0.2, cx, cy, W * 0.65);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0,0.45)");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // fade-in
      if (phaseT < 1.5) {
        ctx.fillStyle = "rgba(0,0,0," + (1 - phaseT / 1.5) + ")";
        ctx.fillRect(0, 0, W, H);
      }


      // ending: white wash → homepage
      if (progress > 0.92) {
        const fa = Math.min(1, (progress - 0.92) / 0.08);
        ctx.fillStyle = "rgba(255,255,255," + (fa * fa) + ")";
        ctx.fillRect(0, 0, W, H);
        if (fa > 0.98 && !ended) { ended = true; clearWidget(); }
      }
    }

    // ======== ENDING (unused, clearWidget called directly) ========
    function drawEnding(dt) { clearWidget(); }

    function frame(now) {
      if (activeWidget !== "play") return;
      const rawDt = (now - lastT) / 1000;
      const dt = Math.min(rawDt, 0.05);
      lastT = now;
      phaseT += dt;
      ctx.clearRect(0, 0, W, H);
      if (phase === "launch") drawLaunch(dt);
      else if (phase === "warp") drawWarp(dt);
      else if (phase === "crash") drawCrash(dt);
      else if (phase === "game") drawGame(dt);
      else if (phase === "ending") drawEnding(dt);

      if (fadeTarget > 0) {
        fadeAlpha += dt * 2.5;
        if (fadeAlpha >= 1) { fadeAlpha = 1; if (fadeCallback) { fadeCallback(); fadeCallback = null; } }
      } else if (fadeAlpha > 0) {
        fadeAlpha -= dt * 2.5;
        if (fadeAlpha < 0) fadeAlpha = 0;
      }
      if (fadeAlpha > 0) {
        ctx.fillStyle = "rgba(0,0,0," + fadeAlpha + ")";
        ctx.fillRect(0, 0, W, H);
      }

      widgetRAF = requestAnimationFrame(frame);
    }
    widgetRAF = requestAnimationFrame(frame);
  }

  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // idle: 15s without interaction on home triggers void

  let idleTimer = 0;
  let idleActive = false;

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; clearWidget(); }
    if (!$home.hidden) { idleTimer = setTimeout(startIdle, 15000); }
  }
  function startIdle() {
    if ($home.hidden || activeWidget) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // mobile shake triggers void

  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  render(currentPath());
  resetIdle();
})();
</script>
</body>
</html>
