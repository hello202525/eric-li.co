<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p { margin: 0 0 0.25em 0; }
  .bio p:last-child { margin-bottom: 0; }

  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  body.enchanted { transition: background 600ms ease; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show { opacity: 1; pointer-events: auto; }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after { opacity: 1; }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }

  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }

  body.play-mode { background: #050508; transition: background 400ms ease; }
  body.play-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.play-mode #trail { opacity: 0; }

  body.time-mode { background: #080808; transition: background 500ms ease; }
  body.time-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.time-mode #trail { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>

<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<div class="typer" id="typer" aria-hidden="true"></div>

<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung", sugimoto: "sugimoto", tapies: "tapies",
    stieglitz: "stieglitz", atget: "atget", whistler: "whistler",
    brancusi: "brancusi", spilliaert: "spilliaert", goya: "goya",
    hugo: "hugo", schikaneder: "schikaneder", degouve: "degouve",
    khnopff: "khnopff", carriere: "carriere", ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  for (const w of WORKS) { const img = new Image(); img.src = w.src; }

  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // routing

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      $home.hidden = false;
      [$work, $gallery].forEach(el => {
        el.style.transition = "";
      el.classList.remove("show");
      el.setAttribute("aria-hidden", "true");
    });
      return;
    }

    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : null;
    if (!el) return;
    [$work, $gallery].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked");

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }

    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // gallery

  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) { go("/" + cell.dataset.slug); } else { go("/"); }
  });

  window.addEventListener("popstate", () => render(currentPath()));

  // work viewer: click artwork to advance, click background to gallery

  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {
      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // parallax on work viewer

  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  parallaxRAF = requestAnimationFrame(applyParallax);
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    targetX = -((e.clientX - r.left - r.width / 2) / r.width) * 18;
    targetY = -((e.clientY - r.top - r.height / 2) / r.height) * 18;
  });
  $work.addEventListener("pointerleave", () => { targetX = targetY = 0; });

  // long-press on home opens random work

  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      go("/" + SLUGS[Math.floor(Math.random() * SLUGS.length)]);
    }, 700);
  });
  function cancelPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; } }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // typed commands

  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery"])];
  const WIDGETS = ["stars", "void", "mirror", "play", "time"];
  const YEARS = {
    "1820": "goya", "1867": "hugo", "1875": "whistler", "1891": "khnopff",
    "1892": "degouve", "1898": "atget-3", "1906": "schikaneder",
    "1908": "spilliaert", "1920": "brancusi", "1927": "atget",
    "1980": "sugimoto", "1983": "tapies", "1989": "hartung",
  };

  function matchSlug() {
    if (!buf) return null;
    if (YEARS[buf]) return YEARS[buf];
    if (ARTIST_PRIMARY[buf]) return ARTIST_PRIMARY[buf];
    if (TYPEABLE.includes(buf)) return buf;
    return null;
  }

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;

    if (k === "Escape") {
      clearBuf();
      clearWidget();
      if (currentPath() !== "") go("/");
      return;
    }
    if (activeWidget === "stars" || activeWidget === "mirror" || activeWidget === "play" || activeWidget === "time") return;
    if (k === "Backspace") {
      if (buf.length) {
        buf = buf.slice(0, -1);
        if (!buf) { clearBuf(); return; }
        $typer.textContent = buf;
      }
      return;
    }
    if (k.length === 1 && /^[a-zA-Z0-9 .,!?'\-\/]$/.test(k)) {
      buf = (buf + k.toLowerCase()).slice(0, 18);
      $typer.textContent = buf;
      $typer.classList.add("show");
      clearTimeout(bufTimer);
      bufTimer = setTimeout(clearBuf, 1600);

      const m = matchSlug();
      if (m) { clearBuf(); go("/" + m); return; }
      if (WIDGETS.includes(buf)) { const w = buf; clearBuf(); fireWidget(w); return; }
      if (buf === "eric") {
        clearBuf();
        window.open("https://www.linkedin.com/in/eric-li-226850249/", "_blank");
        return;
      }
    }
  });

  // "beautiful things" hover

  if ($end) {
    $end.addEventListener("click", (e) => { e.preventDefault(); go("/gallery"); });

    const text = $end.textContent;
    const bioEl = $end.closest(".bio");
    $end.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
      const s = document.createElement("span");
      s.textContent = text[i] === " " ? "\u00A0" : text[i];
      $end.appendChild(s);
    }
    const letters = $end.querySelectorAll("span");

    const enchantedTones = [
      "#f0e6c8", "#e8e0d0", "#dce4e0", "#e0d8e8", "#d8e0e8",
      "#e8dcd0", "#d0dce0", "#e4ddd0", "#d8d8e0", "#e0e4d8",
    ];
    let lastTone = -1;

    // birds system
    let birdCanvas = null;
    let birdCtx = null;
    let birds = [];
    let birdRAF = null;
    let birdsAlive = false;
    let birdsDying = false;

    function spawnBirds() {
      if (!birdCanvas) {
        birdCanvas = document.createElement("canvas");
        birdCanvas.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999;";
        document.body.appendChild(birdCanvas);
        birdCtx = birdCanvas.getContext("2d");
      }
      birdCanvas.width = innerWidth;
      birdCanvas.height = innerHeight;
      birds = [];
      birdsDying = false;
      const count = 5 + Math.floor(Math.random() * 4);
      const dir = Math.random() > 0.5 ? 1 : -1;
      const baseY = innerHeight * (0.2 + Math.random() * 0.3);
      for (let i = 0; i < count; i++) {
        birds.push({
          x: dir > 0 ? -40 - Math.random() * 120 : innerWidth + 40 + Math.random() * 120,
          y: baseY + (Math.random() - 0.5) * 80 + Math.sin(i * 1.2) * 30,
          vx: dir * (2.5 + Math.random() * 1.5),
          vy: (Math.random() - 0.5) * 0.4,
          size: 8 + Math.random() * 6,
          wingPhase: Math.random() * 6.28,
          wingSpeed: 4 + Math.random() * 2,
          alpha: 1,
          // dust particles (created on death)
          dust: [],
        });
      }
      birdsAlive = true;
      if (!birdRAF) animateBirds();
    }

    function killBirds() {
      birdsDying = true;
      for (const b of birds) {
        for (let i = 0; i < 30; i++) {
          const ang = Math.random() * 6.28;
          const spd = 0.3 + Math.random() * 1.2;
          b.dust.push({
            x: b.x + (Math.random() - 0.5) * b.size * 0.8,
            y: b.y + (Math.random() - 0.5) * b.size * 0.3,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd,
            r: 0.2 + Math.random() * 0.3,
            alpha: 0.25 + Math.random() * 0.2,
          });
        }
      }
    }

    function animateBirds() {
      if (!birdCanvas) return;
      birdCtx.clearRect(0, 0, birdCanvas.width, birdCanvas.height);
      let anyAlive = false;

      for (const b of birds) {
        // always keep moving
        b.x += b.vx;
        b.y += b.vy + Math.sin(b.wingPhase * 0.3) * 0.3;
        b.wingPhase += b.wingSpeed * 0.06;

        if (birdsDying) b.alpha = 0;

        if (b.alpha > 0.01) {
          const wing = Math.sin(b.wingPhase) * 0.7;
          const w = b.size;
          birdCtx.save();
          birdCtx.translate(b.x, b.y);
          birdCtx.strokeStyle = "rgba(25,25,30," + b.alpha + ")";
          birdCtx.lineWidth = 1;
          birdCtx.lineCap = "round";
          birdCtx.beginPath();
          birdCtx.moveTo(0, 0);
          birdCtx.quadraticCurveTo(-w * 0.4, -wing * w * 0.4, -w, -wing * w * 0.25);
          birdCtx.stroke();
          birdCtx.beginPath();
          birdCtx.moveTo(0, 0);
          birdCtx.quadraticCurveTo(w * 0.4, -wing * w * 0.4, w, -wing * w * 0.25);
          birdCtx.stroke();
          birdCtx.restore();
          anyAlive = true;
        }

        if (birdsDying) {
          // disintegration particles — scatter outward, no gravity
          for (const d of b.dust) {
            if (d.alpha <= 0) continue;
            d.x += d.vx;
            d.y += d.vy;
            d.vx *= 0.96;
            d.vy *= 0.96;
            d.alpha -= 0.025;
            if (d.alpha > 0) {
              birdCtx.fillStyle = "rgba(25,25,30," + d.alpha + ")";
              birdCtx.fillRect(d.x, d.y, d.r, d.r);
              anyAlive = true;
            }
          }
          if (b.alpha > 0) anyAlive = true;
        }
      }

      if (!birdsDying) anyAlive = true;
      if (anyAlive) {
        birdRAF = requestAnimationFrame(animateBirds);
      } else {
        birdRAF = null;
        birdsAlive = false;
        if (birdCanvas) { birdCanvas.remove(); birdCanvas = null; birdCtx = null; }
      }
    }

  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: Math.cos(angle) * drift, vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w; sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10; sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 1.0, len: 60 + Math.random() * 80, size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  // === Time ===
  function runTime() {
    const ctx = sizeWidgetCanvas();
    const W = innerWidth, H = innerHeight;
    document.body.classList.add("time-mode");
    $widgetCanvas.classList.add("show");

    function step() {
      if (activeWidget !== "time") return;
      const d = new Date();
      const hours = d.getHours() % 12 + d.getMinutes() / 60;
      const minutes = d.getMinutes() + d.getSeconds() / 60;
      const seconds = d.getSeconds() + d.getMilliseconds() / 1000;

      ctx.fillStyle = "#040405";
      ctx.fillRect(0, 0, W, H);

      const fieldH = H * 0.6;
      const top = (H - fieldH) / 2;
      const cx = W / 2;

      // hour: defines the vertical density of lines in the field
      // minute: defines which line is brightest
      // second: a slow horizontal sweep across all lines

      const lineCount = 60;
      const spacing = fieldH / lineCount;
      const activeMin = Math.floor(minutes);
      const secPos = seconds / 60;

      for (let i = 0; i < lineCount; i++) {
        const y = top + i * spacing + spacing * 0.5;
        const isActive = i === activeMin;

        // hour encodes line width — lines near the hour position are wider
        const hourPos = hours / 12 * lineCount;
        const hourDist = Math.abs(i - hourPos);
        const hourInfluence = Math.max(0, 1 - hourDist / 8);
        const lineW = W * (0.08 + hourInfluence * 0.25);

        // alpha: most lines nearly invisible
        let alpha = 0.018;
        if (isActive) alpha = 0.4;
        else {
          const minDist = Math.min(Math.abs(i - activeMin), 60 - Math.abs(i - activeMin));
          if (minDist < 4) alpha = 0.018 + (1 - minDist / 4) * 0.08;
        }

        // second sweep: brightens one vertical position across all lines
        const lineFrac = (i / lineCount);
        const secDist = Math.abs(lineFrac - secPos);
        const secWrap = Math.min(secDist, 1 - secDist);
        if (secWrap < 0.03) alpha += (1 - secWrap / 0.03) * 0.06;

        const x = cx - lineW / 2;
        ctx.fillStyle = "rgba(200,205,215," + alpha + ")";
        ctx.fillRect(x, y, lineW, 0.5);
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  // === PlayAudio: procedural Web Audio synthesis for play sequence ===
  class PlayAudio {
    constructor() {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.ctx.destination);
      this.nodes = [];
    }
    _osc(type, freq, gain, detune) {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = type; o.frequency.value = freq;
      if (detune) o.detune.value = detune;
      g.gain.value = gain;
      o.connect(g); g.connect(this.master); o.start();
      this.nodes.push({ osc: o, gain: g });
      return { osc: o, gain: g };
    }
    _noise(gain) {
      const bufSize = this.ctx.sampleRate * 2;
      const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const g = this.ctx.createGain(); g.gain.value = gain;
      const f = this.ctx.createBiquadFilter();
      f.type = "lowpass"; f.frequency.value = 200;
      src.connect(f); f.connect(g); g.connect(this.master); src.start();
      this.nodes.push({ osc: src, gain: g, filter: f });
      return { src, gain: g, filter: f };
    }
    stopAll() {
      for (const n of this.nodes) {
        try { n.gain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3); } catch(e){}
        try { setTimeout(() => n.osc.stop(), 600); } catch(e){}
      }
      this.nodes = [];
    }
    launch() {
      this.stopAll();
      this._drone = this._osc("sine", 45, 0.15);
      this._drone2 = this._osc("sine", 90, 0.06, 3);
      this._rumble = this._noise(0.0);
      this._rumble.filter.frequency.value = 120;
    }
    launchTick(phaseT, ignitionT) {
      if (!this._drone) return;
      const pre = Math.max(0, Math.min(1, (phaseT - 1.0) / (ignitionT - 1.0)));
      this._rumble.gain.gain.setTargetAtTime(pre * 0.08, this.ctx.currentTime, 0.05);
      this._rumble.filter.frequency.setTargetAtTime(120 + pre * 400, this.ctx.currentTime, 0.05);
      if (phaseT > ignitionT) {
        const post = Math.min(1, (phaseT - ignitionT) / 2);
        this._drone.osc.frequency.setTargetAtTime(45 + post * 30, this.ctx.currentTime, 0.1);
        this._drone.gain.gain.setTargetAtTime(0.15 + post * 0.15, this.ctx.currentTime, 0.05);
        this._rumble.gain.gain.setTargetAtTime(0.08 + post * 0.12, this.ctx.currentTime, 0.05);
        this._rumble.filter.frequency.setTargetAtTime(520 + post * 800, this.ctx.currentTime, 0.1);
      }
    }
    warp() {
      this.stopAll();
      this._wDrone = this._osc("sawtooth", 55, 0.0);
      this._wDrone2 = this._osc("sine", 82, 0.04, -7);
      this._wDrone3 = this._osc("sine", 110, 0.03, 5);
      this._wNoise = this._noise(0.0);
      this._wNoise.filter.type = "bandpass";
      this._wNoise.filter.frequency.value = 400;
      this._wNoise.filter.Q.value = 2;
    }
    warpTick(p) {
      if (!this._wDrone) return;
      const intensity = Math.min(1, p * 2);
      this._wDrone.gain.gain.setTargetAtTime(intensity * 0.06, this.ctx.currentTime, 0.15);
      this._wDrone.osc.frequency.setTargetAtTime(55 + p * 40, this.ctx.currentTime, 0.3);
      this._wNoise.gain.gain.setTargetAtTime(intensity * 0.08, this.ctx.currentTime, 0.15);
      this._wNoise.filter.frequency.setTargetAtTime(400 + p * 2000, this.ctx.currentTime, 0.3);
      // smooth deceleration feel as approaching Mars — no abrupt cut
      if (p > 0.8) {
        const fade = 1 - (p - 0.8) / 0.2;
        this._wDrone.gain.gain.setTargetAtTime(fade * 0.06, this.ctx.currentTime, 0.4);
        this._wDrone.osc.frequency.setTargetAtTime(55 + fade * 20, this.ctx.currentTime, 0.4);
        this._wNoise.gain.gain.setTargetAtTime(fade * 0.04, this.ctx.currentTime, 0.4);
        this._wNoise.filter.frequency.setTargetAtTime(200, this.ctx.currentTime, 0.4);
      }
    }
    crash() {
      this.stopAll();
      const t = this.ctx.currentTime;
      // continuous deep rumble (not a sharp boom)
      const sub = this._osc("sine", 35, 0);
      sub.gain.gain.setTargetAtTime(0.15, t, 0.3);
      sub.gain.gain.setTargetAtTime(0.06, t + 1.0, 0.8);
      // filtered noise bed — continuous, not fragmented
      const bed = this._noise(0);
      bed.filter.type = "lowpass";
      bed.filter.frequency.value = 150;
      bed.gain.gain.setTargetAtTime(0.06, t, 0.4);
      bed.gain.gain.setTargetAtTime(0.03, t + 1.5, 1.0);
      // warm resonant hum that builds
      this._crashHum = this._osc("sine", 55, 0);
      this._crashHum.gain.gain.setTargetAtTime(0.04, t + 0.5, 0.6);
    }
    drift() {
      this.stopAll();
      this._pad1 = this._osc("sine", 220, 0.0, 3);
      this._pad2 = this._osc("sine", 330, 0.0, -5);
      this._pad3 = this._osc("sine", 165, 0.0, 2);
      this._driftT = 0;
    }
    driftTick(dt) {
      if (!this._pad1) return;
      this._driftT += dt;
      const vol = Math.min(0.025, this._driftT * 0.005);
      const lfo = 0.7 + 0.3 * Math.sin(this._driftT * 0.3);
      this._pad1.gain.gain.setTargetAtTime(vol * lfo, this.ctx.currentTime, 0.1);
      this._pad2.gain.gain.setTargetAtTime(vol * 0.7 * lfo, this.ctx.currentTime, 0.1);
      this._pad3.gain.gain.setTargetAtTime(vol * 0.5 * lfo, this.ctx.currentTime, 0.1);
    }
    chime() {
      const t = this.ctx.currentTime;
      // soft pentatonic bell — lower frequencies, gentler envelope
      [293.66, 369.99, 440].forEach((f, i) => {
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        const flt = this.ctx.createBiquadFilter();
        flt.type = "lowpass"; flt.frequency.value = 1200;
        o.type = "triangle"; o.frequency.value = f;
        g.gain.setValueAtTime(0, t + i * 0.15);
        g.gain.linearRampToValueAtTime(0.035, t + i * 0.15 + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 2.5);
        o.connect(flt); flt.connect(g); g.connect(this.master);
        o.start(t + i * 0.15); o.stop(t + i * 0.15 + 3);
      });
    }
    destroy() {
      this.stopAll();
      try { this.ctx.close(); } catch(e){}
    }
  }

  function runPlay() {
    const ctx = sizeWidgetCanvas();
    const W = innerWidth, H = innerHeight;
    document.body.classList.add("play-mode");
    $widgetCanvas.classList.add("show");

    const audio = new PlayAudio();
    audio.launch();

    let phase = "launch";
    let phaseT = 0;
    let lastT = performance.now();

    const keys = {};
    function kd(e) {
      keys[e.code] = true;
      if (phase === "game" && /^(Arrow|Space)/.test(e.code)) e.preventDefault();
    }
    function ku(e) { keys[e.code] = false; }
    addEventListener("keydown", kd, { capture: true });
    addEventListener("keyup", ku);
    playCleanup = () => {
      removeEventListener("keydown", kd, { capture: true });
      removeEventListener("keyup", ku);
      if (crashGL) { crashGL.destroy(); crashGL = null; }
      audio.destroy();
    };

    let fadeAlpha = 0;
    let fadeTarget = 0;
    let fadeCallback = null;

    function fadeTo(p) {
      fadeTarget = 1;
      fadeCallback = () => {
        phase = p; phaseT = 0; fadeTarget = 0;
        if (p === "warp") audio.warp();
        else if (p === "crash") audio.crash();
        else if (p === "game") audio.drift();
        else if (p === "ending") audio.chime();
      };
    }
    function setPhase(p) { phase = p; phaseT = 0; }

    function hash(n) { return ((n * 2654435761) >>> 0) / 4294967296; }

    const FONT = "'Iowan Old Style', 'Palatino Linotype', Georgia, serif";

    // ===== 3D ROCKET =====
    const rEdges = [];
    const SI = 10, BR = 0.25, NT = -2.0, BT = -0.8, BB = 0.9, NZR = 0.32;
    for (let i = 0; i < SI; i++) {
      const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
      const c1 = Math.cos(a1), s1 = Math.sin(a1), c2 = Math.cos(a2), s2 = Math.sin(a2);
      rEdges.push([c1*BR, BT, s1*BR, c2*BR, BT, s2*BR]);
      rEdges.push([c1*BR, BB, s1*BR, c2*BR, BB, s2*BR]);
      rEdges.push([c1*NZR, BB+0.12, s1*NZR, c2*NZR, BB+0.12, s2*NZR]);
      rEdges.push([c1*BR, BT, s1*BR, c1*BR, BB, s1*BR]);
      rEdges.push([c1*BR, BT, s1*BR, 0, NT, 0]);
      rEdges.push([c1*BR, BB, s1*BR, c1*NZR, BB+0.12, s1*NZR]);
    }
    for (let b = 1; b <= 3; b++) {
      const by = BT + (BB - BT) * (b / 4);
      for (let i = 0; i < SI; i++) {
        const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
        rEdges.push([Math.cos(a1)*BR, by, Math.sin(a1)*BR, Math.cos(a2)*BR, by, Math.sin(a2)*BR]);
      }
    }
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 8;
      const fc = Math.cos(a), fs = Math.sin(a), tip = BR + 0.5;
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*tip, BB+0.4, fs*tip]);
      rEdges.push([fc*tip, BB+0.4, fs*tip, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
    }

    function drawRocket(cx, cy, rotY, sc, alpha) {
      const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
      ctx.lineCap = "round";
      for (let pass = 0; pass < 2; pass++) {
        ctx.lineWidth = pass === 0 ? 3.2 : 1.0;
        for (const e of rEdges) {
          const rx1 = e[0]*cosR - e[2]*sinR, rz1 = e[0]*sinR + e[2]*cosR;
          const rx2 = e[3]*cosR - e[5]*sinR, rz2 = e[3]*sinR + e[5]*cosR;
          const f = 450;
          const p1 = f / (f + rz1*sc), p2 = f / (f + rz2*sc);
          const depth = (rz1 + rz2) * 0.5;
          const da = pass === 0 ? alpha * 0.08 : alpha * Math.max(0.2, 1 - depth * 0.4) * 0.8;
          const col = pass === 0 ? "140,190,255" : "220,235,255";
          ctx.strokeStyle = "rgba(" + col + "," + da + ")";
          ctx.beginPath();
          ctx.moveTo(cx + rx1*sc*p1, cy + e[1]*sc*p1);
          ctx.lineTo(cx + rx2*sc*p2, cy + e[4]*sc*p2);
          ctx.stroke();
        }
      }
    }

    // ===== LAUNCH STATE =====
    let rY = H * 0.65, rVel = 0, rRot = 0;
    const exhaust = [];
    // depth: 0 = far (slow), 1 = mid, 2 = near (fast)
    const bgStars = [];
    function pushStar(x, y, r, b, tw, twSpd, depth) {
      bgStars.push({ x, y, r, b, tw, twSpd, depth: depth || 0 });
    }
    // layer 1: dense base field — far
    for (let i = 0; i < 6000; i++) pushStar(
      Math.random() * W, Math.random() * H,
      0.1 + Math.random() * 0.25, 0.05 + Math.random() * 0.3,
      Math.random() * 6.28, 0.1 + Math.random() * 1.5, 0
    );
    // layer 2: milky way band — mid
    for (let i = 0; i < 3000; i++) {
      const t = Math.random();
      pushStar(
        t * W + (Math.random() - 0.5) * W * 0.08,
        (t * 0.6 + 0.2) * H + (Math.random() - 0.5) * H * 0.15,
        0.1 + Math.random() * 0.5, 0.1 + Math.random() * 0.5,
        Math.random() * 6.28, 0.2 + Math.random() * 1.2, 1
      );
    }
    // layer 3: star clusters — near
    for (let c = 0; c < 8; c++) {
      const cx0 = Math.random() * W, cy0 = Math.random() * H;
      const cR = 30 + Math.random() * 80;
      for (let i = 0; i < 200; i++) {
        const ang = Math.random() * 6.28;
        const dist = Math.pow(Math.random(), 0.5) * cR;
        pushStar(
          cx0 + Math.cos(ang) * dist, cy0 + Math.sin(ang) * dist,
          0.15 + Math.random() * 0.6, 0.15 + Math.random() * 0.6,
          Math.random() * 6.28, 0.3 + Math.random() * 1.8, 2
        );
      }
    }
    // layer 4: bright feature stars — near
    for (let i = 0; i < 200; i++) pushStar(
      Math.random() * W, Math.random() * H,
      0.5 + Math.random() * 1.5, 0.5 + Math.random() * 0.5,
      Math.random() * 6.28, 0.05 + Math.random() * 0.8, 2
    );
    // layer 5: geometric constellations — mid
    const constellations = [
      [[0.1,0.2],[0.15,0.15],[0.22,0.18],[0.28,0.12],[0.33,0.16]],
      [[0.6,0.7],[0.65,0.75],[0.7,0.72],[0.75,0.78],[0.72,0.83],[0.68,0.8]],
      [[0.8,0.2],[0.85,0.25],[0.82,0.32],[0.87,0.35],[0.9,0.28]],
      [[0.3,0.6],[0.35,0.55],[0.4,0.58],[0.42,0.52],[0.38,0.48],[0.33,0.5]],
      [[0.5,0.1],[0.55,0.08],[0.58,0.13],[0.62,0.09],[0.65,0.14],[0.6,0.17]],
      [[0.15,0.85],[0.2,0.82],[0.25,0.87],[0.3,0.84],[0.28,0.9]],
      [[0.7,0.4],[0.75,0.35],[0.78,0.4],[0.82,0.37],[0.85,0.42],[0.8,0.45]],
      [[0.4,0.3],[0.45,0.28],[0.5,0.32],[0.48,0.37],[0.43,0.35]],
    ];
    for (const pts of constellations) {
      for (const [px, py] of pts) {
        pushStar(
          px * W + (Math.random() - 0.5) * 4, py * H + (Math.random() - 0.5) * 4,
          0.8 + Math.random() * 1.0, 0.6 + Math.random() * 0.35,
          Math.random() * 6.28, 0.05 + Math.random() * 0.4, 1
        );
      }
    }
    const depthRotMult = [0.3, 1.0, 2.5];
    const depthScaleMult = [0.97, 1.0, 1.04];

    // ===== WARP STATE =====
    const wStars = [];
    for (let i = 0; i < 1200; i++) wStars.push({
      a: Math.random() * Math.PI * 2,
      d: 0.05 + Math.pow(Math.random(), 0.7) * 1.2,
      z: Math.random(),
      spd: 0.6 + Math.random() * 0.6,
      w: 0.4 + Math.pow(Math.random(), 2) * 3.5,
      hue: Math.random(),
    });

    // ===== CRASH STATE =====

    // ===== DRIFT WORLD (3rd person astronaut) =====
    const DRIFT_DUR = 35;
    const dCx = W / 2, dCy = H / 2;

    const farStars = [];
    for (let i = 0; i < 500; i++) farStars.push({
      x: (hash(i * 31) - 0.5) * 6, y: (hash(i * 59) - 0.5) * 5,
      z: 0.5 + hash(i * 97) * 12,
      r: 0.15 + hash(i * 13) * 0.6,
      tw: hash(i * 41) * 6.28,
      bright: 0.2 + hash(i * 77) * 0.8,
    });

    const spaceDebris = [];
    for (let i = 0; i < 80; i++) {
      spaceDebris.push({
        x: (hash(i * 53) - 0.5) * 8,
        y: (hash(i * 67) - 0.5) * 6,
        z: 2 + hash(i * 83) * 50,
        sz: 0.3 + hash(i * 29) * 2.5,
        warm: hash(i * 41),
        rotSpd: (hash(i * 19) - 0.5) * 2,
      });
    }

    const nebulae = [];
    for (let i = 0; i < 6; i++) nebulae.push({
      x: (hash(i * 137) - 0.5) * 4,
      y: (hash(i * 211) - 0.5) * 3,
      z: 5 + hash(i * 173) * 35,
      r: 150 + hash(i * 97) * 250,
      cr: Math.floor(40 + hash(i * 61) * 100),
      cg: Math.floor(20 + hash(i * 43) * 60),
      cb: Math.floor(80 + hash(i * 89) * 120),
    });

    const P = { x: 0, y: 0, vx: 0, vy: 0, tilt: 0, tumble: 0 };
    let driftZ = 0;
    let ended = false;

    // collectible light orbs
    const orbs = [];
    for (let i = 0; i < 10; i++) orbs.push({
      x: (Math.random() - 0.5) * 3, y: (Math.random() - 0.5) * 2.5,
      z: 3 + Math.random() * 25, collected: false, pulse: Math.random() * 6.28,
      hue: Math.floor(Math.random() * 3),
    });
    const orbBursts = [];

    // ======== LAUNCH ========
    const ignitionT = 2.0;
    const liftT = 2.4;

    function drawLaunch(dt) {
      ctx.fillStyle = "#020204";
      ctx.fillRect(0, 0, W, H);

      // star field: 3-depth parallax rotation + twinkle + color + glow
      const baseRot = phaseT < 1.5 ? phaseT * 0.002 : 0.003 + (phaseT - 1.5) * 0.008;
      const scx = W / 2, scy = H / 2;
      const accelScale = phaseT > liftT ? 1 + Math.min(3, (phaseT - liftT) * 0.3) : 1;

      // precompute cos/sin for each depth layer
      const layerCos = [], layerSin = [], layerScale = [];
      for (let d = 0; d < 3; d++) {
        const r = phaseT * baseRot * depthRotMult[d];
        layerCos[d] = Math.cos(r); layerSin[d] = Math.sin(r);
        layerScale[d] = 1 + (depthScaleMult[d] - 1) * (accelScale - 1);
      }

      // constellation lines (depth=1, mid layer)
      ctx.save();
      ctx.strokeStyle = "rgba(120,140,180,0.08)";
      ctx.lineWidth = 0.5;
      for (const pts of constellations) {
        ctx.beginPath();
        for (let ci = 0; ci < pts.length; ci++) {
          const rx = pts[ci][0] * W, ry = pts[ci][1] * H;
          const dx = (rx - scx) * layerScale[1], dy = (ry - scy) * layerScale[1];
          const sx = scx + dx * layerCos[1] - dy * layerSin[1];
          const sy = scy + dx * layerSin[1] + dy * layerCos[1];
          ci === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
        }
        ctx.stroke();
      }
      ctx.restore();

      for (const s of bgStars) {
        const d = s.depth;
        const sc = layerScale[d];
        const dx = (s.x - scx) * sc, dy = (s.y - scy) * sc;
        const sx = scx + dx * layerCos[d] - dy * layerSin[d];
        const sy = scy + dx * layerSin[d] + dy * layerCos[d];
        const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.tw + phaseT * s.twSpd));
        const bright = s.b * twinkle;
        if (bright < 0.03) continue;
        const hue = s.tw < 2 ? "200,220,255" : s.tw < 4 ? "255,240,220" : "225,223,218";
        ctx.fillStyle = "rgba(" + hue + "," + bright + ")";
        ctx.beginPath(); ctx.arc(sx, sy, s.r, 0, Math.PI * 2); ctx.fill();
        if (s.r > 0.6 && bright > 0.3) {
          ctx.fillStyle = "rgba(" + hue + "," + (bright * 0.15) + ")";
          ctx.beginPath(); ctx.arc(sx, sy, s.r * 3, 0, Math.PI * 2); ctx.fill();
        }
      }

      audio.launchTick(phaseT, ignitionT);

      // pre-ignition rumble
      let shX = 0, shY = 0;
      if (phaseT > 1.0 && phaseT < ignitionT) {
        const ri = (phaseT - 1.0) / (ignitionT - 1.0);
        shX = (Math.random() - 0.5) * ri * 2;
        shY = (Math.random() - 0.5) * ri * 2;
      }
      // post-ignition shake intensifies
      if (phaseT >= ignitionT) {
        const pi = Math.min(1, (phaseT - ignitionT) / 2);
        const mag = 2 + pi * 8;
        shX = (Math.random() - 0.5) * mag;
        shY = (Math.random() - 0.5) * mag;
      }

      ctx.save();
      ctx.translate(shX, shY);

      const spinRate = phaseT < 1 ? 0.1 : phaseT < ignitionT ? 0.1 + (phaseT - 1) * 0.8 : 1.0 + (phaseT - ignitionT) * 2.5;
      rRot += dt * spinRate;
      if (phaseT > liftT) {
        const accelT = phaseT - liftT;
        rVel += (200 + accelT * 350) * dt;
        rY -= rVel * dt;
      }

      const rsx = W / 2, rsy = rY;

      // exhaust (only after ignition)
      if (phaseT >= ignitionT && rsy > -150) {
        const power = Math.min(1, (phaseT - ignitionT) / 0.5);
        const cnt = Math.floor(3 + power * 8);
        for (let i = 0; i < cnt; i++) {
          const spread = 6 + power * 12;
          exhaust.push({
            x: rsx + (Math.random() - 0.5) * spread,
            y: rsy + 42,
            vx: (Math.random() - 0.5) * 50 * power,
            vy: 40 + Math.random() * 120 * power,
            life: 0.6 + Math.random() * 0.5,
            r: 1 + Math.random() * 3.5,
            hot: Math.random() > 0.3,
          });
        }
      }

      for (let i = exhaust.length - 1; i >= 0; i--) {
        const p = exhaust[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 15 * dt; p.life -= dt * 1.4;
        if (p.life <= 0) { exhaust.splice(i, 1); continue; }
        const la = p.life * (p.hot ? 0.9 : 0.65);
        ctx.fillStyle = p.hot
          ? "rgba(255,250,240," + la + ")"
          : "rgba(255," + Math.floor(130 + p.life * 90) + "," + Math.floor(30 + p.life * 40) + "," + la + ")";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.2 + p.life * 0.8), 0, Math.PI * 2); ctx.fill();
      }

      // engine glow (blooms at ignition)
      if (phaseT >= ignitionT - 0.3 && rsy > -150) {
        const bloom = phaseT < ignitionT
          ? Math.pow((phaseT - (ignitionT - 0.3)) / 0.3, 2) * 0.3
          : Math.min(1, (phaseT - ignitionT) / 0.4);
        const gr = 20 + bloom * 50;
        const glow = ctx.createRadialGradient(rsx, rsy + 42, 0, rsx, rsy + 42, gr);
        glow.addColorStop(0, "rgba(255,200,100," + (bloom * 0.6) + ")");
        glow.addColorStop(0.4, "rgba(255,120,40," + (bloom * 0.25) + ")");
        glow.addColorStop(1, "rgba(255,60,15,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(rsx - gr, rsy + 42 - gr, gr * 2, gr * 2);
      }

      // speed lines (only during fast travel)
      if (phaseT > liftT + 0.8) {
        const si = Math.min(1, (phaseT - liftT - 0.8) / 1.5);
        ctx.globalAlpha = si * 0.12;
        for (let i = 0; i < 25; i++) {
          const ang = hash(i * 137) * Math.PI * 2;
          const d0 = 0.3 + hash(i * 71) * 0.7;
          const ox = Math.cos(ang) * W * 0.6 * d0;
          const oy = Math.sin(ang) * H * 0.6 * d0;
          ctx.strokeStyle = "#b0caff";
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(W/2 + ox, H/2 + oy);
          ctx.lineTo(W/2 + ox * (1 - si * 0.5), H/2 + oy * (1 - si * 0.5));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      if (rsy > -150) drawRocket(rsx, rsy, rRot, 26, 1);
      ctx.restore();

      if (rY < -160 && !fadeCallback) fadeTo("warp");
    }

    // ======== WARP ========
    function drawWarp(dt) {
      const dur = 7;
      const p = Math.min(1, phaseT / dur);
      audio.warpTick(p);
      const cx = W / 2, cy = H / 2;
      const diag = Math.hypot(W, H);

      let speed;
      if (p < 0.04) speed = 0;
      else if (p < 0.1) speed = Math.pow((p - 0.04) / 0.06, 3) * 1.0;
      else if (p < 0.75) speed = 1.0 + (p - 0.1) * 0.7;
      else speed = Math.max(0.05, 1.5 - (p - 0.75) * 5.5);

      const rot = phaseT * 0.04;

      // color: white-blue → cyan → violet → deep amber
      let cr, cg, cb;
      if (p < 0.1) { cr = 160; cg = 190; cb = 255; }
      else if (p < 0.3) { const t=(p-0.1)/0.2; cr=160-t*80; cg=190-t*60; cb=255; }
      else if (p < 0.55) { const t=(p-0.3)/0.25; cr=Math.floor(80+t*70); cg=Math.floor(130-t*80); cb=Math.floor(255-t*40); }
      else if (p < 0.75) { const t=(p-0.55)/0.2; cr=Math.floor(150+t*50); cg=Math.floor(50+t*20); cb=Math.floor(215-t*150); }
      else { const t=(p-0.75)/0.25; cr=Math.floor(200+t*30); cg=Math.floor(70+t*60); cb=Math.floor(65-t*40); }

      // === BACKGROUND: gradient that shifts with color journey ===
      const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, diag * 0.6);
      bgGrad.addColorStop(0, "rgb(" + Math.floor(cr * 0.03) + "," + Math.floor(cg * 0.02) + "," + Math.floor(cb * 0.05) + ")");
      bgGrad.addColorStop(1, "rgb(1,1,2)");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // === TUNNEL WALLS — colored fog forming cylindrical walls ===
      if (speed > 0.2) {
        const wallI = Math.min(1, (speed - 0.2) / 0.5) * (p < 0.78 ? 1 : Math.max(0, (0.85 - p) / 0.07));
        for (let i = 0; i < 6; i++) {
          const ang = rot * 2 + i * Math.PI / 3 + Math.sin(phaseT * 0.3 + i) * 0.2;
          const dist = diag * (0.28 + Math.sin(phaseT * 0.5 + i * 1.1) * 0.06);
          const wx = cx + Math.cos(ang) * dist;
          const wy = cy + Math.sin(ang) * dist;
          const wr = diag * 0.2;
          const wGrad = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
          const wa = wallI * 0.12;
          wGrad.addColorStop(0, "rgba(" + cr + "," + cg + "," + cb + "," + wa + ")");
          wGrad.addColorStop(0.5, "rgba(" + Math.floor(cr*0.5) + "," + Math.floor(cg*0.4) + "," + Math.floor(cb*0.6) + "," + (wa * 0.4) + ")");
          wGrad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = wGrad;
          ctx.fillRect(wx - wr, wy - wr, wr * 2, wr * 2);
        }
      }

      // === INITIAL FLASH ===
      if (p > 0.03 && p < 0.13) {
        const fp = (p - 0.03) / 0.1;

    // ======== DRIFT (3rd person astronaut) ========
    function drawGame(dt) {

      if (keys["ArrowRight"] || keys["KeyD"]) P.vx += accel * dt;
      if (keys["ArrowUp"] || keys["KeyW"]) P.vy -= accel * dt;

        grd.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = grd;
        ctx.fillRect(ox - orbR * 6, oy - orbR * 6, orbR * 12, orbR * 12);

        ctx.fillStyle = "rgba(255,255,255," + (0.7 + pa * 0.3) + ")";
        ctx.beginPath(); ctx.arc(ox, oy, orbR, 0, 6.28); ctx.fill();

              x: ox, y: oy, vx: Math.cos(ba) * bspd, vy: Math.sin(ba) * bspd,

        eG.addColorStop(0.3, "rgba(50,90,160," + (earthI * 0.05) + ")");

        ctx.fillRect(ex - eGR, ey - eGR, eGR * 2, eGR * 2);
        ctx.fillStyle = "rgba(80,140,220," + earthA + ")";
        ctx.beginPath(); ctx.arc(ex, ey, earthR, 0, 6.28); ctx.fill();
        ctx.fillStyle = "rgba(160,200,240," + (earthA * 0.5) + ")";
        ctx.beginPath(); ctx.arc(ex - earthR * 0.2, ey - earthR * 0.2, earthR * 0.5, 0, 6.28); ctx.fill();
      }

      // === ASTRONAUT (small capsule) ===
      const ax = cx + P.x;
      const ay = cy + H * 0.18 + P.y;
      const S = Math.min(W, H) * 0.016;

      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(P.tilt * 0.02 + Math.sin(P.tumble) * 0.03);

      const glow = ctx.createRadialGradient(0, 0, S, 0, 0, S * 6);
      glow.addColorStop(0, "rgba(100,150,210,0.07)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(-S * 6, -S * 6, S * 12, S * 12);

      ctx.beginPath();
      ctx.ellipse(0, 0, S * 0.6, S * 1.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(8,8,12,0.92)";
      ctx.fill();
      ctx.strokeStyle = "rgba(120,155,210,0.3)";
      ctx.lineWidth = S * 0.1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -S * 0.9, S * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(10,10,16,0.95)";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, -S * 0.9, S * 0.35, -0.7, 0.7);
      ctx.strokeStyle = "rgba(80,120,190,0.35)";
      ctx.lineWidth = S * 0.08;
      ctx.stroke();

      ctx.restore();

      // === POST-PROCESSING ===

      // vignette
      const vig = ctx.createRadialGradient(cx, cy, W * 0.2, cx, cy, W * 0.65);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0,0.45)");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // fade-in
      if (phaseT < 1.5) {
        ctx.fillStyle = "rgba(0,0,0," + (1 - phaseT / 1.5) + ")";
        ctx.fillRect(0, 0, W, H);
      }


      // ending: white wash → "Welcome home." → homepage
      if (progress > 0.92) {
        const fa = Math.min(1, (progress - 0.92) / 0.08);
        ctx.fillStyle = "rgba(255,255,255," + (fa * fa) + ")";
        ctx.fillRect(0, 0, W, H);
        if (fa > 0.98 && !ended) {
          ended = true;
          phase = "ending"; phaseT = 0;
        }
      }
    }

    // ======== ENDING: simple and clean ========
    let endingT = 0;
    const welcomeText = "Welcome home.";
    let welcomeRevealed = 0;
    let lastRevealT = 0;

    function drawEnding(dt) {
      endingT += dt;
      const t = endingT;

      // phase 1: sky-white (0-3s)
      if (t < 3) {
        ctx.fillStyle = "rgb(245,248,252)";
        ctx.fillRect(0, 0, W, H);
      }
      // phase 2: sky-white → pure white (3-4s)
      else if (t < 4) {
        const p = (t - 3) / 1.0;
        const r = Math.floor(245 + p * 10);
        const g = Math.floor(248 + p * 7);
        const b = Math.floor(252 + p * 3);
        ctx.fillStyle = "rgb(" + Math.min(255, r) + "," + Math.min(255, g) + "," + Math.min(255, b) + ")";
        ctx.fillRect(0, 0, W, H);
      }
      // phase 3: pure white (4-4.5s) — matches homepage
      else {
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, W, H);
      }

      // typewriter text (starts at 0.5s)
      if (t > 0.5 && welcomeRevealed < welcomeText.length) {
        if (t - lastRevealT > 0.09) {
          welcomeRevealed++;
          lastRevealT = t;
        }
      }

      // text: fade in at 0.5, hold, fade out at 3.2
      const textFade = t < 0.5 ? 0 : t < 0.8 ? (t - 0.5) / 0.3 : t < 3.2 ? 1 : Math.max(0, 1 - (t - 3.2) / 0.6);
      if (welcomeRevealed > 0 && textFade > 0.01) {
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "italic 300 27px 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif";
        ctx.fillStyle = "rgba(45,50,60," + (textFade * 0.75) + ")";
        ctx.fillText(welcomeText.slice(0, welcomeRevealed), W / 2, H / 2);
        ctx.restore();
      }

      if (t > 0.05) document.body.style.background = "rgb(245,248,252)";
      if (t > 3) document.body.style.background = "#fff";
      if (t > 4.5) {
        document.body.style.background = "";
        clearWidget();
      }
    }

    function frame(now) {
      if (activeWidget !== "play") return;
      const rawDt = (now - lastT) / 1000;
      const dt = Math.min(rawDt, 0.05);
      lastT = now;
      phaseT += dt;
      ctx.clearRect(0, 0, W, H);
      if (phase === "launch") drawLaunch(dt);
      else if (phase === "warp") drawWarp(dt);
      else if (phase === "crash") drawCrash(dt);
      else if (phase === "game") drawGame(dt);
      else if (phase === "ending") drawEnding(dt);

      if (fadeTarget > 0) {
        fadeAlpha += dt * 2.5;
        if (fadeAlpha >= 1) { fadeAlpha = 1; if (fadeCallback) { fadeCallback(); fadeCallback = null; } }
      } else if (fadeAlpha > 0) {
        fadeAlpha -= dt * 2.5;
        if (fadeAlpha < 0) fadeAlpha = 0;
      }
      if (fadeAlpha > 0) {
        ctx.fillStyle = "rgba(0,0,0," + fadeAlpha + ")";
        ctx.fillRect(0, 0, W, H);
      }

      widgetRAF = requestAnimationFrame(frame);
    }
    widgetRAF = requestAnimationFrame(frame);
  }

  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // idle: 15s without interaction on home triggers void

  let idleTimer = 0;
  let idleActive = false;

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; clearWidget(); }
    if (!$home.hidden) { idleTimer = setTimeout(startIdle, 15000); }
  }
  function startIdle() {
    if ($home.hidden || activeWidget) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // mobile shake triggers void

  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  render(currentPath());
  resetIdle();

  // bio letter-stagger on first visit per session
  if (!sessionStorage.getItem("bio-revealed")) {
    sessionStorage.setItem("bio-revealed", "1");
    const bioEl = document.querySelector(".bio");
    if (bioEl && !$home.hidden) {
      // only stagger text nodes NOT inside #end (which has its own span setup)
      const endEl = document.getElementById("end");
      const walker = document.createTreeWalker(bioEl, NodeFilter.SHOW_TEXT, {
        acceptNode(n) { return endEl && endEl.contains(n) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT; }
      }, false);
      const textNodes = [];
      let node;
      while (node = walker.nextNode()) textNodes.push(node);

      const spans = [];
      for (const tn of textNodes) {
        const frag = document.createDocumentFragment();
        for (const ch of tn.textContent) {
          const span = document.createElement("span");
          span.textContent = ch;
          span.style.opacity = "0";
          span.style.transition = "opacity 0.25s ease";
          frag.appendChild(span);
          spans.push(span);
        }
        tn.parentNode.replaceChild(frag, tn);
      }

      // also hide the #end letters initially, then reveal them in sequence
      const endLetters = endEl ? endEl.querySelectorAll("span") : [];
      endLetters.forEach(s => { s.style.opacity = "0"; s.style.transition = "opacity 0.25s ease"; });
      const allSpans = [...spans, ...endLetters];

      let idx = 0;
      function revealNext() {
        if (idx >= allSpans.length) {
          // restore #end span transitions so hover works smoothly
          endLetters.forEach(s => { s.style.transition = ""; s.style.opacity = ""; });
          return;
        }
        allSpans[idx].style.opacity = "1";
        idx++;
        const ch = allSpans[idx - 1].textContent;
        const delay = /[.,!?]/.test(ch) ? 30 : /\s/.test(ch) ? 20 : 14;
        setTimeout(revealNext, delay);
      }
      setTimeout(revealNext, 200);
    }
  }
})();
</script>
</body>
</html>
