<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p { margin: 0 0 0.25em 0; }
  .bio p:last-child { margin-bottom: 0; }

  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  body.enchanted { transition: background 600ms ease; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show { opacity: 1; pointer-events: auto; }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after { opacity: 1; }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }

  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }

  body.play-mode { background: #050508; transition: background 400ms ease; }
  body.play-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.play-mode #trail { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>

<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<div class="typer" id="typer" aria-hidden="true"></div>

<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung", sugimoto: "sugimoto", tapies: "tapies",
    stieglitz: "stieglitz", atget: "atget", whistler: "whistler",
    brancusi: "brancusi", spilliaert: "spilliaert", goya: "goya",
    hugo: "hugo", schikaneder: "schikaneder", degouve: "degouve",
    khnopff: "khnopff", carriere: "carriere", ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  for (const w of WORKS) { const img = new Image(); img.src = w.src; }

  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // routing

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      $home.hidden = false;
      [$work, $gallery].forEach(el => {
        el.style.transition = "";
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
      });
      return;
    }

    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : null;
    if (!el) return;
    [$work, $gallery].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked");

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }

    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // gallery

  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) { go("/" + cell.dataset.slug); } else { go("/"); }
  });

  window.addEventListener("popstate", () => render(currentPath()));

  // work viewer: click artwork to advance, click background to gallery

  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {
      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // parallax on work viewer

  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  parallaxRAF = requestAnimationFrame(applyParallax);
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    targetX = -((e.clientX - r.left - r.width / 2) / r.width) * 18;
    targetY = -((e.clientY - r.top - r.height / 2) / r.height) * 18;
  });
  $work.addEventListener("pointerleave", () => { targetX = targetY = 0; });

  // long-press on home opens random work

  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      go("/" + SLUGS[Math.floor(Math.random() * SLUGS.length)]);
    }, 700);
  });
  function cancelPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; } }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // typed commands

  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery"])];
  const WIDGETS = ["stars", "void", "mirror", "play"];
  const YEARS = {
    "1820": "goya", "1867": "hugo", "1875": "whistler", "1891": "khnopff",
    "1892": "degouve", "1898": "atget-3", "1906": "schikaneder",
    "1908": "spilliaert", "1920": "brancusi", "1927": "atget",
    "1980": "sugimoto", "1983": "tapies", "1989": "hartung",
  };

  function matchSlug() {
    if (!buf) return null;
    if (YEARS[buf]) return YEARS[buf];
    if (ARTIST_PRIMARY[buf]) return ARTIST_PRIMARY[buf];
    if (TYPEABLE.includes(buf)) return buf;
    return null;
  }

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;

    if (k === "Escape") {
      clearBuf();
      clearWidget();
      if (currentPath() !== "") go("/");
      return;
    }
    if (activeWidget === "stars" || activeWidget === "mirror" || activeWidget === "play") return;
    if (k === "Backspace") {
      if (buf.length) {
        buf = buf.slice(0, -1);
        if (!buf) { clearBuf(); return; }
        $typer.textContent = buf;
      }
      return;
    }
    if (k.length === 1 && /^[a-zA-Z0-9]$/.test(k)) {
      buf = (buf + k.toLowerCase()).slice(0, 18);
      $typer.textContent = buf;
      $typer.classList.add("show");
      clearTimeout(bufTimer);
      bufTimer = setTimeout(clearBuf, 1600);

      const m = matchSlug();
      if (m) { clearBuf(); go("/" + m); return; }
      if (WIDGETS.includes(buf)) { const w = buf; clearBuf(); fireWidget(w); return; }
      if (buf === "eric") {
        clearBuf();
        window.open("https://www.linkedin.com/in/eric-li-226850249/", "_blank");
        return;
      }
    }
  });

  // "beautiful things" hover

  if ($end) {
    $end.addEventListener("click", (e) => { e.preventDefault(); go("/gallery"); });

    const text = $end.textContent;
    const bioEl = $end.closest(".bio");
    $end.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
      const s = document.createElement("span");
      s.textContent = text[i] === " " ? "\u00A0" : text[i];
      $end.appendChild(s);
    }
    const letters = $end.querySelectorAll("span");

    const enchantedTones = [
      "#f0e6c8", "#e8e0d0", "#dce4e0", "#e0d8e8", "#d8e0e8",
      "#e8dcd0", "#d0dce0", "#e4ddd0", "#d8d8e0", "#e0e4d8",
    ];
    let lastTone = -1;
    $end.addEventListener("mouseenter", () => {
      if (activeWidget) return;
      let pick = lastTone;
      while (pick === lastTone) pick = Math.floor(Math.random() * enchantedTones.length);
      lastTone = pick;
      document.body.style.background = enchantedTones[pick];
      document.body.classList.add("enchanted");
      if (bioEl) bioEl.classList.add("enchanted");
      letters.forEach(s => {
        const tx = (Math.random() - 0.5) * 24;
        const ty = (Math.random() - 0.5) * 18;
        const r = (Math.random() - 0.5) * 16;
        s.style.transform = "translate(" + tx + "px," + ty + "px) rotate(" + r + "deg)";
      });
    });
    $end.addEventListener("mouseleave", () => {
      if (activeWidget) return;
      document.body.style.background = "";
      document.body.classList.remove("enchanted");
      if (bioEl) bioEl.classList.remove("enchanted");
      letters.forEach(s => { s.style.transform = ""; });
    });
  }

  // konami code opens gallery

  const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
  let kIdx = 0;
  window.addEventListener("keydown", (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (k === KONAMI[kIdx]) {
      kIdx++;
      if (kIdx === KONAMI.length) { kIdx = 0; go("/gallery"); }
    } else {
      kIdx = (k === KONAMI[0]) ? 1 : 0;
    }
  });

  // cursor ink trail (visible after navigating away from home)

  const trail = document.getElementById("trail");
  let tctx, tw = 0, th = 0;
  function sizeTrail() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    tw = innerWidth; th = innerHeight;
    trail.width = Math.round(tw * dpr);
    trail.height = Math.round(th * dpr);
    trail.style.width = tw + "px";
    trail.style.height = th + "px";
    tctx = trail.getContext("2d");
    tctx.setTransform(1, 0, 0, 1, 0, 0);
    tctx.scale(dpr, dpr);
  }
  sizeTrail();
  addEventListener("resize", sizeTrail);

  const pts = [];
  const LIFE = 900;
  addEventListener("pointermove", (e) => {
    if (!document.body.classList.contains("unlocked")) return;
    const last = pts[pts.length - 1];
    if (last) {
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      if (dx*dx + dy*dy < 9) return;
    }
    pts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  }, { passive: true });

  function trailLoop() {
    const now = performance.now();
    while (pts.length && now - pts[0].t > LIFE) pts.shift();
    if (tctx) {
      tctx.clearRect(0, 0, tw, th);
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const age = (now - p.t) / LIFE;
        const a = (1 - age) * 0.16;
        const r = 0.8 + (1 - age) * 3.2;
        tctx.fillStyle = "rgba(17, 17, 17, " + a + ")";
        tctx.beginPath();
        tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        tctx.fill();
      }
    }
    requestAnimationFrame(trailLoop);
  }
  requestAnimationFrame(trailLoop);

  // widgets

  const $widget = document.getElementById("widget");
  const $widgetCanvas = document.getElementById("widget-canvas");
  let widgetTimer = 0;
  let widgetRAF = 0;
  let activeWidget = "";
  let voidRevealTimer = 0;
  let mirrorStream = null;
  let playCleanup = null;

  function clearWidget() {
    clearTimeout(widgetTimer);
    clearTimeout(voidRevealTimer);
    cancelAnimationFrame(widgetRAF);
    activeWidget = "";
    $widget.classList.remove("show");
    $widgetCanvas.classList.remove("show");
    document.body.classList.remove("stars-mode", "void-mode", "mirror-mode", "play-mode");
    if (playCleanup) { playCleanup(); playCleanup = null; }
    $widget.innerHTML = "";
    if (mirrorStream) {
      mirrorStream.getTracks().forEach(t => t.stop());
      mirrorStream = null;
    }
    try {
      const ctx = $widgetCanvas.getContext("2d");
      ctx.globalCompositeOperation = "source-over";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, $widgetCanvas.width, $widgetCanvas.height);
    } catch (e) {}
  }

  function sizeWidgetCanvas() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    $widgetCanvas.width = Math.round(innerWidth * dpr);
    $widgetCanvas.height = Math.round(innerHeight * dpr);
    $widgetCanvas.style.width = innerWidth + "px";
    $widgetCanvas.style.height = innerHeight + "px";
    const ctx = $widgetCanvas.getContext("2d");
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return ctx;
  }

  function fireWidget(kind) {
    if (kind === activeWidget) return;
    clearWidget();
    document.body.style.background = "";
    document.body.classList.remove("enchanted");
    const bioEl = document.querySelector(".bio");
    if (bioEl) bioEl.classList.remove("enchanted");
    activeWidget = kind;
    if (kind === "stars") { runStars(); return; }
    if (kind === "void") { runVoid(); return; }
    if (kind === "mirror") { runMirror(); return; }
    if (kind === "play") { runPlay(); return; }
  }

  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: Math.cos(angle) * drift, vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w; sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10; sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 1.0, len: 60 + Math.random() * 80, size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  function runVoid() {
    document.body.classList.add("void-mode");
    voidRevealTimer = setTimeout(() => {
      if (activeWidget !== "void") return;
      $widget.innerHTML = '<div style="color:rgba(232,230,223,0.7);font-family:\'Iowan Old Style\',Georgia,serif;font-size:clamp(28px,2.8vw,36px);letter-spacing:0.08em;font-style:italic;opacity:0;transition:opacity 2s ease">In the void is virtue, and no evil</div>';
      $widget.classList.add("show");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const d = $widget.querySelector("div");
          if (d) d.style.opacity = "1";
        });
      });
    }, 1500);
    widgetTimer = setTimeout(clearWidget, 8000);
  }

  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  function runPlay() {
    const ctx = sizeWidgetCanvas();
    const W = innerWidth, H = innerHeight;
    document.body.classList.add("play-mode");
    $widgetCanvas.classList.add("show");

    let phase = "launch";
    let phaseT = 0;
    let lastT = performance.now();

    const keys = {};
    function kd(e) {
      keys[e.code] = true;
      if (phase === "game" && /^(Arrow|Space)/.test(e.code)) e.preventDefault();
    }
    function ku(e) { keys[e.code] = false; }
    addEventListener("keydown", kd, { capture: true });
    addEventListener("keyup", ku);
    playCleanup = () => {
      removeEventListener("keydown", kd, { capture: true });
      removeEventListener("keyup", ku);
    };

    let fadeAlpha = 0;
    let fadeTarget = 0;
    let fadeCallback = null;

    function fadeTo(p) {
      fadeTarget = 1;
      fadeCallback = () => { phase = p; phaseT = 0; fadeTarget = 0; };
    }
    function setPhase(p) { phase = p; phaseT = 0; }

    function hash(n) { return ((n * 2654435761) >>> 0) / 4294967296; }

    const FONT = "'Iowan Old Style', 'Palatino Linotype', Georgia, serif";

    // ===== 3D ROCKET =====
    const rEdges = [];
    const SI = 10, BR = 0.25, NT = -2.0, BT = -0.8, BB = 0.9, NZR = 0.32;
    for (let i = 0; i < SI; i++) {
      const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
      const c1 = Math.cos(a1), s1 = Math.sin(a1), c2 = Math.cos(a2), s2 = Math.sin(a2);
      rEdges.push([c1*BR, BT, s1*BR, c2*BR, BT, s2*BR]);
      rEdges.push([c1*BR, BB, s1*BR, c2*BR, BB, s2*BR]);
      rEdges.push([c1*NZR, BB+0.12, s1*NZR, c2*NZR, BB+0.12, s2*NZR]);
      rEdges.push([c1*BR, BT, s1*BR, c1*BR, BB, s1*BR]);
      rEdges.push([c1*BR, BT, s1*BR, 0, NT, 0]);
      rEdges.push([c1*BR, BB, s1*BR, c1*NZR, BB+0.12, s1*NZR]);
    }
    for (let b = 1; b <= 3; b++) {
      const by = BT + (BB - BT) * (b / 4);
      for (let i = 0; i < SI; i++) {
        const a1 = (i / SI) * Math.PI * 2, a2 = ((i + 1) / SI) * Math.PI * 2;
        rEdges.push([Math.cos(a1)*BR, by, Math.sin(a1)*BR, Math.cos(a2)*BR, by, Math.sin(a2)*BR]);
      }
    }
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 8;
      const fc = Math.cos(a), fs = Math.sin(a), tip = BR + 0.5;
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*tip, BB+0.4, fs*tip]);
      rEdges.push([fc*tip, BB+0.4, fs*tip, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
      rEdges.push([fc*BR, BB-0.25, fs*BR, fc*BR*0.9, BB+0.12, fs*BR*0.9]);
    }

    function drawRocket(cx, cy, rotY, sc, alpha) {
      const cosR = Math.cos(rotY), sinR = Math.sin(rotY);
      ctx.lineCap = "round";
      for (let pass = 0; pass < 2; pass++) {
        ctx.lineWidth = pass === 0 ? 3.2 : 1.0;
        for (const e of rEdges) {
          const rx1 = e[0]*cosR - e[2]*sinR, rz1 = e[0]*sinR + e[2]*cosR;
          const rx2 = e[3]*cosR - e[5]*sinR, rz2 = e[3]*sinR + e[5]*cosR;
          const f = 450;
          const p1 = f / (f + rz1*sc), p2 = f / (f + rz2*sc);
          const depth = (rz1 + rz2) * 0.5;
          const da = pass === 0 ? alpha * 0.08 : alpha * Math.max(0.2, 1 - depth * 0.4) * 0.8;
          const col = pass === 0 ? "140,190,255" : "220,235,255";
          ctx.strokeStyle = "rgba(" + col + "," + da + ")";
          ctx.beginPath();
          ctx.moveTo(cx + rx1*sc*p1, cy + e[1]*sc*p1);
          ctx.lineTo(cx + rx2*sc*p2, cy + e[4]*sc*p2);
          ctx.stroke();
        }
      }
    }

    // ===== LAUNCH STATE =====
    let rY = H * 0.65, rVel = 0, rRot = 0;
    const exhaust = [];
    const bgStars = [];
    for (let i = 0; i < 180; i++) bgStars.push({ x: hash(i)*W, y: hash(i+999)*H, r: 0.15+hash(i+500)*0.9, b: 0.15+hash(i+250)*0.5 });

    // ===== WARP STATE =====
    const wStars = [];
    for (let i = 0; i < 1200; i++) wStars.push({
      a: Math.random() * Math.PI * 2,
      d: 0.05 + Math.pow(Math.random(), 0.7) * 1.2,
      z: Math.random(),
      spd: 0.6 + Math.random() * 0.6,
      w: 0.4 + Math.pow(Math.random(), 2) * 3.5,
      hue: Math.random(),
    });

    // ===== CRASH STATE =====

    // ===== DRIFT WORLD (3rd person astronaut) =====
    const DRIFT_DUR = 35;
    const dCx = W / 2, dCy = H / 2;

    const farStars = [];
    for (let i = 0; i < 500; i++) farStars.push({
      x: (hash(i * 31) - 0.5) * 6, y: (hash(i * 59) - 0.5) * 5,
      z: 0.5 + hash(i * 97) * 12,
      r: 0.15 + hash(i * 13) * 0.6,
      tw: hash(i * 41) * 6.28,
      bright: 0.2 + hash(i * 77) * 0.8,
    });

    const spaceDebris = [];
    for (let i = 0; i < 80; i++) {
      spaceDebris.push({
        x: (hash(i * 53) - 0.5) * 8,
        y: (hash(i * 67) - 0.5) * 6,
        z: 2 + hash(i * 83) * 50,
        sz: 0.3 + hash(i * 29) * 2.5,
        warm: hash(i * 41),
        rotSpd: (hash(i * 19) - 0.5) * 2,
      });
    }

    const nebulae = [];
    for (let i = 0; i < 6; i++) nebulae.push({
      x: (hash(i * 137) - 0.5) * 4,
      y: (hash(i * 211) - 0.5) * 3,
      z: 5 + hash(i * 173) * 35,
      r: 150 + hash(i * 97) * 250,
      cr: Math.floor(40 + hash(i * 61) * 100),
      cg: Math.floor(20 + hash(i * 43) * 60),
      cb: Math.floor(80 + hash(i * 89) * 120),
    });

    const P = { x: 0, y: 0, vx: 0, vy: 0, tilt: 0, tumble: 0 };
    let driftZ = 0;
    let ended = false;

    // ======== LAUNCH ========
    function drawLaunch(dt) {
      ctx.fillStyle = "#020204";
      ctx.fillRect(0, 0, W, H);

      for (const s of bgStars) {
        ctx.fillStyle = "rgba(232,230,223," + s.b + ")";
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }

      // phase 0-2s: dark stillness, rocket visible, subtle rumble building
      // phase 2-2.4s: ignition — bright glow blooms
      // phase 2.4s+: lift, accelerating

      const ignitionT = 2.0;
      const liftT = 2.4;

      // pre-ignition rumble
      let shX = 0, shY = 0;
      if (phaseT > 1.0 && phaseT < ignitionT) {
        const ri = (phaseT - 1.0) / (ignitionT - 1.0);
        shX = (Math.random() - 0.5) * ri * 2;
        shY = (Math.random() - 0.5) * ri * 2;
      }
      // post-ignition shake intensifies
      if (phaseT >= ignitionT) {
        const pi = Math.min(1, (phaseT - ignitionT) / 2);
        const mag = 2 + pi * 8;
        shX = (Math.random() - 0.5) * mag;
        shY = (Math.random() - 0.5) * mag;
      }

      ctx.save();
      ctx.translate(shX, shY);

      rRot += dt * 0.4;
      if (phaseT > liftT) {
        const accelT = phaseT - liftT;
        rVel += (200 + accelT * 350) * dt;
        rY -= rVel * dt;
      }

      const rsx = W / 2, rsy = rY;

      // exhaust (only after ignition)
      if (phaseT >= ignitionT && rsy > -150) {
        const power = Math.min(1, (phaseT - ignitionT) / 0.5);
        const cnt = Math.floor(3 + power * 8);
        for (let i = 0; i < cnt; i++) {
          const spread = 6 + power * 12;
          exhaust.push({
            x: rsx + (Math.random() - 0.5) * spread,
            y: rsy + 42,
            vx: (Math.random() - 0.5) * 50 * power,
            vy: 40 + Math.random() * 120 * power,
            life: 0.6 + Math.random() * 0.5,
            r: 1 + Math.random() * 3.5,
            hot: Math.random() > 0.3,
          });
        }
      }

      for (let i = exhaust.length - 1; i >= 0; i--) {
        const p = exhaust[i];
        p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 15 * dt; p.life -= dt * 1.4;
        if (p.life <= 0) { exhaust.splice(i, 1); continue; }
        const la = p.life * (p.hot ? 0.9 : 0.65);
        ctx.fillStyle = p.hot
          ? "rgba(255,250,240," + la + ")"
          : "rgba(255," + Math.floor(130 + p.life * 90) + "," + Math.floor(30 + p.life * 40) + "," + la + ")";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.2 + p.life * 0.8), 0, Math.PI * 2); ctx.fill();
      }

      // engine glow (blooms at ignition)
      if (phaseT >= ignitionT - 0.3 && rsy > -150) {
        const bloom = phaseT < ignitionT
          ? Math.pow((phaseT - (ignitionT - 0.3)) / 0.3, 2) * 0.3
          : Math.min(1, (phaseT - ignitionT) / 0.4);
        const gr = 20 + bloom * 50;
        const glow = ctx.createRadialGradient(rsx, rsy + 42, 0, rsx, rsy + 42, gr);
        glow.addColorStop(0, "rgba(255,200,100," + (bloom * 0.6) + ")");
        glow.addColorStop(0.4, "rgba(255,120,40," + (bloom * 0.25) + ")");
        glow.addColorStop(1, "rgba(255,60,15,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(rsx - gr, rsy + 42 - gr, gr * 2, gr * 2);
      }

      // speed lines (only during fast travel)
      if (phaseT > liftT + 0.8) {
        const si = Math.min(1, (phaseT - liftT - 0.8) / 1.5);
        ctx.globalAlpha = si * 0.12;
        for (let i = 0; i < 25; i++) {
          const ang = hash(i * 137) * Math.PI * 2;
          const d0 = 0.3 + hash(i * 71) * 0.7;
          const ox = Math.cos(ang) * W * 0.6 * d0;
          const oy = Math.sin(ang) * H * 0.6 * d0;
          ctx.strokeStyle = "#b0caff";
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(W/2 + ox, H/2 + oy);
          ctx.lineTo(W/2 + ox * (1 - si * 0.5), H/2 + oy * (1 - si * 0.5));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      if (rsy > -150) drawRocket(rsx, rsy, rRot, 26, 1);
      ctx.restore();

      if (rY < -160 && !fadeCallback) fadeTo("warp");
    }

    // ======== WARP ========
    function drawWarp(dt) {
      const dur = 7;
      const p = Math.min(1, phaseT / dur);
      const cx = W / 2, cy = H / 2;
      const diag = Math.hypot(W, H);

      // speed: stillness → violent punch → sustained → decelerate
      let speed;
      if (p < 0.04) speed = 0;
      else if (p < 0.1) speed = Math.pow((p - 0.04) / 0.06, 3) * 1.0;
      else if (p < 0.75) speed = 1.0 + (p - 0.1) * 0.6;
      else speed = Math.max(0.08, 1.4 - (p - 0.75) * 5.0);

      const rot = phaseT * 0.06;

      // background: very deep blue-black
      ctx.fillStyle = "rgb(1,1," + Math.floor(Math.min(6, p * 8)) + ")";
      ctx.fillRect(0, 0, W, H);

      // color journey
      let cr, cg, cb;
      if (p < 0.12) { cr = 180; cg = 200; cb = 255; }
      else if (p < 0.3) {
        const t = (p - 0.12) / 0.18;
        cr = 180 - t * 110; cg = 200 - t * 90; cb = 255;
      } else if (p < 0.5) {
        const t = (p - 0.3) / 0.2;
        cr = Math.floor(70 + t * 90); cg = Math.floor(110 - t * 70); cb = Math.floor(255 - t * 50);
      } else if (p < 0.72) {
        const t = (p - 0.5) / 0.22;
        cr = Math.floor(160 + t * 40); cg = Math.floor(40 + t * 30); cb = Math.floor(205 - t * 140);
      } else {
        const t = (p - 0.72) / 0.28;
        cr = Math.floor(200 + t * 30); cg = Math.floor(70 + t * 50); cb = Math.floor(65 - t * 40);
      }

      // === DEPTH RINGS — concentric light bands rushing toward camera ===
      if (speed > 0.2 && p < 0.82) {
        const ringI = Math.min(1, (speed - 0.2) / 0.4) * (p < 0.75 ? 1 : (0.82 - p) / 0.07);
        for (let i = 0; i < 5; i++) {
          let rz = ((hash(i * 37) + phaseT * 0.6 * (0.5 + hash(i * 71) * 0.5)) % 1);
          const ringR = diag * 0.5 * (1 - rz);
          if (ringR < 5 || ringR > diag * 0.55) continue;
          const ringA = ringI * (1 - rz) * 0.08;
          ctx.strokeStyle = "rgba(" + cr + "," + cg + "," + cb + "," + ringA + ")";
          ctx.lineWidth = 1.5 + (1 - rz) * 3;
          ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2); ctx.stroke();
        }
      }

      // === INITIAL FLASH ===
      if (p > 0.03 && p < 0.14) {
        const fp = (p - 0.03) / 0.11;
        const flashA = fp < 0.15 ? fp / 0.15 : Math.max(0, 1 - (fp - 0.15) / 0.85);
        ctx.fillStyle = "rgba(200,220,255," + (flashA * 0.85) + ")";
        ctx.fillRect(0, 0, W, H);
      }

      // === TUNNEL STREAKS (3 depth layers with different behaviors) ===
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rot);

      for (const s of wStars) {
        s.z -= speed * dt * s.spd;
        if (s.z <= 0) {
          s.z = 1;
          s.a = Math.random() * Math.PI * 2;
          s.d = 0.04 + Math.pow(Math.random(), 0.6) * 1.3;
        }
        if (s.z > 1) s.z = s.z % 1;

        const invZ = 1 - s.z;
        // spiral: stars at different depths spiral at different rates
        const spiralOffset = invZ * invZ * 0.3 * s.spd;
        const angle = s.a + spiralOffset;
        const radius = s.d * diag * 0.65 * invZ;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        if (Math.abs(x) > W * 0.65 || Math.abs(y) > H * 0.65) continue;

        const innerInvZ = Math.max(0, invZ - speed * dt * s.spd * 3);
        const innerR = s.d * diag * 0.65 * innerInvZ;
        const x2 = Math.cos(angle) * innerR;
        const y2 = Math.sin(angle) * innerR;

        const bright = Math.min(1, invZ * invZ * 2.5) * Math.min(1, speed * 1.5);
        if (bright < 0.015) continue;

        const sr = Math.min(255, Math.max(0, cr + (s.hue - 0.5) * 80));
        const sg = Math.min(255, Math.max(0, cg + (s.hue - 0.5) * 50));
        const sb = Math.min(255, Math.max(0, cb + (s.hue - 0.5) * 40));

        // line width varies with depth — close streaks are thick and bright
        const lw = s.w * invZ * 2.2;
        ctx.strokeStyle = "rgba(" + Math.floor(sr) + "," + Math.floor(sg) + "," + Math.floor(sb) + "," + (bright * 0.8) + ")";
        ctx.lineWidth = lw;
        ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x, y); ctx.stroke();

        // white-hot core on close thick streaks
        if (invZ > 0.7 && s.w > 1.5) {
          ctx.strokeStyle = "rgba(255,255,255," + (bright * 0.5) + ")";
          ctx.lineWidth = lw * 0.35;
          ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x, y); ctx.stroke();
        }

        // close-pass FLASH: big stars that whoosh past produce a bright bloom
        if (invZ > 0.92 && s.w > 2.5 && s.d > 0.6) {
          const flashI = (invZ - 0.92) / 0.08;
          const fr = 20 + flashI * 60;
          const fGrad = ctx.createRadialGradient(x, y, 0, x, y, fr);
          fGrad.addColorStop(0, "rgba(255,255,255," + (flashI * 0.3) + ")");
          fGrad.addColorStop(0.3, "rgba(" + Math.floor(sr) + "," + Math.floor(sg) + "," + Math.floor(sb) + "," + (flashI * 0.15) + ")");
          fGrad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = fGrad;
          ctx.fillRect(x - fr, y - fr, fr * 2, fr * 2);
        }
      }
      ctx.restore();

      // === LATERAL PASSING OBJECTS — bright shapes sweeping across from sides ===
      if (speed > 0.5 && p > 0.15 && p < 0.75) {
        const passI = Math.min(1, (p - 0.15) / 0.1);
        for (let i = 0; i < 3; i++) {
          const t = (phaseT * (0.4 + i * 0.15) + hash(i * 97) * 10) % 3;
          if (t > 1) continue;
          const side = hash(i * 53) > 0.5 ? 1 : -1;
          const px = side * (W * 0.55 - t * W * 0.3);
          const py = (hash(i * 31) - 0.5) * H * 0.6;
          const sz = 3 + (1 - t) * 15;
          const a = passI * (1 - t) * 0.4;
          const g = ctx.createRadialGradient(cx + px, cy + py, 0, cx + px, cy + py, sz);
          g.addColorStop(0, "rgba(255,255,255," + (a * 0.6) + ")");
          g.addColorStop(0.4, "rgba(" + cr + "," + cg + "," + cb + "," + (a * 0.3) + ")");
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.fillRect(cx + px - sz, cy + py - sz, sz * 2, sz * 2);
        }
      }

      // === VOLUMETRIC FOG — drifting color bands ===
      if (p > 0.1 && p < 0.78) {
        const fogI = Math.min(1, (p - 0.1) / 0.08) * (p < 0.7 ? 1 : Math.max(0, (0.78 - p) / 0.08));
        for (let i = 0; i < 4; i++) {
          const fAng = phaseT * 0.25 + i * 1.57;
          const fDist = W * 0.2 + Math.sin(fAng * 0.5 + i) * W * 0.18;
          const fx = cx + Math.cos(fAng) * fDist;
          const fy = cy + Math.sin(fAng) * fDist;
          const fr = W * 0.25 + i * 30;
          const fGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
          const fHue = (i * 0.25 + p * 0.5) % 1;
          const fcr = Math.floor(cr * (0.4 + fHue * 0.3));
          const fcg = Math.floor(cg * (0.3 + fHue * 0.4));
          const fcb = Math.floor(cb * (0.5 + fHue * 0.3));
          fGrad.addColorStop(0, "rgba(" + fcr + "," + fcg + "," + fcb + "," + (fogI * 0.05) + ")");
          fGrad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = fGrad;
          ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
        }
      }

      // === CENTRAL GLOW ===
      if (speed > 0.15) {
        const glowI = Math.min(1, speed / 0.8);
        const gr = W * 0.06;
        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr);
        glow.addColorStop(0, "rgba(255,255,255," + (glowI * 0.12) + ")");
        glow.addColorStop(0.4, "rgba(" + cr + "," + cg + "," + cb + "," + (glowI * 0.06) + ")");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(cx - gr, cy - gr, gr * 2, gr * 2);
      }

      // === VIGNETTE ===
      const vigR = diag * (0.5 - speed * 0.1);
      const vig = ctx.createRadialGradient(cx, cy, vigR * 0.25, cx, cy, vigR);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(0.6, "rgba(0,0,0," + (0.15 + speed * 0.2) + ")");
      vig.addColorStop(1, "rgba(0,0,0," + (0.55 + speed * 0.35) + ")");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // === MARS APPROACH ===
      if (p > 0.8) {
        const mp = (p - 0.8) / 0.2;
        const mr = mp * mp * Math.min(W, H) * 0.9;
        const mGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(1, mr));
        mGrad.addColorStop(0, "rgba(180,70,32," + (mp * 0.9) + ")");
        mGrad.addColorStop(0.3, "rgba(140,50,22," + (mp * 0.7) + ")");
        mGrad.addColorStop(0.6, "rgba(90,35,15," + (mp * 0.4) + ")");
        mGrad.addColorStop(1, "rgba(40,15,8,0)");
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(cx, cy, mr, 0, Math.PI * 2); ctx.fill();
      }

      if (phaseT >= dur && !fadeCallback) fadeTo("crash");
    }

    // ======== CRASH (instant impact → eject into space) ========
    function drawCrash(dt) {
      const dur = 1.8;
      const pr = Math.min(1, phaseT / dur);
      const ccx = W / 2, ccy = H / 2;

      // 0-0.15: white flash (impact)
      // 0.15-1.0: Mars shrinks away below as you tumble backward into space

      if (pr < 0.15) {
        // blinding white flash
        const fi = pr / 0.15;
        const flashA = fi < 0.3 ? fi / 0.3 : 1 - (fi - 0.3) / 0.7;
        ctx.fillStyle = "rgba(255,240,230," + flashA + ")";
        ctx.fillRect(0, 0, W, H);

        // shake
        const shk = (1 - fi) * 25;
        ctx.save();
        ctx.translate((Math.random() - 0.5) * shk, (Math.random() - 0.5) * shk);
        ctx.restore();
      } else {
        // space background
        ctx.fillStyle = "#020206";
        ctx.fillRect(0, 0, W, H);

        // stars appearing
        const starA = Math.min(1, (pr - 0.15) / 0.3);
        for (let i = 0; i < 80; i++) {
          ctx.fillStyle = "rgba(220,225,235," + (starA * (0.1 + hash(i + 700) * 0.3)) + ")";
          ctx.beginPath();
          ctx.arc(hash(i + 300) * W, hash(i + 400) * H, 0.2 + hash(i + 600) * 0.5, 0, 6.28);
          ctx.fill();
        }

        // Mars: starts filling bottom half, rapidly shrinks to a small dot
        const ej = (pr - 0.15) / 0.85;
        const marsR = Math.max(2, (1 - ej * ej) * H * 0.8);
        const marsY = ccy + ej * ej * H * 0.6;

        const mGrad = ctx.createRadialGradient(ccx, marsY, 0, ccx, marsY, marsR);
        mGrad.addColorStop(0, "rgba(160,65,28," + Math.max(0.1, 1 - ej * 0.5) + ")");
        mGrad.addColorStop(0.5, "rgba(120,45,20," + Math.max(0.05, 0.7 - ej * 0.4) + ")");
        mGrad.addColorStop(0.8, "rgba(70,25,12," + Math.max(0, 0.4 - ej * 0.3) + ")");
        mGrad.addColorStop(1, "rgba(30,10,5,0)");
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(ccx, marsY, marsR, 0, Math.PI * 2); ctx.fill();

        // subtle atmospheric rim on Mars
        if (marsR > 10) {
          ctx.strokeStyle = "rgba(200,120,60," + (0.2 * (1 - ej)) + ")";
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(ccx, marsY, marsR * 0.95, 0, Math.PI * 2); ctx.stroke();
        }

        // tumble rotation effect (screen rotates slightly)
        if (ej < 0.5) {
          const tumbleA = (1 - ej * 2) * 0.02;
          ctx.save();
          ctx.translate(ccx, ccy);
          ctx.rotate(Math.sin(phaseT * 8) * tumbleA);
          ctx.translate(-ccx, -ccy);
          ctx.restore();
        }
      }

      if (phaseT >= dur && !fadeCallback) {
        fadeCallback = () => {
          P.x = 0; P.y = 0; P.vx = 0; P.vy = 0; P.tilt = 0; P.tumble = 0;
          driftZ = 0; ended = false;
          phase = "game"; phaseT = 0; fadeTarget = 0;
        };
        fadeTarget = 1;
      }
    }

    // ======== DRIFT (3rd person astronaut) ========
    function drawGame(dt) {
      if (ended) return;

      // auto-drift forward
      const baseSpd = 1.0;
      driftZ += dt * baseSpd;

      // responsive controls — moves the astronaut visibly on screen
      const accel = 4.0;
      if (keys["ArrowLeft"] || keys["KeyA"]) P.vx -= accel * dt;
      if (keys["ArrowRight"] || keys["KeyD"]) P.vx += accel * dt;
      if (keys["ArrowUp"] || keys["KeyW"]) P.vy -= accel * dt;
      if (keys["ArrowDown"] || keys["KeyS"]) P.vy += accel * dt;
      P.vx *= Math.pow(0.92, dt * 60);
      P.vy *= Math.pow(0.92, dt * 60);
      P.x += P.vx * dt * 60;
      P.y += P.vy * dt * 60;
      P.x = Math.max(-W * 0.35, Math.min(W * 0.35, P.x));
      P.y = Math.max(-H * 0.3, Math.min(H * 0.3, P.y));

      // tilt toward movement direction
      const targetTilt = P.vx * 12;
      P.tilt += (targetTilt - P.tilt) * dt * 4;
      P.tumble += dt * 0.15;

      const progress = Math.min(1, driftZ / DRIFT_DUR);
      const cx = dCx, cy = dCy;

      // background: deep space with evolving tone
      let bgR, bgG, bgB;
      if (progress < 0.3) {
        const t = progress / 0.3;
        bgR = 3 + t * 5; bgG = 2 + t * 2; bgB = 6 + t * 4;
      } else if (progress < 0.6) {
        const t = (progress - 0.3) / 0.3;
        bgR = 8 - t * 4; bgG = 4 + t * 3; bgB = 10 + t * 8;
      } else if (progress < 0.85) {
        const t = (progress - 0.6) / 0.25;
        bgR = 4 + t * 2; bgG = 7 - t * 3; bgB = 18 - t * 8;
      } else {
        const t = (progress - 0.85) / 0.15;
        bgR = 6 + t * 8; bgG = 4 + t * 10; bgB = 10 + t * 15;
      }
      ctx.fillStyle = "rgb(" + Math.floor(bgR) + "," + Math.floor(bgG) + "," + Math.floor(bgB) + ")";
      ctx.fillRect(0, 0, W, H);

      // parallax offset from astronaut position
      const parX = -P.x * 0.15;
      const parY = -P.y * 0.15;

      // --- DEEP STAR FIELD (500 stars, parallax) ---
      for (const s of farStars) {
        const dz = s.z - (driftZ * 0.3 % 12);
        const wz = dz < 0.2 ? dz + 12 : dz;
        const sc = 120 / wz;
        const sx = cx + (s.x + parX * 0.3) * sc;
        const sy = cy + (s.y + parY * 0.3) * sc;
        if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) continue;
        const tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(s.tw + phaseT * 0.4));
        const bright = s.bright * tw * Math.min(1, 1.5 / wz);
        if (bright < 0.03) continue;
        ctx.fillStyle = "rgba(220,225,235," + Math.min(0.95, bright) + ")";
        ctx.beginPath(); ctx.arc(sx, sy, s.r * Math.min(1.2, sc * 0.04), 0, 6.28); ctx.fill();
      }

      // --- NEBULAE (gorgeous volumetric color) ---
      for (const n of nebulae) {
        const relZ = n.z - driftZ * 0.5;
        if (relZ < -5 || relZ > 40) continue;
        const sc = 300 / Math.max(1, relZ);
        const nx = cx + (n.x + parX * 0.5) * sc;
        const ny = cy + (n.y + parY * 0.5) * sc;
        const nr = n.r * sc * 0.01;
        if (nr < 10) continue;
        if (nx < -nr || nx > W + nr || ny < -nr || ny > H + nr) continue;
        const fog = Math.min(0.8, Math.max(0, relZ) / 30);
        const nA = (1 - fog) * 0.06;
        if (nA < 0.003) continue;
        const nG = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
        nG.addColorStop(0, "rgba(" + n.cr + "," + n.cg + "," + n.cb + "," + nA + ")");
        nG.addColorStop(0.4, "rgba(" + Math.floor(n.cr * 0.6) + "," + Math.floor(n.cg * 0.6) + "," + Math.floor(n.cb * 0.8) + "," + (nA * 0.5) + ")");
        nG.addColorStop(1, "rgba(" + Math.floor(n.cr * 0.3) + "," + Math.floor(n.cg * 0.3) + "," + Math.floor(n.cb * 0.4) + ",0)");
        ctx.fillStyle = nG;
        ctx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
      }

      // --- SPACE DEBRIS (small glowing particles floating past) ---
      const FOV = 180;
      for (const d of spaceDebris) {
        const relZ = d.z - (driftZ * 0.8 % 52);
        const wz = relZ < 0.5 ? relZ + 52 : relZ;
        if (wz > 20) continue;
        const sc = FOV / wz;
        const sx = cx + (d.x + parX * 0.8) * sc;
        const sy = cy + (d.y + parY * 0.8) * sc;
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
        const r = d.sz * sc * 0.3;
        const fog = Math.min(0.85, wz / 18);
        const a = (1 - fog) * 0.5;
        if (a < 0.02) continue;
        const warmCol = d.warm > 0.5;
        const cr = warmCol ? 180 + d.warm * 40 : 130;
        const cg = warmCol ? 140 : 140 + d.warm * 30;
        const cb = warmCol ? 100 : 170 + d.warm * 40;
        if (r < 2) {
          ctx.fillStyle = "rgba(" + Math.floor(cr) + "," + Math.floor(cg) + "," + Math.floor(cb) + "," + a + ")";
          ctx.beginPath(); ctx.arc(sx, sy, Math.max(0.3, r), 0, 6.28); ctx.fill();
        } else {
          const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
          grd.addColorStop(0, "rgba(" + Math.floor(cr) + "," + Math.floor(cg) + "," + Math.floor(cb) + "," + a + ")");
          grd.addColorStop(0.6, "rgba(" + Math.floor(cr * 0.5) + "," + Math.floor(cg * 0.5) + "," + Math.floor(cb * 0.5) + "," + (a * 0.3) + ")");
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(sx - r, sy - r, r * 2, r * 2);
        }
      }

      // --- MARS GLOW (fading behind) ---
      if (progress < 0.3) {
        const marsA = (1 - progress / 0.3) * 0.4;
        const marsR = (1 - progress / 0.3) * H * 0.35;
        const mGlow = ctx.createRadialGradient(cx + parX, H + marsR * 0.2 + parY, 0, cx + parX, H + marsR * 0.2 + parY, marsR);
        mGlow.addColorStop(0, "rgba(150,60,25," + marsA + ")");
        mGlow.addColorStop(0.5, "rgba(80,30,12," + (marsA * 0.5) + ")");
        mGlow.addColorStop(1, "rgba(40,15,8,0)");
        ctx.fillStyle = mGlow;
        ctx.fillRect(0, H - marsR, W, marsR + 10);
      }

      // --- EARTH (pale blue dot growing) ---
      if (progress > 0.7) {
        const earthI = (progress - 0.7) / 0.3;
        const earthR = 1 + earthI * 6;
        const earthA = Math.min(0.95, earthI * 1.2);
        const ex = cx * 0.7 + parX * 0.5, ey = cy * 0.4 + parY * 0.5;
        if (earthI > 0.1) {
          const eG = ctx.createRadialGradient(ex, ey, 0, ex, ey, earthR * 15);
          eG.addColorStop(0, "rgba(80,130,200," + (earthI * 0.08) + ")");
          eG.addColorStop(0.5, "rgba(60,100,170," + (earthI * 0.03) + ")");
          eG.addColorStop(1, "rgba(40,80,140,0)");
          ctx.fillStyle = eG;
          ctx.fillRect(ex - earthR * 15, ey - earthR * 15, earthR * 30, earthR * 30);
        }
        ctx.fillStyle = "rgba(100,150,220," + earthA + ")";
        ctx.beginPath(); ctx.arc(ex, ey, earthR, 0, 6.28); ctx.fill();
        ctx.fillStyle = "rgba(180,210,245," + (earthA * 0.4) + ")";
        ctx.beginPath(); ctx.arc(ex - earthR * 0.25, ey - earthR * 0.25, earthR * 0.45, 0, 6.28); ctx.fill();
      }

      // --- ASTRONAUT (3rd person, backlit silhouette with rim light) ---
      const ax = cx + P.x;
      const ay = cy + H * 0.2 + P.y;
      const S = Math.min(W, H) * 0.028;

      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(P.tilt * 0.015 + Math.sin(P.tumble) * 0.025);

      const breathe = Math.sin(phaseT * 1.2) * 0.02;
      const armFloat = Math.sin(phaseT * 0.6) * 0.12;
      const legFloat = Math.sin(phaseT * 0.4 + 1) * 0.08;

      // rim-light glow (backlit by distant star)
      const rimGlow = ctx.createRadialGradient(0, -S, S * 0.8, 0, -S * 0.5, S * 4);
      rimGlow.addColorStop(0, "rgba(140,170,220,0.06)");
      rimGlow.addColorStop(0.5, "rgba(80,110,170,0.02)");
      rimGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = rimGlow;
      ctx.fillRect(-S * 4, -S * 5, S * 8, S * 10);

      // build silhouette path (all one continuous shape)
      ctx.beginPath();

      // helmet (rounded top)
      ctx.arc(0, -S * 2.6, S * 0.85, -Math.PI * 0.85, -Math.PI * 0.15);

      // right shoulder & arm
      ctx.bezierCurveTo(S * 0.9, -S * 2.0, S * 0.75, -S * 1.4, S * 0.6, -S * 0.8);
      // right arm floating outward
      ctx.bezierCurveTo(S * 0.95, -S * 1.2 - armFloat * S, S * 1.3, -S * 1.8 - armFloat * S * 0.5, S * 1.2, -S * 2.2 - armFloat * S);

      // right hand (small bump)
      ctx.bezierCurveTo(S * 1.25, -S * 2.35 - armFloat * S, S * 1.15, -S * 2.4 - armFloat * S, S * 1.1, -S * 2.2 - armFloat * S);

      // back to right torso
      ctx.bezierCurveTo(S * 0.9, -S * 1.6 - armFloat * S * 0.3, S * 0.7, -S * 0.6, S * 0.55, S * 0.2);

      // right hip to right leg
      ctx.bezierCurveTo(S * 0.55, S * 0.8, S * 0.5 + legFloat * S * 0.3, S * 1.6, S * 0.45 + legFloat * S * 0.4, S * 2.6 + legFloat * S);

      // right boot
      ctx.bezierCurveTo(S * 0.5 + legFloat * S * 0.4, S * 2.9 + legFloat * S, S * 0.3 + legFloat * S * 0.3, S * 2.95 + legFloat * S, S * 0.2 + legFloat * S * 0.2, S * 2.8 + legFloat * S * 0.8);

      // crotch
      ctx.bezierCurveTo(S * 0.1, S * 2.0, -S * 0.1, S * 2.0, -S * 0.2 - legFloat * S * 0.15, S * 2.7 - legFloat * S * 0.3);

      // left boot
      ctx.bezierCurveTo(-S * 0.3 - legFloat * S * 0.2, S * 2.9 - legFloat * S * 0.3, -S * 0.5 - legFloat * S * 0.2, S * 2.85 - legFloat * S * 0.2, -S * 0.45 - legFloat * S * 0.3, S * 2.5 - legFloat * S * 0.5);

      // left leg back up
      ctx.bezierCurveTo(-S * 0.5 - legFloat * S * 0.2, S * 1.5, -S * 0.55, S * 0.8, -S * 0.55, S * 0.2);

      // left torso to left arm
      ctx.bezierCurveTo(-S * 0.7, -S * 0.6, -S * 0.85, -S * 1.5 + armFloat * S * 0.3, -S * 1.05, -S * 2.0 + armFloat * S * 0.6);

      // left hand
      ctx.bezierCurveTo(-S * 1.2, -S * 2.3 + armFloat * S * 0.5, -S * 1.25, -S * 2.4 + armFloat * S * 0.4, -S * 1.15, -S * 2.3 + armFloat * S * 0.5);

      // left arm back to shoulder
      ctx.bezierCurveTo(-S * 0.95, -S * 1.8 + armFloat * S * 0.2, -S * 0.8, -S * 1.4, -S * 0.7, -S * 1.8);

      // left shoulder to helmet
      ctx.bezierCurveTo(-S * 0.75, -S * 2.0, -S * 0.85, -S * 2.4, -S * 0.6, -S * 2.9);

      ctx.closePath();

      // fill silhouette
      ctx.fillStyle = "rgba(8,8,12,0.92)";
      ctx.fill();

      // rim light edge (stroke the silhouette with thin bright line)
      ctx.strokeStyle = "rgba(120,150,200,0.2)";
      ctx.lineWidth = S * 0.06;
      ctx.stroke();

      // visor (golden reflection)
      ctx.beginPath();
      ctx.ellipse(S * 0.05, -S * 2.6, S * 0.5, S * 0.42, 0.05, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(8,8,12,0.95)";
      ctx.fill();
      const visorGrad = ctx.createLinearGradient(-S * 0.4, -S * 2.9, S * 0.4, -S * 2.3);
      visorGrad.addColorStop(0, "rgba(60,90,140,0.25)");
      visorGrad.addColorStop(0.5, "rgba(100,140,190,0.15)");
      visorGrad.addColorStop(1, "rgba(50,70,110,0.05)");
      ctx.fillStyle = visorGrad;
      ctx.fill();

      // backpack (subtle bump behind)
      ctx.beginPath();
      ctx.ellipse(-S * 0.6 + breathe * S, -S * 1.2, S * 0.3, S * 0.8, -0.1, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(5,5,8,0.7)";
      ctx.fill();

      ctx.restore();

      // --- POST-PROCESSING ---

      // vignette
      const vig = ctx.createRadialGradient(cx, cy, W * 0.25, cx, cy, W * 0.7);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0,0.4)");
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // subtle film grain
      ctx.globalAlpha = 0.015;
      for (let i = 0; i < 60; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? "#fff" : "#000";
        ctx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
      }
      ctx.globalAlpha = 1;

      // fade-in
      if (phaseT < 2) {
        ctx.fillStyle = "rgba(0,0,0," + (1 - phaseT / 2) + ")";
        ctx.fillRect(0, 0, W, H);
      }

      // control hint
      if (phaseT > 2 && phaseT < 7) {
        const hintA = phaseT < 3 ? (phaseT - 2) * 0.15 : Math.max(0, (7 - phaseT) / 4) * 0.15;
        ctx.fillStyle = "rgba(200,210,225," + hintA + ")";
        ctx.font = "11px " + FONT;
        ctx.textAlign = "center";
        ctx.fillText("arrow keys to drift", cx, H - 35);
      }

      // ending: white wash approaching Earth
      if (progress > 0.92) {
        const fa = Math.min(1, (progress - 0.92) / 0.08);
        ctx.fillStyle = "rgba(255,255,255," + (fa * fa) + ")";
        ctx.fillRect(0, 0, W, H);
        if (fa >= 1 && !ended) { ended = true; setPhase("ending"); }
      }
    }

    // ======== ENDING ========
    function drawEnding(dt) {
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, H);
      if (phaseT > 2.5) clearWidget();
    }

    function frame(now) {
      if (activeWidget !== "play") return;
      const rawDt = (now - lastT) / 1000;
      const dt = Math.min(rawDt, 0.05);
      lastT = now;
      phaseT += dt;
      ctx.clearRect(0, 0, W, H);
      if (phase === "launch") drawLaunch(dt);
      else if (phase === "warp") drawWarp(dt);
      else if (phase === "crash") drawCrash(dt);
      else if (phase === "game") drawGame(dt);
      else if (phase === "ending") drawEnding(dt);

      if (fadeTarget > 0) {
        fadeAlpha += dt * 2.5;
        if (fadeAlpha >= 1) { fadeAlpha = 1; if (fadeCallback) { fadeCallback(); fadeCallback = null; } }
      } else if (fadeAlpha > 0) {
        fadeAlpha -= dt * 2.5;
        if (fadeAlpha < 0) fadeAlpha = 0;
      }
      if (fadeAlpha > 0) {
        ctx.fillStyle = "rgba(0,0,0," + fadeAlpha + ")";
        ctx.fillRect(0, 0, W, H);
      }

      widgetRAF = requestAnimationFrame(frame);
    }
    widgetRAF = requestAnimationFrame(frame);
  }

  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // idle: 15s without interaction on home triggers void

  let idleTimer = 0;
  let idleActive = false;

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; clearWidget(); }
    if (!$home.hidden) { idleTimer = setTimeout(startIdle, 15000); }
  }
  function startIdle() {
    if ($home.hidden || activeWidget) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // mobile shake triggers void

  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  render(currentPath());
  resetIdle();
})();
</script>
</body>
</html>
