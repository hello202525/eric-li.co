<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Eric Li</title>
<meta name="color-scheme" content="light" />

<style>
  :root {
    --paper:  #f7f4ec;
    --ink:    #111111;
    --rule:   #d8d2c4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::selection      { background: rgba(0, 0, 0, 0.12); color: inherit; }
  ::-moz-selection { background: rgba(0, 0, 0, 0.12); color: inherit; }

  img, canvas, .typer, .widget {
    user-select: none;
    -webkit-user-select: none;
    -ms-user-select: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  html, body { background: var(--paper); color: var(--ink); height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
    overflow-x: hidden;
    transition: background 800ms ease;
  }

  .home {
    padding: clamp(48px, 9vh, 120px) clamp(24px, 4vw, 60px);
    width: fit-content;
    max-width: 100vw;
    transition: opacity 600ms ease;
  }

  .bio {
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 27px;
    line-height: 1.45;
    transition: color 600ms ease;
    letter-spacing: 0.005em;
    font-weight: 400;
  }
  .bio p { margin: 0 0 0.25em 0; }
  .bio p:last-child { margin-bottom: 0; }

  .bio .end {
    cursor: pointer;
    position: relative;
    transition: color 200ms ease;
  }
  .bio:not(.enchanted) .end:hover { color: #999; }
  .bio .end span {
    display: inline-block;
    transition: transform 600ms cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  body.enchanted { transition: background 600ms ease; }
  .bio.enchanted {
    color: rgba(17,17,17,0.18);
    transition: color 600ms ease;
  }
  .bio.enchanted .end {
    color: #111;
    text-shadow: 0 0 18px rgba(17,17,17,0.15), 0 0 48px rgba(17,17,17,0.06);
  }
  .bio .end::before {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 280px; height: 280px;
    margin-left: -140px; margin-top: -140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,17,17,0.08) 0%, transparent 70%);
    transform: scale(0);
    transition: transform 800ms cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    z-index: -1;
  }
  body.enchanted .bio .end::before {
    transform: scale(1);
  }

  .work {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vh, 56px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 10;
  }
  .work.show { opacity: 1; pointer-events: auto; }
  .work img {
    max-width: min(58vw, 760px);
    max-height: min(62vh, 660px);
    width: auto;
    height: auto;
    display: block;
    user-select: none;
    cursor: pointer;
    box-shadow: none;
    transition: opacity 400ms ease;
    opacity: 0;
    will-change: transform, opacity;
  }
  .work.show img { opacity: 1; }
  .work .meta { display: none; }

  .gallery {
    position: fixed; inset: 0;
    background: #0e0e0e;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 500ms ease;
    z-index: 9;
  }
  .gallery.show { opacity: 1; pointer-events: auto; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 6px;
    width: 100%;
    height: 100%;
    box-sizing: border-box;
  }
  .gallery-cell {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.96);
    filter: saturate(0.15);
    transition: transform 500ms ease, opacity 400ms ease, filter 500ms ease, box-shadow 500ms ease;
  }
  .gallery.show .gallery-cell {
    animation: galleryReveal 600ms ease forwards;
  }
  @keyframes galleryReveal {
    to { opacity: 0.8; transform: scale(1); }
  }
  .gallery-grid:hover .gallery-cell {
    opacity: 0.4;
    filter: saturate(0.15);
  }
  .gallery-grid:hover .gallery-cell:hover {
    opacity: 1;
    filter: saturate(1);
    transform: scale(1.03);
    box-shadow: 0 0 36px 10px rgba(0,0,0,0.65);
    z-index: 10;
  }
  .gallery-cell::after {
    content: attr(data-meta);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: rgba(232,230,223,0.85);
    font-family: 'Iowan Old Style', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
  }
  .gallery-cell:hover::after { opacity: 1; }
  .gallery-cell img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #1a1a1a;
  }

  #trail {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 700ms ease;
  }
  body.unlocked #trail { opacity: 1; }

  .typer {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Iowan Old Style', Georgia, 'Palatino Linotype', Palatino, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.005em;
    color: rgba(17, 17, 17, 0.55);
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 5;
    white-space: nowrap;
  }
  .typer.show { opacity: 1; }

  .widget {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
    z-index: 6;
    color: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    will-change: opacity;
  }
  .widget.show { opacity: 1; }

  .widget-canvas {
    position: fixed; inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 500ms ease;
  }
  .widget-canvas.show { opacity: 1; }

  body.stars-mode { background: #06070a; transition: background 400ms ease; }
  body.stars-mode .bio { color: #e8e6df; transition: color 400ms ease; }

  body.void-mode { background: #000; transition: background 1s ease; }
  body.void-mode .home { opacity: 0; transition: opacity 600ms ease; }
  body.void-mode #trail { opacity: 0; }

  body.mirror-mode { background: #0a0a0a; transition: background 500ms ease; }
  body.mirror-mode .home { opacity: 0; transition: opacity 400ms ease; }
  body.mirror-mode #trail { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1100px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(5, 1fr); }
  }
  @media (max-width: 640px) {
    body { font-size: 17px; }
    .home { padding: 80px 22px; }
    .gallery-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: auto; gap: 4px; padding: 4px; }
  }
</style>
</head>

<body>

<canvas id="trail" aria-hidden="true"></canvas>

<main class="home" id="home" hidden>
  <section class="bio">
    <p>I enjoy <span class="end" id="end">beautiful things</span>.</p>
  </section>
</main>

<section class="work" id="work" aria-hidden="true">
  <img id="work-img" alt="" />
  <div class="meta" id="work-meta"></div>
</section>

<section class="gallery" id="gallery" aria-hidden="true">
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<div class="typer" id="typer" aria-hidden="true"></div>

<div class="widget" id="widget" aria-hidden="true"></div>
<canvas class="widget-canvas" id="widget-canvas" aria-hidden="true"></canvas>

<script>
(() => {
  "use strict";

  const WORKS = [
    { slug: "hartung",      src: "works/hartung.jpg",       meta: "Hans Hartung  ·  T1989-L50  ·  1989" },
    { slug: "sugimoto",     src: "works/sugimoto.jpg",      meta: "Hiroshi Sugimoto  ·  Caribbean Sea, Jamaica  ·  1980" },
    { slug: "tapies",       src: "works/tapies.jpg",        meta: "Antoni Tàpies  ·  Mural  ·  1983" },
    { slug: "stieglitz-2",  src: "works/stieglitz-2.jpg",   meta: "Alfred Stieglitz  ·  Winter, Fifth Avenue  ·  1892" },
    { slug: "stieglitz-3",  src: "works/stieglitz-3.jpg",   meta: "Alfred Stieglitz  ·  The Terminal  ·  1892" },
    { slug: "atget",        src: "works/atget-1.jpg",       meta: "Eugène Atget  ·  Avenue des Gobelins  ·  1927" },
    { slug: "atget-3",      src: "works/atget-4.jpg",       meta: "Eugène Atget  ·  Street Musicians  ·  1898–99" },
    { slug: "whistler",     src: "works/whistler-1.jpg",    meta: "James McNeill Whistler  ·  Nocturne in Black and Gold  ·  1875" },
    { slug: "brancusi",     src: "works/brancusi-1.jpg",    meta: "Edward Steichen  ·  Brâncuși's Studio  ·  1920" },
    { slug: "spilliaert",   src: "works/spilliaert-1.jpg",  meta: "Léon Spilliaert  ·  Dike at Night, Reflected Lights  ·  1908" },
    { slug: "spilliaert-2", src: "works/spilliaert-2.jpg",  meta: "Léon Spilliaert  ·  Marine from Mariakerke  ·  1908" },
    { slug: "spilliaert-4", src: "works/spilliaert-4.jpg",  meta: "Léon Spilliaert  ·  Lighthouse from the Pier, Night  ·  1907" },
    { slug: "goya",         src: "works/goya-1.jpg",        meta: "Francisco Goya  ·  The Dog  ·  1820–23" },
    { slug: "hugo",         src: "works/hugo-1.jpg",        meta: "Victor Hugo  ·  Ma destinée  ·  1867" },
    { slug: "schikaneder",  src: "works/schikaneder-1.jpg", meta: "Jakub Schikaneder  ·  Evening Street  ·  1906" },
    { slug: "degouve",      src: "works/degouve-1.jpg",     meta: "William Degouve de Nuncques  ·  The Blind House  ·  1892" },
    { slug: "khnopff",      src: "works/khnopff-1.jpg",     meta: "Fernand Khnopff  ·  I Lock My Door Upon Myself  ·  1891" },
    { slug: "carriere",     src: "works/carriere-1.jpg",    meta: "Eugène Carrière  ·  Meditation" },
    { slug: "ryder",        src: "works/ryder-1.jpg",       meta: "Albert Pinkham Ryder  ·  Moonlit Cove" },
    { slug: "ciurlionis",   src: "works/ciurlionis-1.jpg",  meta: "Mikalojus Konstantinas Čiurlionis  ·  Rex  ·  1909" },
  ];
  const SLUGS = WORKS.map(w => w.slug);
  const ARTIST_PRIMARY = {
    hartung: "hartung", sugimoto: "sugimoto", tapies: "tapies",
    stieglitz: "stieglitz", atget: "atget", whistler: "whistler",
    brancusi: "brancusi", spilliaert: "spilliaert", goya: "goya",
    hugo: "hugo", schikaneder: "schikaneder", degouve: "degouve",
    khnopff: "khnopff", carriere: "carriere", ryder: "ryder",
    ciurlionis: "ciurlionis",
  };

  for (const w of WORKS) { const img = new Image(); img.src = w.src; }

  const $home    = document.getElementById("home");
  const $work    = document.getElementById("work");
  const $workImg = document.getElementById("work-img");
  const $workMeta = document.getElementById("work-meta");
  const $gallery = document.getElementById("gallery");
  const $grid    = document.getElementById("gallery-grid");
  const $typer   = document.getElementById("typer");
  const $end     = document.getElementById("end");

  // routing

  function currentPath() {
    return location.pathname.replace(/^\/+|\/+$/g, "");
  }

  function go(path, push = true) {
    const clean = path.replace(/^\/+|\/+$/g, "");
    if (push && clean !== currentPath()) {
      history.pushState({}, "", "/" + clean);
    }
    render(clean);
  }

  let showOnlyPending = 0;
  function showOnly(target) {
    cancelAnimationFrame(showOnlyPending);

    if (target === "home") {
      $home.hidden = false;
      [$work, $gallery].forEach(el => {
        el.style.transition = "";
        el.classList.remove("show");
        el.setAttribute("aria-hidden", "true");
      });
      return;
    }

    $home.hidden = true;
    const el = target === "work" ? $work : target === "gallery" ? $gallery : null;
    if (!el) return;
    [$work, $gallery].forEach(p => {
      if (p !== el) {
        p.style.transition = "";
        p.classList.remove("show");
        p.setAttribute("aria-hidden", "true");
      }
    });
    showOnlyPending = requestAnimationFrame(() => {
      el.style.transition = "";
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    });
  }

  function render(path) {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; }
    if (activeWidget) clearWidget();
    document.body.classList.add("unlocked");

    const work = WORKS.find(w => w.slug === path);
    if (work) {
      $workImg.src = work.src;
      $workImg.alt = work.meta;
      $workMeta.textContent = work.meta;
      document.title = work.meta.split("·")[0].trim() + "  ·  Eric Li";
      showOnly("work");
      return;
    }
    if (path === "gallery") {
      buildGallery();
      document.title = "Gallery  ·  Eric Li";
      showOnly("gallery");
      return;
    }

    document.body.classList.remove("unlocked");
    document.title = "Eric Li";
    showOnly("home");
    resetIdle();
  }

  // gallery

  function buildGallery() {
    $grid.innerHTML = "";
    const shuffled = WORKS.slice();
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach((w, i) => {
      const cell = document.createElement("div");
      cell.className = "gallery-cell";
      cell.dataset.slug = w.slug;
      cell.dataset.meta = w.meta;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", w.meta);
      cell.style.animationDelay = (i * 50) + "ms";
      const img = document.createElement("img");
      img.src = w.src;
      img.alt = w.meta;
      cell.appendChild(img);
      $grid.appendChild(cell);
    });
  }

  $gallery.addEventListener("click", (e) => {
    const cell = e.target.closest(".gallery-cell");
    if (cell) { go("/" + cell.dataset.slug); } else { go("/"); }
  });

  window.addEventListener("popstate", () => render(currentPath()));

  // work viewer: click artwork to advance, click background to gallery

  let switching = false;
  $workImg.addEventListener("click", (e) => {
    e.stopPropagation();
    if (switching) return;
    switching = true;
    const here = currentPath();
    let next = here;
    while (next === here) {
      next = SLUGS[Math.floor(Math.random() * SLUGS.length)];
    }
    $workImg.style.opacity = "0";
    setTimeout(() => {
      const w = WORKS.find(w => w.slug === next);
      if (w) {
        $workImg.src = w.src;
        $workImg.alt = w.meta;
        $workMeta.textContent = w.meta;
        document.title = w.meta.split("·")[0].trim() + "  ·  Eric Li";
      }
      history.pushState({}, "", "/" + next);
      requestAnimationFrame(() => {
        $workImg.style.opacity = "";
        switching = false;
      });
    }, 420);
  });
  $work.addEventListener("click", (e) => {
    if (e.target === $workImg) return;
    go("/gallery");
  });

  // parallax on work viewer

  let parallaxX = 0, parallaxY = 0;
  let targetX = 0, targetY = 0;
  let parallaxRAF = 0;
  function applyParallax() {
    parallaxX += (targetX - parallaxX) * 0.08;
    parallaxY += (targetY - parallaxY) * 0.08;
    if ($workImg && $work.classList.contains("show")) {
      $workImg.style.transform = "scale(1) translate(" + parallaxX.toFixed(2) + "px, " + parallaxY.toFixed(2) + "px)";
    }
    parallaxRAF = requestAnimationFrame(applyParallax);
  }
  parallaxRAF = requestAnimationFrame(applyParallax);
  $work.addEventListener("pointermove", (e) => {
    const r = $work.getBoundingClientRect();
    targetX = -((e.clientX - r.left - r.width / 2) / r.width) * 18;
    targetY = -((e.clientY - r.top - r.height / 2) / r.height) * 18;
  });
  $work.addEventListener("pointerleave", () => { targetX = targetY = 0; });

  // long-press on home opens random work

  let pressTimer = 0;
  $home.addEventListener("pointerdown", (e) => {
    if (e.target === $end) return;
    pressTimer = setTimeout(() => {
      go("/" + SLUGS[Math.floor(Math.random() * SLUGS.length)]);
    }, 700);
  });
  function cancelPress() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = 0; } }
  $home.addEventListener("pointerup", cancelPress);
  $home.addEventListener("pointerleave", cancelPress);
  $home.addEventListener("pointercancel", cancelPress);

  // typed commands

  let buf = "";
  let bufTimer = 0;

  function clearBuf() {
    buf = "";
    $typer.classList.remove("show");
    setTimeout(() => {
      if (!$typer.classList.contains("show")) $typer.textContent = "";
    }, 550);
  }

  const ARTIST_KEYS = Object.keys(ARTIST_PRIMARY);
  const TYPEABLE = [...new Set([...ARTIST_KEYS, "gallery"])];
  const WIDGETS = ["stars", "void", "mirror"];
  const YEARS = {
    "1820": "goya", "1867": "hugo", "1875": "whistler", "1891": "khnopff",
    "1892": "degouve", "1898": "atget-3", "1906": "schikaneder",
    "1908": "spilliaert", "1920": "brancusi", "1927": "atget",
    "1980": "sugimoto", "1983": "tapies", "1989": "hartung",
  };

  function matchSlug() {
    if (!buf) return null;
    if (YEARS[buf]) return YEARS[buf];
    if (ARTIST_PRIMARY[buf]) return ARTIST_PRIMARY[buf];
    if (TYPEABLE.includes(buf)) return buf;
    return null;
  }

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const k = e.key;

    if (k === "Escape") {
      clearBuf();
      clearWidget();
      if (currentPath() !== "") go("/");
      return;
    }
    if (activeWidget === "stars" || activeWidget === "mirror") return;
    if (k === "Backspace") {
      if (buf.length) {
        buf = buf.slice(0, -1);
        if (!buf) { clearBuf(); return; }
        $typer.textContent = buf;
      }
      return;
    }
    if (k.length === 1 && /^[a-zA-Z0-9]$/.test(k)) {
      buf = (buf + k.toLowerCase()).slice(0, 18);
      $typer.textContent = buf;
      $typer.classList.add("show");
      clearTimeout(bufTimer);
      bufTimer = setTimeout(clearBuf, 1600);

      const m = matchSlug();
      if (m) { clearBuf(); go("/" + m); return; }
      if (WIDGETS.includes(buf)) { const w = buf; clearBuf(); fireWidget(w); return; }
      if (buf === "eric") {
        clearBuf();
        window.open("https://www.linkedin.com/in/eric-li-226850249/", "_blank");
        return;
      }
    }
  });

  // "beautiful things" hover

  if ($end) {
    $end.addEventListener("click", (e) => { e.preventDefault(); go("/gallery"); });

    const text = $end.textContent;
    const bioEl = $end.closest(".bio");
    $end.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
      const s = document.createElement("span");
      s.textContent = text[i] === " " ? "\u00A0" : text[i];
      $end.appendChild(s);
    }
    const letters = $end.querySelectorAll("span");

    const enchantedTones = [
      "#f0e6c8", "#e8e0d0", "#dce4e0", "#e0d8e8", "#d8e0e8",
      "#e8dcd0", "#d0dce0", "#e4ddd0", "#d8d8e0", "#e0e4d8",
    ];
    let lastTone = -1;
    $end.addEventListener("mouseenter", () => {
      if (activeWidget) return;
      let pick = lastTone;
      while (pick === lastTone) pick = Math.floor(Math.random() * enchantedTones.length);
      lastTone = pick;
      document.body.style.background = enchantedTones[pick];
      document.body.classList.add("enchanted");
      if (bioEl) bioEl.classList.add("enchanted");
      letters.forEach(s => {
        const tx = (Math.random() - 0.5) * 24;
        const ty = (Math.random() - 0.5) * 18;
        const r = (Math.random() - 0.5) * 16;
        s.style.transform = "translate(" + tx + "px," + ty + "px) rotate(" + r + "deg)";
      });
    });
    $end.addEventListener("mouseleave", () => {
      if (activeWidget) return;
      document.body.style.background = "";
      document.body.classList.remove("enchanted");
      if (bioEl) bioEl.classList.remove("enchanted");
      letters.forEach(s => { s.style.transform = ""; });
    });
  }

  // konami code opens gallery

  const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
  let kIdx = 0;
  window.addEventListener("keydown", (e) => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (k === KONAMI[kIdx]) {
      kIdx++;
      if (kIdx === KONAMI.length) { kIdx = 0; go("/gallery"); }
    } else {
      kIdx = (k === KONAMI[0]) ? 1 : 0;
    }
  });

  // cursor ink trail (visible after navigating away from home)

  const trail = document.getElementById("trail");
  let tctx, tw = 0, th = 0;
  function sizeTrail() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    tw = innerWidth; th = innerHeight;
    trail.width = Math.round(tw * dpr);
    trail.height = Math.round(th * dpr);
    trail.style.width = tw + "px";
    trail.style.height = th + "px";
    tctx = trail.getContext("2d");
    tctx.setTransform(1, 0, 0, 1, 0, 0);
    tctx.scale(dpr, dpr);
  }
  sizeTrail();
  addEventListener("resize", sizeTrail);

  const pts = [];
  const LIFE = 900;
  addEventListener("pointermove", (e) => {
    if (!document.body.classList.contains("unlocked")) return;
    const last = pts[pts.length - 1];
    if (last) {
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      if (dx*dx + dy*dy < 9) return;
    }
    pts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  }, { passive: true });

  function trailLoop() {
    const now = performance.now();
    while (pts.length && now - pts[0].t > LIFE) pts.shift();
    if (tctx) {
      tctx.clearRect(0, 0, tw, th);
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        const age = (now - p.t) / LIFE;
        const a = (1 - age) * 0.16;
        const r = 0.8 + (1 - age) * 3.2;
        tctx.fillStyle = "rgba(17, 17, 17, " + a + ")";
        tctx.beginPath();
        tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        tctx.fill();
      }
    }
    requestAnimationFrame(trailLoop);
  }
  requestAnimationFrame(trailLoop);

  // widgets

  const $widget = document.getElementById("widget");
  const $widgetCanvas = document.getElementById("widget-canvas");
  let widgetTimer = 0;
  let widgetRAF = 0;
  let activeWidget = "";
  let voidRevealTimer = 0;
  let mirrorStream = null;

  function clearWidget() {
    clearTimeout(widgetTimer);
    clearTimeout(voidRevealTimer);
    cancelAnimationFrame(widgetRAF);
    activeWidget = "";
    $widget.classList.remove("show");
    $widgetCanvas.classList.remove("show");
    document.body.classList.remove("stars-mode", "void-mode", "mirror-mode");
    $widget.innerHTML = "";
    if (mirrorStream) {
      mirrorStream.getTracks().forEach(t => t.stop());
      mirrorStream = null;
    }
    try {
      const ctx = $widgetCanvas.getContext("2d");
      ctx.globalCompositeOperation = "source-over";
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, $widgetCanvas.width, $widgetCanvas.height);
    } catch (e) {}
  }

  function sizeWidgetCanvas() {
    const dpr = Math.max(1, Math.min(2.5, devicePixelRatio || 1));
    $widgetCanvas.width = Math.round(innerWidth * dpr);
    $widgetCanvas.height = Math.round(innerHeight * dpr);
    $widgetCanvas.style.width = innerWidth + "px";
    $widgetCanvas.style.height = innerHeight + "px";
    const ctx = $widgetCanvas.getContext("2d");
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return ctx;
  }

  function fireWidget(kind) {
    if (kind === activeWidget) return;
    clearWidget();
    document.body.style.background = "";
    document.body.classList.remove("enchanted");
    const bioEl = document.querySelector(".bio");
    if (bioEl) bioEl.classList.remove("enchanted");
    activeWidget = kind;
    if (kind === "stars") { runStars(); return; }
    if (kind === "void") { runVoid(); return; }
    if (kind === "mirror") { runMirror(); return; }
  }

  function runStars() {
    const ctx = sizeWidgetCanvas();
    const w = innerWidth, h = innerHeight;
    document.body.classList.add("stars-mode");
    $widgetCanvas.classList.add("show");
    const stars = [];
    const COUNT = Math.min(380, Math.floor(w * h / 5400));
    for (let i = 0; i < COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const drift = 3 + Math.random() * 10;
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: Math.cos(angle) * drift, vy: Math.sin(angle) * drift,
        r: Math.random() * 1.4 + 0.2,
        twk: Math.random() * Math.PI * 2,
        spd: 0.6 + Math.random() * 1.3,
      });
    }

    const shooters = [];
    function spawnShooter() {
      const edge = Math.random();
      let sx, sy, ang;
      if (edge < 0.5) {
        sx = Math.random() * w; sy = -10;
        ang = Math.PI * (0.15 + Math.random() * 0.7);
      } else {
        sx = w + 10; sy = Math.random() * h * 0.5;
        ang = Math.PI * (0.55 + Math.random() * 0.4);
      }
      const speed = 400 + Math.random() * 350;
      shooters.push({
        x: sx, y: sy, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
        life: 1.0, len: 60 + Math.random() * 80, size: 0.8 + Math.random() * 1.2,
      });
    }

    let nextShoot = 800 + Math.random() * 1200;
    let shootAcc = 0;
    const start = performance.now();
    let lastT = start;

    function step(now) {
      const dt = (now - lastT) / 1000;
      lastT = now;
      const t = (now - start) / 1000;
      ctx.clearRect(0, 0, w, h);

      for (const s of stars) {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < -4) s.x += w + 8;
        if (s.x > w + 4) s.x -= w + 8;
        if (s.y < -4) s.y += h + 8;
        if (s.y > h + 4) s.y -= h + 8;
        const tw = 0.6 + 0.4 * Math.sin(s.twk + t * s.spd);
        ctx.fillStyle = "rgba(232, 230, 223, " + tw + ")";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      shootAcc += dt * 1000;
      if (shootAcc >= nextShoot) {
        shootAcc = 0;
        nextShoot = 600 + Math.random() * 1400;
        spawnShooter();
      }

      for (let i = shooters.length - 1; i >= 0; i--) {
        const sh = shooters[i];
        sh.x += sh.vx * dt;
        sh.y += sh.vy * dt;
        sh.life -= dt * 1.2;
        if (sh.life <= 0) { shooters.splice(i, 1); continue; }
        const alpha = sh.life * 0.9;
        const tailX = sh.x - (sh.vx / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const tailY = sh.y - (sh.vy / Math.hypot(sh.vx, sh.vy)) * sh.len * sh.life;
        const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255, 255, 255, " + alpha + ")");
        grad.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.strokeStyle = grad;
        ctx.lineWidth = sh.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sh.x, sh.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, sh.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      widgetRAF = requestAnimationFrame(step);
    }
    widgetRAF = requestAnimationFrame(step);
  }

  function runVoid() {
    document.body.classList.add("void-mode");
    voidRevealTimer = setTimeout(() => {
      if (activeWidget !== "void") return;
      $widget.innerHTML = '<div style="color:rgba(232,230,223,0.7);font-family:\'Iowan Old Style\',Georgia,serif;font-size:clamp(28px,2.8vw,36px);letter-spacing:0.08em;font-style:italic;opacity:0;transition:opacity 2s ease">In the void is virtue, and no evil</div>';
      $widget.classList.add("show");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const d = $widget.querySelector("div");
          if (d) d.style.opacity = "1";
        });
      });
    }, 1500);
    widgetTimer = setTimeout(clearWidget, 8000);
  }

  function runMirror() {
    document.body.classList.add("mirror-mode");
    $widgetCanvas.classList.add("show");

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
      .then(stream => {
        if (activeWidget !== "mirror") { stream.getTracks().forEach(t => t.stop()); return; }
        mirrorStream = stream;
        const video = document.createElement("video");
        video.srcObject = stream;
        video.playsInline = true;
        video.muted = true;
        video.play();

        const offscreen = document.createElement("canvas");
        const ow = 320, oh = 240;
        offscreen.width = ow;
        offscreen.height = oh;
        const octx = offscreen.getContext("2d", { willReadFrequently: true });

        const ctx = sizeWidgetCanvas();
        const dw = innerWidth, dh = innerHeight;

        function processFrame() {
          if (activeWidget !== "mirror") return;
          octx.drawImage(video, 0, 0, ow, oh);
          const imageData = octx.getImageData(0, 0, ow, oh);
          const data = imageData.data;
          const gray = new Float32Array(ow * oh);

          for (let i = 0; i < ow * oh; i++) {
            const idx = i * 4;
            gray[i] = data[idx] * 0.299 + data[idx+1] * 0.587 + data[idx+2] * 0.114;
          }

          const edges = new Float32Array(ow * oh);
          for (let y = 1; y < oh - 1; y++) {
            for (let x = 1; x < ow - 1; x++) {
              const idx = y * ow + x;
              const gx = -gray[idx-ow-1] - 2*gray[idx-1] - gray[idx+ow-1]
                         + gray[idx-ow+1] + 2*gray[idx+1] + gray[idx+ow+1];
              const gy = -gray[idx-ow-1] - 2*gray[idx-ow] - gray[idx-ow+1]
                         + gray[idx+ow-1] + 2*gray[idx+ow] + gray[idx+ow+1];
              edges[idx] = Math.min(255, Math.hypot(gx, gy));
            }
          }

          ctx.fillStyle = "#0a0a0a";
          ctx.fillRect(0, 0, dw, dh);

          const scaleX = dw / ow;
          const scaleY = dh / oh;
          const threshold = 30;

          for (let y = 0; y < oh; y += 2) {
            for (let x = 0; x < ow; x += 2) {
              const e = edges[y * ow + x];
              if (e > threshold) {
                const alpha = Math.min(1, (e - threshold) / 120);
                const noise = Math.random() * 0.3;
                ctx.fillStyle = "rgba(232,230,223," + (alpha * 0.8 + noise * alpha) + ")";
                const px = (ow - x) * scaleX;
                const py = y * scaleY;
                const sz = 1.2 + alpha * 1.5 + Math.random() * 0.8;
                ctx.fillRect(px, py, sz, sz);
              } else if (Math.random() < 0.008) {
                ctx.fillStyle = "rgba(232,230,223,0.08)";
                ctx.fillRect((ow - x) * scaleX, y * scaleY, 1, 1);
              }
            }
          }

          const vgrad = ctx.createRadialGradient(dw/2, dh/2, dw*0.25, dw/2, dh/2, dw*0.7);
          vgrad.addColorStop(0, "rgba(10,10,10,0)");
          vgrad.addColorStop(1, "rgba(10,10,10,0.6)");
          ctx.fillStyle = vgrad;
          ctx.fillRect(0, 0, dw, dh);

          widgetRAF = requestAnimationFrame(processFrame);
        }
        video.addEventListener("loadeddata", () => { processFrame(); });
      })
      .catch(() => {
        $widget.innerHTML = '<div style="color:rgba(232,230,223,0.6);font-family:\'Iowan Old Style\',Georgia,serif;font-size:18px;font-style:italic;opacity:0;transition:opacity 1s ease">no mirror found</div>';
        $widget.classList.add("show");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const d = $widget.querySelector("div");
            if (d) d.style.opacity = "1";
          });
        });
        widgetTimer = setTimeout(clearWidget, 3000);
      });
  }

  document.addEventListener("dragstart", (e) => {
    if (e.target && (e.target.tagName === "IMG" || e.target.tagName === "CANVAS")) {
      e.preventDefault();
    }
  });

  // idle: 15s without interaction on home triggers void

  let idleTimer = 0;
  let idleActive = false;

  function resetIdle() {
    clearTimeout(idleTimer);
    if (idleActive) { idleActive = false; clearWidget(); }
    if (!$home.hidden) { idleTimer = setTimeout(startIdle, 15000); }
  }
  function startIdle() {
    if ($home.hidden || activeWidget) return;
    idleActive = true;
    fireWidget("void");
  }
  addEventListener("mousemove", resetIdle, { passive: true });
  addEventListener("keydown", resetIdle);
  addEventListener("pointerdown", resetIdle, { passive: true });

  // mobile shake triggers void

  if (window.DeviceMotionEvent) {
    let lastShake = 0;
    function onShake(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const force = Math.abs(a.x) + Math.abs(a.y) + Math.abs(a.z);
      if (force > 35 && performance.now() - lastShake > 4000) {
        lastShake = performance.now();
        fireWidget("void");
      }
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      document.addEventListener("touchstart", function permit() {
        DeviceMotionEvent.requestPermission().then(s => {
          if (s === "granted") addEventListener("devicemotion", onShake, { passive: true });
        }).catch(() => {});
        document.removeEventListener("touchstart", permit);
      }, { once: true });
    } else {
      addEventListener("devicemotion", onShake, { passive: true });
    }
  }

  render(currentPath());
  resetIdle();
})();
</script>
</body>
</html>
